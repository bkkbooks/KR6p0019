front:
  text: 阿彌陀經疏鈔總科此經疏鈔大文分三初通序大意二開章釋文三結釋呪意云云初通序大意五初明性二讚經二初總讚二別讚四初先出說經所以二統論淨土功德三特示持名為要二初較輪要約二究明利益三初因成二果證三總結四廣顯持名所被三感時三初總嘆二別嘆三結嘆四述意三初愧己不聽二明己所尚三原巳釋經五請加二開章釋文二初略標二詳釋十初教起所因二初總二別十初大悲憫念末法為作津梁故二特於無量法門出勝方便故三激揚生死凡夫令起欣厭故四化導二乘執空不修淨土故五勉進初心菩薩親近如來故六盡攝利鈍諸根悉皆度脫故七護持多障行人不遭墮落故八的指即有念心得入無念故九巧示因於往生實悟無生故十復明徑路修行徑中之徑故此有二義一者餘門學道云云二者無量壽經廣陳依正云云二藏教等攝三初藏攝二教攝三分攝三義理深廣三初攝頓二分圓三旁通二初觀經二諸經四所被階品二初料簡二總收五能詮體性四初隨相二唯識三歸性四無礙六宗起旨歸三初總陳二異解三正意二初總舉二別明七部類差別三初明部二明類三非部非類八譯釋誦持五初明譯二明釋三明誦四明持五結勸九總釋名題二卷二初題義二譯人十別解文義三初序分二初五句證二列衆證三初聲聞衆三初明類數二表位德三出名號二初衆名二總結二菩薩衆三初明類二列名三總結三人天衆二正宗分四初詳陳依正令生信樂二初對機二示法二初總標二初標土顯依二標主顯正二別釋二初依報二初總名極樂二別示莊嚴四初欄網行樹二初詳陳二總結二池閣蓮華四初池水二階道三蓮華四總結三天樂雨華四卷三初天樂二金地三雨華三初天雨妙華二持已供佛三供已自適四總結四化禽風樹三初化禽演法二初正示法音二初宣音二獲益二釋無惡道二風樹演法三總結二正報二初化主二初徵名二顯德二初名含多義二初光明無量二壽命無量二道成遠劫二化伴二初見在三初聲聞二菩薩三總結二往生二初大衆二上衆二正示願行令知修證四初發願二初勸發願心二出其所以二起行二初揀餘行二示正行三感果二卷三初佛現我前二我往佛處四結勸三交引佛言令斷疑惑二初明佛同讚二初本佛讚二他佛讚六初東方三初列名顯廣二現相表真三發言勸信二南方三初列名顯廣二現相表真三發言勸信三西方三初列名顯廣二現相表真三發言勸信四北方三初列名顯廣二現相表真三發言勸信五下方三初列名顯廣二現相表真三發言勸信六上方三初列名顯廣二現相表真三發言勸信二釋經應讚二初徵名二釋義三初聞持二利益三勉信三初因聞信受二隨願往生三總結信願四互彰難事令切感發三初已讚諸佛二諸佛讚巳二初得道難二說法難三總結難事三流通分二初重舉聽衆二明悉奉行三結釋呪意阿彌陀經疏鈔總科文終
