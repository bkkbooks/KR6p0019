body:
  text: 明古杭雲棲寺沙門袾宏述此經疏鈔大文分三初通序大意二開章釋文三結釋呪意為順諸經序正流通三分亦順淨業信行願故初通序大意五初明性二讚經三感時四述意五請加初明性靈明洞徹湛寂常恆非濁非清無背無向大哉真體不可得而思議者其唯自性歟通序經意大文分五自初明性乃至五請加今初明性此經蓋全彰自性又諸經皆不離自性故首標也靈者靈覺明者明顯日月雖明不得稱靈今惟至明之中神解不測明不足以盡之故曰靈明徹者通也洞者徹之極也日月雖遍不照覆盆是徹而未徹今此靈明輝天地透金石四維上下曾無障礙蓋洞然之徹靡所不徹非對隔説通之徹云洞徹也湛者不染寂者不搖大地雖寂不得稱湛今惟至寂之中瑩淨無滓寂不足以盡之故曰湛寂恆者久也常者恆之極也大地雖堅難逃壞劫是恆而未恆今此湛寂推之無始引之無終亘古亘今曾無變易蓋常然之恆無恆不恆非對暫説久之恆云常恆也非濁者云有則不受一塵非清者云無則不捨一法無背者縱之則無所從去無向者迎之則無所從來言即此靈明湛寂者不可以清濁向背求也舉清濁向背意該善惡聖凡有無生滅增減一異等大哉二句讚辭大者當體得名具遍常二義以橫滿十方豎極三際更無有法可與為比非對小言大之大也真者不妄以三界虗偽唯此真實所謂非幻不滅不可破壞故云真也體者盡萬法不出一心之體體該相用總而名之曰真體也不可思議者如上明而復寂寂而復明清濁不形向背莫得則心言路絶無容思議者矣不可思者所謂法無相想思則亂生經云汝暫舉心塵勞先起是也又法無相想思亦徒勞經云是法非思量分別之所能及是也故曰心欲緣而慮亡也不可議者所謂理圓言偏言生理喪經云凡有言説皆成戲論是也又理圓言偏言不能盡經云一一身具無量口一一口出無量音如善天女窮劫而説終莫能盡是也故曰口欲談而詞喪也又此經原名不可思議故用此四字總讚前文蓋是至理之極名也末句結歸言如是不可思議者當是何物惟自性乃爾言性有二兼無情分中謂之法性獨有情分中謂之佛性今云自性且指佛性而言也性而曰自法爾如然非作得故是我自己非屬他故此之自性蓋有多名亦名本心亦名本覺亦名真知亦名真識亦名真如種種無盡統而言之即當人靈知靈覺本具之一心也今明不可思議者惟此心耳更無餘物有此不思議體與心同也若就當經初句即無量光洞徹無礙故二句即無量壽常恆不變故三四句即靈心絶待光壽交融一切功德皆無量故五句總讚即經云如我稱讚阿彌陀佛不可思議功德末句結歸言阿彌陀佛全體是當人自性也又初句明無不照即用大二句靜無不含即相大三四句迥絶二邊即體大五句總讚所謂即三即一雙泯雙存辭喪慮亡不可思議末句亦結歸自性也又初句言照即解脫德二句言寂即般若德三四句言寂照不二即法身德五句總讚末句結歸例上可知又以四法界會之則清濁向背是事法界靈明湛寂是理法界靈明湛寂而不變隨緣清濁向背而隨緣不變是理事無礙法界不可思議是事事無礙法界以此經分攝於圓亦得少分事事無礙故末言自性亦是結屬四法界歸一心也二讚經二初總讚二別讚初總讚澄濁而清返背而向越三祇於一念齊諸聖於片言至哉妙用亦不可得而思議者其惟佛説阿彌陀經歟上言靈明湛寂之體本無清濁向背畢竟平等惟是一心今謂約生滅門以不如實如真知法一故不覺心起而有其念則無明所覆失本流末渾亂真體故名曰濁如澄泥沙復使淨潔斯之謂清即指轉五濁而成清泰也無明所引棄覺逐塵違遠真體故名曰背返其去路復使歸還斯之謂向即指背娑婆而向極樂也然此且就衆生一期從迷得悟而言似有澄之返之之迹而於自性實無得失亦無增損是故時濁時清水非易性忽背忽向人無二身所謂修證即不無污染即不得也三祇者三阿僧祇劫也僧祇解見後文言三者以釋迦成道從古釋迦至尸棄歷七萬五千佛從尸棄至燃燈歷七萬六千佛從燃燈至毗婆尸歷七萬七千佛云三祇也備經多劫遠之又遠而今不越一念疾超生死一念者即能念阿彌陀佛之一念也諸聖者佛及菩薩也自凡望聖隔之又隔而今不出片言直登不退片言者即所念阿彌陀佛之片言也至哉二句讚辭至極也至極而無以加也妙者即上四句總明妙義用者力用也夫垢心難淨混若黃河妄想難收逸如奔馬歷恆沙無數量之劫輪轉未休攻三藏十二部之文覺路彌遠而能使濁者清背者向一念頓超片言即證力用之妙何可思議用從體相而出故止言妙用也末句結歸言如是妙用當是何經惟佛説阿彌陀經足以當之或問小乘且置只如諸大乘經廣如山積云何妙用偏讚此經答修多羅中雖具有此義未有如此經之明且簡者故夫稱性而談正直而説非不圓頓而澄濁返背方便未彰其餘法門或浩博而難持或幽深而罔措今但片言名號便入一心既得往生直至成佛即方便而成圓頓神功勝力不歸此經將誰歸乎又前是性德今是修德前是自性清淨今是離垢清淨乃至性盡障盡等互融不二如教中説二別讚四初先出説經所以二統論淨土功德三特示持名為要四廣顯持名所被初先出説經所以故我世尊乍説三乘終歸一實等頒珍賜更錫殊恩承上此經具有如是不可思議功德故佛説此經良有以也乍者暫也暫時之説非究竟也三乘者乘本無三權説有三謂聲聞緣覺菩薩也終者對乍而言實者對權而言言世尊始成正覺演大華嚴大教難投隨衆生根説三乘法後乃會權歸實悉與大車故曰等頒珍賜此如來一代時教之大致也而於其中復出念佛一門不論大根小根但念佛者即得往生亦不待根熟方乃會之歸實但往生者即得不退喻如不次之擢廕序之官恩出非常名殊恩也又殊恩復含二義一者念佛是恩中之殊二者持名念佛又殊恩中之殊也二統論淨土功德指四十八之願門開一十六之觀法願願歸乎普度觀觀宗乎妙心上讚淨土法門之勝今於淨土先出餘經然後較量此經更為殊勝願門觀法具在二經言從初願以至願終無非盡攝衆生同生淨土自初觀以至觀末悉是空假中道圓極一心繇此一心出生大願而成正覺即以本願還度衆生而歸一心淨土法門二經大較意蓋如此三特示持名為要二初較論要約二究明利益初較論要約又以願門廣大貴在知先觀法深玄尤應守約知先則務生彼國守約則惟事持名舉其名兮兼衆德而俱備專乎持也統百行以無遺即前大本觀經較而論之知持名尤為要約也廣大者以四十八願帡包幽顯統括聖凡廣大宏茫無畔岸入之必有繇漸故貴知先傳曰知所先後則近道矣深玄者以門分十六事匪一端而復妙觀精微初心靡及操之必得其要故應守約軻氏曰守約而施博者善道也云何知先繇生彼國近事如來如是大願庶可希冀但得見彌陀何愁不開悟故以求願往生為先務之急也云何守約良以觀雖十六言佛便周佛雖至極惟心即是今聞佛名一心執持可謂至簡至易功不繁施而萬法惟心心清淨故何事不辦剎那運想依正宛然舉念欲生便登彼國是則難成之觀不習而成故以持名念佛所守尤為要約也天如謂大聖悲憐直勸專持名號是也舉名者佛有無量德今但四字名號足以該之以彌陀即是全體一心心包衆德常樂我淨本覺始覺真如佛性菩提涅槃百千萬名皆此一名攝無不盡專持者衆生學佛亦有無量行法今但持名一法足以該之以持名即是持此一心心該百行四諦六度乃至八萬四千恆沙微塵一切行門攝無不盡故名守約二究明利益三初因成二果證三總結初因成從茲而萬慮咸休究極乎一心不亂不念佛前念念塵勞所謂一剎那間九百生滅生住異滅分劑頭數無量無邊天眼莫覷名萬慮也此萬慮者甲滅則乙生俄去則倐返百計除之終莫能得今以持名之力正念才舉雜想自除喻如師子出窟百獸潛蹤杲日照霜千林失白名咸休也故永明謂有人數息覺觀不休念佛稱名即破覺觀此其驗也休之又休窮其源本故云究極至於一心不亂是為成就念佛三昧二果證乃知匪離跬步寶池涌四色之華不出戶庭金地繞七重之樹處處彌陀説法時時蓮蕊化生珍禽與庶鳥偕音瓊院共茆堂並彩既得一心不亂始知蓮華行樹種種莊嚴並非心外何必耳聽金言方是彌陀説法娑婆印壞始名淨土文成者哉然則珍禽庶鳥瓊院茆堂何劣何優何淨何穢故曰西方在目前也三總結蓋繇念空真念生入無生念佛即是念心生彼不離生此心佛衆生一體中流兩岸不居故謂自性彌陀唯心淨土承上殊因妙果正繇念佛至於一心則念極而空無念之念謂之真念又念體本空念實無念名真念也生無生者達生體不可得則生而不生不生而生是名以念佛心入無生忍如後教起中辨故知終日念佛終日念心熾然往生寂然無往矣心佛衆生者經云心佛及衆生是三無差別蓋心即是佛佛即是生諸佛心內衆生念衆生心中諸佛也故云一體中流兩岸者娑婆喻此極樂喻彼始焉厭苦欣樂既焉苦樂雙亡終焉亦不住於非苦非樂所謂二邊不著中道不安也自性彌陀唯心淨土意蓋如是是則禪宗淨土殊途同歸以不離自心即是佛故即是禪故彼執禪而謗淨土是謗自本心也是謗佛也是自謗其禪也亦弗思而已矣四廣顯持名所被此則理之一心全歸上智亦復通乎事相曲為鈍根理事一心詳見後文今謂自性唯心正指經中理一心不亂言耳上智乃克承當鈍根未能領荷故此一心不專主理而亦通事以事一心人皆可行所謂夫婦之愚不肖而與知與能者也如天普蓋似地普擎大造之中無棄物故三感時三初總歎二別歎二結歎初總歎奈何守愚之輩著事而理無聞小慧之流執理而事遂廢著事而迷理類蒙童讀古聖之書執理而遺事比貧士獲豪家之券上言佛慈雙被智愚今言衆生不體佛意有善教無善學故可歎也守愚者愚而甘愚小慧者慧而不慧良以事依理起理得事彰事理交資不可偏廢著此執彼厥弊等耳蒙童喻全愚昏稚未開僅能讀文了不解義所謂終日念佛不知佛念者也貧士喻小慧昔有窘人路獲遺券見其所載田園宮室金帛米粟種種數目大喜過望自云巨富不知數他人寶於己何涉所謂雖知即佛即心判然心不是佛者也是故約理則無可念約事則無可念中吾固念之以念即無念故理事雙修即本智而求佛智夫然後謂之大智也二別歎然著事而念能相繼不虗入品之功執理而心實未明反受落空之禍上文雙揭二病今於二病別舉其尤謂著事而信心不切固無足論假使專持名號念念相繼無有間斷雖或不明諦理已能成就淨身品位縱卑往生必矣所謂士人作榜尾登科亦不惡但恐榜上無名耳安得以守愚病之乃至執理而心實了明亦不必論假使騁馳狂慧耽著頑虗於自本心曾未開悟而輕談淨土蔑視往生為害非細所謂豁達空撥因果莽莽蕩蕩招殃禍者也問何故不咎鈍人反抑利者答利者恃才高舉常謂遠勝鈍人今為此説使知畫虎弗就反落一籌冀彼知非回心念佛非曰抑之實惜之耳三結歎遂使垂手徒勤倚門空望上孤佛化下負己靈今生以及多生一誤而成百誤甘心苦趣束手死門無救無歸可悲可痛垂手者古云嫂溺援之以手倚門者王孫賈母云汝朝出而不還則吾倚門而望今謂衆生沒於苦趣佛援之如垂手深淵衆生背覺合塵佛念之如倚門望子援之雖殷念之雖切深沈不起遠逝無還是孤佛化也下負者凡厥有心定當作佛故佛教持名欲人念我自心成我自佛而漠然不信寧不負己靈乎今生多生者生生墮落無有窮已也一誤百誤者此生蹉過多劫難逢也入苦趣似蠅蛆飫於廁中赴死門類牛羊就乎屠肆莫為救拔無可歸憑豈不哀哉四述意三初愧己不德二明己所尚三原已釋經初愧己不德袾宏末法下凡窮陬晚學罔通玄理素鄙空談畫餅何益飢腸燕石難誣賈目上明念佛獲如是益不念佛招如是損故述己意惟崇念佛今初先以鈍根自量也末法則生之不時下凡則報之不勝窮陬則見之不廣晚學則智之不深事且未能況復知理明所言不足取信於人也素鄙者自知淺劣愧鄙空談所謂恥其言而過其行也畫餅可知喻空談也燕石者似玉而非玉者也賈胡者西域賈人善別寶者也昔有得燕石者自謂瑜瑾驕眩俗目冀得重售以示賈胡曰石也大慚而返喻依稀見道倣佛不真明眼人前堪作一笑二明己所尚祇承先敕篤奉斯經望樂國為家鄉仰慈尊如怙恃既揣鈍根事必師古祇者敬也世主玉音法王金口均名曰敕篤奉者奉之至也樂國言家鄉者寂滅淨土乃當人安身立命處而捨離故里飄泊他鄉遊子伶仃唯有思歸一念而已慈尊言怙恃者父曰吾怙母曰吾恃佛以大慈大悲接引衆生是懷我以聖胎飼我以法乳即今內外身心莫不荷其恩力而得成立劬勞之德昊天罔極而乃叛棄本生螟蛉異姓惟應懷慕終身左右無方定省不違而已三原已釋經仍以心懷兼利道貴弘通慨古疏鮮見其全惟數解僅行於世辭雖切而太簡理微露而不彰不極論其宏功儔發起乎真信頓忘膚見既竭心思總收部類五經直據文殊一行而復會歸玄旨則分入雜華貫穿諸門則博綜羣典無一不消歸自己有願皆回向菩提展此精誠乞求加被未能自利先能利人者菩薩發心故不忍獨善其身心懷兼利也兼利之道弘法為先而此經注疏今多泯沒稽古無繇雖一二僅存略舉大端未暢厥旨宏功者即不可思議功德也不知此經具有如是功德則疑而不信信亦不真疏鈔之作不容己也膚見者肌膚在表所入不深喻淺見也淺見奚能測佛深義而以救世心殷頓忘其陋也心思者心之官則思堯舜之聖尚竭心思我何人斯庸可忽也部類者專談極樂大本等五經也文殊者文殊般若經專稱名字一行三昧也雜華者以華嚴性海為宗明教非權淺也羣典者引諸經論以證明言非臆見也詳如義理部類二門及後經文中辨消歸自己者明不專事相究其歸著悉皆消化融會歸於我之本性良繇世出世間無一法出於心外淨土所有依報正報一一皆是本覺妙明譬之瓶環叉釧器器唯金溪澗江河流流入海無不從此法界流無不還歸此法界也回向菩提者凡所修為咸願往生是名回向而向無他向回向西方者回向自性也末二句攝前起後欲興善事必仗佛加菩薩且然況復凡品精者無二誠者不虗古謂精誠之極鬼神與通而況三寶大慈憫念衆生猶如赤子但有利於衆生精誠求之寧不加被五請加歸命娑婆説法主西方接引大慈尊不可思議佛護經舍利文殊諸聖者二土六方遍塵剎過去見在及當來無盡三寶咸證知惟願慈悲攝受我我今妄以穢土見蠡測如來清淨心仰承三寶大威神加被凡愚成勝智使我言言符佛意流通遐邇益含靈見聞隨喜悉往生同證寂光無上果歸命如波羅密例倒語法也歸義有二一者歸投義言世人至重者身命舉身命而歸依誠敬之至無二心也二者歸元義舉身命而歸依即是總攝六根還歸一心也娑婆言釋迦西方言彌陀先釋迦者教所繇興也孺子封俟尚不背本凡夫入聖豈得辜恩古有臨終焚香先供養釋迦者正此意也説法主者説法度生一土之中無二佛故接引者衆生念佛佛垂接引喻如行路弱者接而濟之迷者引而導之也復有二義見生接引則資其道心臨終接引則攝其神識大慈尊者如母憶子名之曰慈慈無以加名之曰大尊即主義交互言之亦可釋迦此土之尊彌陀彼土之主也兼二如來是謂佛寶不可思議佛護念經此經原名也是謂法寶舍利文殊等聞經衆也是謂僧寶稱之為寶略有六義一希有義二離垢義三勢力義四莊嚴義五最勝義六不改義具如要集中説推而極之極樂娑婆二土四維上下十方以至微塵佛剎則遍一切處過現未來則遍一切時於中三寶橫該豎徹無窮盡也又三寶者復分事理有別有同如後文辨今是內外自他悉歸命也古云佛滅度後凡諸弟子所有著述皆歸三寶良繇聖境高玄佛言微妙而欲以凡夫毫末之智岡自評量是乃用蠡測海持管窺天漫自疲勞所得幾何故必歸命三寶冥希加被威神者如經言佛力不可思議法力不可思議賢聖力不可思議仗三寶力能使愚衷忽成勝智凡口所述冥通聖心也遐邇者兼處與時處則繇一隅以至周遍十方時則繇剎那以至盡未來際皆名自邇及遐也含靈者揀非木石謂一切有情也見聞隨喜者但於此經目覽耳聽以至暫爾隨順生歡喜者皆植善根同生彼國也寂光者如來真淨土生彼國已見佛聞法悟無生忍得自本心寂照不二名常寂光無上果者佛證圓滿大覺超越二乘及諸菩薩此果之上更無過者名無上果是證佛一切種智也經云皆得不退轉於阿耨多羅三藐三菩提則知但得往生畢竟成佛故云同證寂光無上果也乞求加被意蓋如此以上通序一經大意竟二開章釋文二初略標二詳釋初略標將釋此經總啓十門一教起所因二藏教等攝三義理深廣四所被階品五能詮體性六宗趣旨歸七部類差別八譯釋誦持九總釋名題十別解文義此例華嚴疏旨略為十門前八義門後二正釋又此與天台五重玄義大同小異蓋開之成十束之成五稍有詳略云爾二詳釋十初教起所因至十別解文義初教起所因二初總二別初總先明總者謂如來唯為一大事因緣出現於世則一代時教總其大意唯欲衆生開示悟入佛之知見今此經者直指衆生以念佛心入佛知見故大事因緣者引法華經文彼經以如來出世本欲度諸衆生悉皆成佛不得已故權説三乘後至機熟會三歸一方酬本意故知華嚴以後法華以前雖有種種法門淺深不一無非為此大事因緣除此一大事外更無二事今但一心持名即得不退此乃直指凡夫自心究竟成佛若能諦信何須遍歷三乘久經多劫不越一念頓證菩提豈非大事二別別則專就此經復有十義一大悲憫念末法為作津梁故二特於無量法門出勝方便故三激揚生死凡夫令起欣厭故四化導二乘執空不修淨土故五勉進初心菩薩親近如來故六盡攝利鈍諸根悉皆度脫故七護持多障行人不遭墮落故八的指即有念心得入無念故九巧示因於往生實悟無生故十復明徑路修行徑中之徑故釋見下文而生起有序喻如鉤鎖初以衆生迷溺為作津梁二所以能為津梁者為有最勝方便故三何名最勝方便以能直度凡夫故四豈獨凡夫亦度二乘聖人故五豈獨二乘亦度菩薩故六豈獨人中亦普度一切衆生故七豈獨平處度生偏度障難故八雖云度生如是廣大實不離衆生一念得入無念故九既即念得無念亦即生得無生故十通該前九知此持名念佛徑中之徑故又繇是徑中之徑乃能津梁末法故則後先次第終始循環故云鉤鎖初大悲憫念末法為作津梁者佛成道時已當濁世況今末法正入鬬爭轉展陵夷後之又後皆賴此經神力救拔餘生豈非至極悲心預垂濟度已當濁世者人壽二萬歲時即入劫濁釋迦出時人壽百歲久經濁世已為可憫正入鬬爭者前五百年解脫堅固漸次五百禪定多聞而及塔寺今當鬪爭堅固之時更為可憫後之又後者乃至法滅倍更可憫故佛説此經略而計之大悲有三一者佛在世時憐此五濁説難信法是為第一重大悲憫念衆生二者佛滅度後福慧日淺罪障益深故説此經咸令未來雖不見佛佛滅法存但有信者速超生死是為第二重大悲憫念衆生三者如大本言佛滅久遠當來之世經道滅盡獨留此經住世度生最後方滅則知滔天之際尚作慈航大夜方沈猶稱法炬是為第三重大悲憫念衆生也譬之慈父憂念後昆心無盡故置為生計能使遠裔殘支至於家破身貧猶堪資藉故曰至極悲心預垂濟度二特於無量法門出勝方便者入道多門本無揀擇險夷曲直難易攸分則無量門中念佛一門最為方便略陳有四一不值佛世得常見佛方便二不斷惑業得出輪回方便三不修餘行得波羅密方便四不經多劫得疾解脫方便法門者道體幽玄從門始入為門不同故云無量權巧接引令得入門名為方便而言勝者方便中方便也即觀經所謂異也多門者或謂門門可以入道何必念佛往生而有易有難不妨無揀擇中而説揀擇險者崎嶇難行曲者紆回難到喻餘門也夷坦則易行喻念佛人皆可為直捷則易到喻念佛速超生死如韋提希亦遍觀十方世界而惟願生極樂也得常見佛者起信論既示真如三昧及二門止觀竟復云有初學是法其心怯弱以娑婆不常值佛懼謂信心難就如來有勝方便攝護信心謂專意念佛即生佛土常見於佛如修多羅説專念西方極樂世界阿彌陀佛即得往生終無有退此經則七日一心佛現在前是也故知靈山已過龍華未來無佛世中而得見佛是名最勝第一方便得出輪回者繇惑起業繇業感報往來六道輪轉無窮依餘法修直至惑盡始得出離而託質世間升沈未保唯茲念佛帶惑往生以己念力及佛攝受大神力故一生彼國即超三界不受輪轉經云衆生生者皆是阿跋致是也是為最勝第二方便得波羅密者諸菩薩衆有恆沙劫中修六度萬行未能滿足而今一心念佛萬緣自捨即布施波羅密一心念佛諸惡自止即持戒波羅密一心念佛心自柔軟即忍辱波羅密一心念佛永不退墮即精進波羅密一心念佛餘想不生即禪定波羅密一心念佛正念分明即般若波羅密推而極之不出一心萬行具足如大本法藏願云若我成佛國中有情不獲神通自在波羅密多不取正覺是為第三最勝方便得疾解脫者智論云有諸菩薩自念謗大般若墮惡道中歷無量劫雖修餘行不能滅罪後遇知識教念阿彌陀佛乃得滅障超生淨土又十住斷結經云是時座中有四億衆自知死此生彼牽連不斷欲為之源樂生無欲國土佛言西方去此無數國土有佛名無量壽其土清淨無淫怒癡蓮華化生不繇父母汝當生彼故大本云菩薩欲令衆生速疾安住無上菩提者應當起精進力聽此法門是知蟻山風水遲疾天殊古謂欲得一生取辦便於是法留心是名最勝第四方便三激揚生死凡夫令起欣厭者以諸衆生沈迷自性甘受輪回曠劫至今曾無省勵故示苦樂兩土爰開折攝二門激之揚之俾欣俾厭勝心既發淨業斯成若據平等法門非垢非淨則欣厭無地折攝何施但今生死凡夫迷心逐境備歷輪回頭出頭沒甘心忍受曾無一念省發奮勵求願出離而復遮其欣厭欲令直悟自心是猶田蛙井鮒不與之水而反責以沖霄祇益沈淪於事何濟於是無苦樂中示苦示樂苦以折伏樂以攝受折則激其頑迷而令起厭離攝則揚其懈怠而俾生欣樂然後久在泥塗始嫌污穢乍聞淨妙浚起願求此大火聚彼清涼池炎燒衆生不得不避此而趨彼矣方便度生法自應爾生彼國已見佛聞法得無生忍方悟此心本來平等四化導二乘執空不修淨土者良以乍得我空即生耽滯聞説淨佛國土教化衆生心不喜樂故令回小向大發意往生乍得我空者小乘但悟蘊中無我不知蘊亦是空執境為有唯欲避境趨寂故聞淨土化生心不喜樂如諸聲聞不見舍那神力不與菩薩大會以本不讚説十方佛剎清淨功德故古謂小乘無他佛之説大教有剎海之談斯名獨善之流亦號鈍阿羅漢是以教令回斷滅心修淨土行乃知諸佛菩薩悲智行願如是廣大如是無盡心不礙境境不礙心一切諸法本性自空終日度生終日無度而單修禪定不願往生是為大失矣五勉進初心菩薩親近如來者初發心菩薩大心雖建勝忍未成所謂弱羽止可纏枝嬰兒猶應傍母入正定聚親彼世尊方得忍證無生終成佛果乘大願筏苦海度生如智論中説且夫六心墮落塵劫聲聞魚子菴羅足為明鏡故知念佛菩薩之父生育法身乃至十地始終不離念佛何得初心自足不願往生智論云具縛凡夫有大悲心欲生惡世救苦衆生無有是處何以故煩惱強故未得忍力心隨境轉聲色所縛自墮三途焉能救彼假令得生人中聖道難得以施戒福力或作王臣富貴自在縱遇知識不肯信從荒迷放逸廣作衆罪繇此墮落又喻二人救溺直入水救彼此俱溺有方便者往取船筏乘之救接皆得免難新發意菩薩亦復如是要須近佛得無生忍已方能苦海救度衆生如得船者又云譬如嬰兒離母或墮坑井或渴乳死又如弱羽祇可依樹纏枝翅翮成就方能飛空自在無礙凡夫無力唯應專念阿彌陀佛使成三昧臨終正念決定往生見佛得忍還來三界救度衆生正定聚者揀異邪定不定以凡夫邪外已定初心進退未定今生安養無論高下皆不退轉故聚者會也即文中諸上善人之會今謂入此聚中見佛聞法故六心墮落者身子發菩薩心已證別教六住因逢乞眼遂退大心沈淪五道塵劫聲聞者有於大通佛世發心皆因退大塵點劫來墮聲聞位故經云魚子菴羅華菩薩初發心三事因中多及其結果少引此以明初心菩薩猶宜親近如來得所依歸終無退轉故菩薩父者華嚴十一經威光童子覩如來相獲十種益首云得念佛三昧名無邊海藏門疏謂以念佛三昧菩薩之父故首明之良繇菩薩以方便為父念佛即真涉事是方便故又念佛成佛是親種故十地始終者十地文中從初至末地地皆云一切所作不離念佛又云遠行地菩薩雖知一切國土猶如虗空而能以清淨妙行莊嚴佛土如來不思議境界經云菩薩了知諸佛及一切法皆唯心量得隨順忍或入初地捨身速生妙喜世界極樂淨佛土中故龍樹以初地往生摩差末以得忍往生至如文殊普賢等諸大菩薩發願往生莫可勝數況初心乎永明謂欲託質蓮臺永離胎藏生極樂等諸佛國土遊戲神通者皆能了達自心無不化往天如謂汝若悟心則淨土往生萬牛不能挽矣然則初心菩薩雖曰了明去佛尚遠正爾求生不可後也六盡攝利鈍諸根悉皆度脫者諸餘法門高之則下機絶分卑之則不被上根是以華藏如盲螢光增結唯此一法上下兼收可謂萬病愈於阿伽千器成於巨冶豈不慈門廣大普度無遺如盲者如來於逝多林中演大華嚴彼時上德聲聞身子目連等如盲如聾杜視絶聽乃至積行菩薩猶云曝腮明高之則道大機小故增結者淨名經云有二比丘犯根本戒發露求懺優波離為依律定罪疑心不釋淨名言汝毋以常法擾亂其心重增此二比丘罪永嘉擬之螢光謂不能開其迷暗而反增益之也明卑之則機深教淺故他若不淨錯施爐韛數息不利冢人彼此為門亦復各異而淺深小大勢不兼宜惟此念佛法門三輩九品悉皆度脫徹上則三心圓發直入無生徹下則十念成功亦生彼國所謂不離一法巧被諸根豪傑無下抑之羞庸愚有仰攀之益蓋無機不收有情皆攝者也阿伽陀者西域藥名能以一藥總治諸疾喻但持佛名五欲三毒無量煩惱乃至偏乘外道一切見病悉斷除故巨冶者一冶之中陶鑄萬物各成其器喻但持佛名隨彼根行九品往生皆不退故廣大者周易乾曰大生坤曰廣生今無所不度喻如天覆地載並育兼容至慈無擇名普門也七護持多障行人不遭墮落者末世修行多諸障難一虧正見即陷羣邪彼佛願力威神加被行人大光明中不遭魔事能為護念直至道場故知澤圖辟怪寶鏡遁妖正念分明無能嬈者多諸障難者行人於禪觀中擊發陰魔如楞嚴開五十種皆云不作聖心名善境界若作聖解即受羣邪故知正見稍虧邪魔遂熾無益更損求升反沈繇此淺根怖道不學今念佛者以佛大願攝受大力匡持威莫敢干神不可測雖有魔事行將自消又經云念佛之人有四十里光明燭身魔不能犯以阿彌陀佛及十方佛常護念故從今發心直至道場自始至終吉無不利良繇正念分明縱魔來者易識易遣非比耽靜著空中無主宰逢魔不覺遂至入心者也澤圖寶鏡者以此二喻明非但佛力即是自己念力也有神獸名白澤能人言辨萬物之情諸邪望影而避故曰家有白澤之圖必無如是妖怪又山精野魅能變形種種誑惑於人而不能變鏡中之形喻念佛者正念現前智照精朗一切天魔心魔不得便故八的指即有念心得入無念者心本無念念起即乖而衆生無始以來妄想慣習未易卒遣今教念佛是乃以毒攻毒用兵止兵病愈寇平則捨病體更無自身即寇盜原吾赤子起信論云心體離念而起念念佛豈不反擾其心佛藏經云無覺無觀名為念佛無想無語是名念佛而起念念佛豈不反背於佛今謂滅諸覺觀實相念佛理則誠然但以心雖離念而無明染心念念相續如七年之病久亂之民故曰慣習茲欲勉強遏捺立使空寂而止動歸止止更彌動縱粗念暫息細念猶存便謂相應錯謬非小既居凡地未能絶慮忘緣何不即緣慮而作修進故以念還攻於念念一佛名換彼百千萬億之雜念也而妄從真起波逐水生即念即空居然本體非於念外別得菩提故云萬法虗偽唯是一心了悟自心觸目菩提矣喻如病體瘳時便名健體亂民定後即是良民去念而求心是醫必滅身而療病將必屠國而安民也豈理也哉九巧示因於往生實悟無生者七地僅名現相八地乃得無生而亟欲滅生以求無生彌求彌遠今以來生淨土乃悟無生入有得空即凡成聖可謂通玄祕訣換骨神丹僅名現相者華嚴地地皆曰無生而正得乃歸八地其七地云淨無量身口意得無生法忍光明疏謂無生法忍八地所得今茲七地於彼法忍明相現前未為真得如觀經疏以無生即屬初住意略同此乃至八地離一切心意識分別始名真得無生法忍也故知無生聖且難之況凡輩乎彌遠者厭生為患亟欲滅生以歸於無而滅非真滅祇益劬勞終成輪轉如牛壞車古有明喻今專念佛發願往生生彼國已華開見佛識自本心本自不生生亦何礙所謂熾然求生而不乖於無生之理終日生而未嘗生者乃所以為真無生也有生而悟無生故云入有得空生屬凡夫而因生無生故云即凡成聖就路還家潛超密度難思難議故云通玄倐爾轉移如平地升仙白衣驟貴故云換骨捨祕訣而耕空言棄神丹而服狂藥豈不大可哀哉十復明徑路修行徑中之徑者此有二義一者餘門學道萬里迢遙念佛往生古稱徑路而念佛一法復有多門今此持名是為徑路之中徑而又徑鶴沖鵬舉驥驟龍飛不疾不行而速而至徑中徑矣二義者一是較量於多種淨業二是揀別於本部大本故云徑路之徑路也徑路者路小而捷名徑小喻念佛為力之簡易捷喻念佛成功之迅速善導大師偈云唯有徑路修行但念阿彌陀佛是也故云餘門學道名豎出三界念佛往生名橫出三界如蟲在竹豎則歷節難通橫則一時透脫餘門之比念佛則念佛為速矣念佛復有多門者如後文中所開實相念佛四種乃至萬行回向等實相之佛雖云本具而衆生障重解悟者希下此數門觀像則像去還無因成間斷觀想則心粗境細妙觀難成萬行則所作繁多重處偏墜唯此持名一法簡要直捷但能繼念便得往生古人謂既得見彌陀何愁不開悟則不期實相而實相契焉故念佛為修行徑路而持名又念佛中之徑路也鶴沖已過凡禽爭如鵬舉驥驟雖超羣馬未及龍飛皆上喻念佛下喻持名念佛也不疾不行者易繫詞曰易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此唯神也不疾而速不行而至意謂疾而後速行而後至者物之常也蓍卦之體寂無思為而有感即通是不疾而速不行而至妙萬物而謂之神也引此以明諸門念佛雖同曰往生而為力稍難為時稍久是須行須疾乃至乃速也今則不稽歲月不假作為七日一心即生彼國何其神妙一至是也故普賢行願品鈔云大藏中數百餘本或經或論説修彼因然皆勤積乃得往生今但稱名便登不退豈非徑而復徑者哉二者無量壽經廣陳依正備載修持今此經者崇簡去繁舉約該博更無他説單指持名但得一心便生彼國可謂愈簡愈約愈妙愈玄徑中徑矣無量壽經詳見部類譯釋二門以對今經世稱大本蓋部同而廣略異也彼為樂廣者説此為樂略者説然辭簡而理益明事約而功倍勝如大本廣談諸福而此經謂但持名號即為多福多善大本猶分三輩而此經謂但生彼國俱得不退菩提是則不獨為種種念佛門中之要又於本部中轉更為要可謂妙中之妙玄中之玄徑而復徑者矣如上別中十義復以前九為通後一為別兼前總義為此經教起之所因故通者通明淨土諸經皆同此因故別者別明此經專重持名以持名為因故總者即前總明一切諸經皆一大事以為因故言佛説此經為教衆生念佛為教衆生持名念佛為教衆生持名念佛而入佛知見以了此一心大事而已合之為此經教起之所因也二藏教等攝三初藏攝二教攝三分攝初藏攝已知佛説此經有如是因未知此經藏教分中各何攝屬言藏有二一三藏二二藏且初三藏者一修多羅藏二毗奈耶藏三阿毗達磨藏今此經者是修多羅攝諸經亦有互相攝者今非彼故梵語修多羅此云契經名為經藏解見後釋題中毗奈耶此云調伏即律藏阿毗達磨此云對法即論藏上二俱有多義非急不引修多羅攝者此經在經律論三藏中屬經藏故互攝者如華嚴則經攝而兼律論以十藏等品顯戒律問明等品顯論議故梵網則律攝而兼經以心地品之上廣談菩薩階位故餘可例知此經不兼戒律亦無論議自始至終專説念佛求生淨土故云今非彼也二藏者一菩薩藏二聲聞藏今此經者菩薩藏攝亦有互攝今非彼故菩薩聲聞詳見後釋文中藏分二者以經有大乘小乘故二藏分攝若約人有三乘亦合分三以緣覺人多不藉教攝歸聲聞故止二藏今菩薩藏攝者此經演説大乘如依正莊嚴信願往生等皆自利利他菩薩淨佛國土教化衆生之道故互攝者如華嚴菩薩藏攝亦通聲聞以能包含無量乘故今經二乘種不生故云非彼或問何得文中彼佛有聲聞弟子答此暫有終無至下釋文中當辨又問厭苦趨樂以專自利何名菩薩答求生淨土正為見佛聞法得無生忍已還來此世救苦衆生是菩薩行非聲聞道如天台十疑論中説二教攝教者依賢首判教分五謂小始終頓圓今此經者頓教所攝亦復兼通前後二教五教者一小乘教所説唯是人空縱少説法空亦不明顯以依六識三毒建立染淨根本未盡法源故二大乘始教繇第二時但明於空第三時定説三乘不許定性闡提成佛未盡大乘至極之説故名為始有成佛有不成佛復名分教所説則廣談法相少及法性其所云性亦是相數以依生滅八識建立生死及涅槃因諸義類故三大乘終教繇出中道妙有定性闡提皆當作佛方盡大乘至極之説故名為終稱實理故復名實教所説則多談法性少及法相其所云相亦會歸性以依如來藏八識隨緣成立諸義類故四頓教總不説法相唯説真性一念不生即名為佛無漸次故五圓教統該前四圓滿具足所説唯是無盡法界性海圓融緣起無礙相即相入帝網重重主伴交參無盡無盡故以上詳如華嚴玄中恐煩不敘言頓教攝者如後義理中辨亦通前後者通前終教以一切衆生念佛定當成佛即定性闡提皆作佛故通後圓教者亦義理中辨三分攝分者十二分教如修多羅祇夜等今此經者修多羅優陀那二分攝故分者分齊以一代時教別其分齊各有所屬也祇夜此云重頌優陀那此云無問自説十二部恐煩不敘言二分攝者一修多羅攝以是契經故二優陀那攝以不待請問自告身子故三義理深廣三初攝頓二分圓三旁通初攝頓已知此經攝於頓教少分屬圓未知所具義理當復云何先明此經攝於頓者蓋謂持名即生疾超速證無迂曲故正屬於頓正屬頓義者以博地凡夫欲登聖地其事甚難其道甚遠今但持名即得往生既往生已即得不退可謂彈指圓成一生取辦如將寶位直授凡庸不歷階級非漸教迂回屈曲之比故屬頓義或難頓教一念不生即名為佛五法三自性皆空八識二無我俱遣今持名念佛是為有念云何名頓答以一心不亂正謂無念若有念者不名一心但得一心何法不寂五法者謂一名二相三妄想四正智五如如三自性者名相是妄計性妄想是緣起性正智如如是圓成性八識者賴耶末那及眼等六合之成八二無我者人無我法無我以上亦皆入五法中詳見入楞伽諸經悉空悉遣所謂佛身無為不墮諸數一念不生即名為佛者頓教之旨也今言念佛則所稱佛號屬名所對佛身屬相憶念彼佛屬妄想縱使淨念相繼入三摩地亦屬正智如如而復分別是佛屬識情能念所念屬人法尚未遣有我況無我亦遣耶彼教所空所遣此皆有之以其有念故難非頓正謂無念者良繇一心不亂則不以有心念不以無心念不以亦有亦無心念不以非有非無心念離此四句更有何念雖名念佛蓋無念之念也念而無念是名一心如是之心心無其心強名曰一尚無一相安求所謂五者三者八者二者然則一心不亂不異一念不生焉得非頓二分圓分屬圓教者圓之為義謂四法界中前三通於諸教後一獨擅乎圓今此經者圓全攝此此分攝圓得圓少分分屬圓故四法界者一事法界二理法界三事理無礙法界此三諸教所有四事事無礙法界唯華嚴一經有之名為別教一乘以事理無礙同頓同終事事無礙不同彼二揀乎同教一乘故名為別非藏通別圓之別也今謂分攝乎圓者以華嚴全圓今得少分略説有十一華嚴器界塵毛形無形物皆悉演出妙法言音此則水鳥樹林咸宣根力覺道諸法門故二華嚴一微塵中具足十方法界無盡莊嚴此則如大本云於寶樹中見十方佛剎猶如鏡像故三華嚴不動寂場遍周法界故云體相如本無差別無等無量悉周遍此則如大本云阿彌陀佛常在西方而亦遍十方故四華嚴喻藥王樹若有見者眼得清淨乃至耳鼻六根無不清淨衆生見佛亦復如是以見圓覺佛聞普門法神力乃爾此則阿彌陀佛道場寶樹見者聞者六根清淨故五華嚴八難超十地之階此則地獄鬼畜但念佛者悉往生故六華嚴一即一切故如來能於一身現不可説佛剎微塵數頭一一頭出爾所舌一一舌出爾所音聲乃至文字句義充滿法界此則如大本云彼國無量寶華一一華中出三十六億那由他百千光明一一光明出三十六億那由他百千佛普為十方説一切法故七華嚴舍那釋迦雙垂兩相此則如觀經云阿彌陀佛現六十萬億那由他恆河沙由旬之身而又見丈六之身於池水上故八華嚴以盧舍那佛為教主此則如清涼云阿彌陀佛即本師盧舍那故九華嚴名大不思議淨名諸經名小不思議此則亦名不可思議功德故十華嚴為教即凡夫心便成諸佛不動智此則不越稱名佛現前故是則齊等淨名諸經同為華嚴流類圓教全攝此經此經分攝圓教以少分義故名分圓也三旁通二初觀經二諸經初觀經先明通觀經者有言十六觀門名為定善執持名號名為散善今為通之於中有二一總二別先明總者彼經妙觀宗乎一心此經一心正符彼意一心作觀一心稱名何得同歸一心揚彼抑此詳如淨覺疏中説旁通者不別頓圓但取諸大乘經義理相通以十六觀是淨土專經故先舉也定散者孤山判十六觀為定善此經持名為散善今謂一心不亂有事有理即事一心已非全散何況理一正符彼意者彼經三觀即空即假即中超乎次第是為一心今經執持名號一心不亂則能持所持了不可得是名空觀正當空時能所歷然是名假觀非假非空常空常假不可思議是名中觀良以單提聖號直下一心有何次第正三觀圓修之義也是則彼經以心觀為宗此經以心念為宗觀即念也念即觀也兩經所説既同一心何獨此經抑之為散故此法門名念佛三昧亦名一行三昧亦名諸佛現前三昧亦名般若三昧亦名普等三昧三昧之言定也既通多種三昧何得為散大要觀想若非一心觀亦成散持名若得一心持即成定不在觀想持名而在一心與不一心也如淨覺疏者疏云智者大師於觀經以三種淨業屬散十六妙觀屬定未聞以持名為散也孤山判此經為散善豫不韙彼説且普門品疏釋一心稱名有事有理存念觀音無有間斷名事一心若達此心四性不生與空慧相應名理一心普門無不亂二字智者尚作空慧釋之今云一心不亂何得貶為散善愚按智者入滅唱三寶名章安臨終亦稱彌陀及二大士彼師資自行如斯必不散判稱名於是益信次明別者或謂此經但聞佛名或謂此經佛是劣應或謂此經華局車輪或謂此經五逆不生或謂此經止屬下品不知二經實一義故不知此經尤獨要故但名者或謂觀經教想彼佛相好此經但持四字空名則不見佛身故名散善然經云阿彌陀佛與諸聖衆現在其前既佛現則寧無相好況與衆則主伴齊彰蓋彼以作觀見佛此以持名見佛為因不同見佛則一劣應者或謂觀經言佛身高六十萬億那由他恆河沙由旬此經不説疑是劣應故名散善然大本云爾時阿彌陀佛放大光明普照一切世界阿難見佛容體巍巍如黃金山高出一切諸世界上則觀經所説猶一世界今言一切世界則更為高大何得言劣又大本言阿彌陀佛道場寶樹純以衆寶自然合成則非木菩提樹下之身何得言劣又觀經言彼佛或現丈六八尺或現大身滿虗空中則隨機所見大小無定故古謂即劣即勝生法不二而況今經不出大小何得定指為劣華局車輪者或謂觀經華大十二由旬此經車輪華局於小故名散善不知車輪之義大小無定大本車輪大至百千由旬何止十二詳如後文中辨五逆不生者或謂觀經言五逆得生大本唯除五逆則濟度功狹故名散善不知唯除五逆下有誹謗正法四字五逆而兼謗法乃在所除雖具五逆不謗法者未必不生也良繇謗則不信不信不生故所謂疑則華不開是也觀經不言謗法如兼謗者亦不生也又觀經下下品五逆文中謂其人十聲稱名遂得往生則觀想未成唯資十念五逆之生正稱名得生耳況大本云地獄鬼畜生亦生我剎中墮地獄者非五逆人而何止屬下品者或謂觀經下之三品初言智者教令合掌叉手稱南無阿彌陀佛三言善友教云汝若不能念彼佛者應稱名號則持名往生似唯下品不知持有事理理復淺深今下生者僅是事善若成理觀則與彼經三觀圓修冥契不二何慮品位之不高也況下品文中乃指惡人愚人非謂善人智人持名亦居下品也故知二經其義一也獨要者略有三意一者觀經所明佛身雖云即報即法而那由恆沙不無數計生身尊特猶待辨疑此經但曰光明無量壽命無量則不屬諸數直指法身獨要一也二者十六妙門雖云即觀即心而先日次水次地次樹次座方入佛觀則不無次第猶覺繁長此經不修餘業單事持名倐爾一心便得佛現獨要二也三者上三品生乃能遊歷十方承事諸佛中下二品皆無此文今持名往生便得供佛諸方食時還國獨要三也聞説一義尚恐生疑更聞獨要必致深駭故云難信之法又云不可思議功德經也二諸經復明通諸經者與諸大乘經意義相通如淨名法華等旁通如是乃知此經義理所該深邃廣遠不應視同淺近自取愆尤淨名法華等者此一心持名得生彼國即隨其心淨則佛土淨是淨名義又此一心持名即以深心念佛乃至獨入他家一心念佛乞食無侶一心念佛一稱南無佛皆已成佛道是法華義等者略舉餘經如文殊所云一行三昧大品所云若人散心念佛乃至畢苦其福不盡是般若義如經三七日稽首十方諸佛名字是圓覺義如五百長者子稱七佛名遂得見金色之身成阿羅漢是觀佛三昧義如菩薩六念念佛第一又云繫念思惟因緣力故得斷煩惱是涅槃義如佛告父王汝今當念西方極樂世界阿彌陀佛常勤精進當得佛道又云十心向往命終必生彼佛國土是寶積義至如華嚴圓義相通已見前文念佛之義不可勝舉如上且就一經大旨而言泛論經義則維摩丈室容八萬四千師子之座今此淨土十方往生猶如雨點皆生七寶池中曾無窄隘即淨名義如來神力品釋迦與十方諸佛同出廣長舌相乃至梵天為讚歎法華故今此六方讚歎亦復如是即法華義略舉少分通諸大乘餘不繁敘又起信因緣分疏明信位初心有四種機以禮懺滅罪被初機以修習止觀被中機以求生淨土被上機初謂業障衆生中謂凡夫二乘則知淨土是大乘菩薩所修矣義理所該總結上文愆尤者輕毀此經即輕毀大乘獲罪無量故四所被階品二初料簡二總收初料簡已知此經文略義豐言近旨遠未委被何根器有何階等先明料簡前三非器謂無信者無願者無行者反是皆器先明根器有是有非次別階等有勝有劣欲令捨非從是棄劣取勝也信謂信生佛不二衆生念佛定得往生究竟成佛故如經所云汝等皆當信受我語是也願謂信非徒信如子憶母瞻依向慕必欲往生故如經所云應當發願生彼國土是也行謂願非虗願常行精進念念相續無有間斷故如經所云執持名號一心不亂是也此之三事號為資糧資糧不充罔克前進又復此三如鼎三足或俱無或具一缺二或具二缺一皆不可也又以喻明譬之五穀其無信者不信即種是穀栽培此種定得成穀者也信而無願者雖知佳種無心求穀者也願而無行者雖望得穀不事耕耨者也俱無互缺準上可知此三者皆羸劣破漏之器不堪承受甘露法味故名非器又復世人雖行衆善於彼佛土無信行願亦名非器雖有諸過於彼佛土有信行願亦名為器反是皆器如下所明於是器中輩之品之成三成九九之又九三之又三又細分之復應無量如二部中説次明階等也輩者大本三輩品者觀經九品故曰三九三輩之中復三輩之則成九輩九品之中復九品之則成八十一品輩之無窮品之不已則成百千萬億輩品故曰復應無量所以然者均名念佛同一往生而修有事理功有勤惰隨因感果地位自別故涅槃説十二因緣曾無二法而下智觀者得聲聞菩提中智觀者得緣覺菩提上智觀者得菩薩菩提上上智觀者得佛菩提是則諸天共器食有精粗三獸同河渡分深淺焉可誣也儻其自負利根聞説念佛若將浼焉寧知輩品天淵存乎其人而已終不念佛鈍置汝也好奇負勝之士幸平氣而思之二總收總收者但持佛名必生彼國則或高或下或聖或凡乃至或信或疑或讚或毀知有彼佛便成善根多劫多生俱蒙解脫高下者以下品即登彼岸下品猶勝天宮則品位雖殊皆得不退故聖凡者以具縛凡夫但得往生即與諸大菩薩俱會一處則終當成聖故此專舉其順者下言信疑讚毀則兼違順無不獲益也問信讚應爾云何疑毀亦曰善根答常不輕授記諸人皆當作佛人疑不信乃至打罵因墮地獄從地獄出終得成道豈非罵打從疑而生疑從知生知從聞生聞知有佛然後生疑曾未聞知疑從何發因聞知故佛之一字已蘊識田投種土中雨露忽滋終有生日彼毀佛者義亦如是故曰但知有佛皆成善根畢竟解脫不聞不知則不成種五能詮體性四初隨相二唯識三歸性四無礙初隨相已知此經被機普遍未知能詮何為體性依古展轉十門推本約之成四先明隨相於中復二一謂聲名句文二謂所詮義以文與義皆屬相故十門展轉詳見華嚴玄談圭峯復於中約而束之遂為四門初聲名句文者據大小乘教或以聲為教體或以名句文身而為教體今依清涼大師通收四者以聲為教主名者次第行列詮法自性句者次第安布詮法差別文者次第聯合上二所依此名句文三者屈曲為聲上詮表唯聲則不能詮義唯名句文則無自體兼此四事是謂教體以假實體用兼資也二所詮義者此聲名句文若無所詮之義則同乎篇韻殊無意況若徒義無文妙理憑何而得顯示良以文隨於義義隨於文文義相資乃成教體故今此經從如是我聞至作禮而退是聲名句文體而其中所説依正二報信願往生等是所詮義也以是二者交相隨故而為教體又若據法所顯義則無非佛事如香飯光明等當知法法皆為教體法能顯義則法法自彰不俟文字如華嚴雲臺寶網毛孔光明皆能説法淨名云有佛世界以香飯而作佛事有佛世界以光明而作佛事乃至一色一香一舉一動無有一法而非佛事等今此經者水鳥樹林咸宣妙法則隨舉一法皆成教體二唯識唯識者此文此義皆識所變而有本影四句四句者一唯本無影即小乘教不知教法皆唯識現謂如來實有説法故二亦本亦影即始教以佛自宣説若文若義皆從妙觀察智淨識所現名本質教聞者識上所變文義名影像教諸佛衆生互為增上故三唯影無本即終教以離衆生心更無有佛唯大悲大智為增上緣令彼根熟衆生心中現佛説法是故佛教全是衆生心中影像四非本非影即頓教非唯心外無佛衆生心中影像亦空以性本絶言即不教之教所謂尊者無説我乃無聞説聽皆無唯識而已是以識為教體也今此經者且約終頓二教則衆生心樂出離自於心中見佛為説極樂依正信願往生而實無説無聽故識為教體三歸性歸性者前以所變之萬境攝歸能變之八識今以所現之八識復攝歸能現之一心則性為教體一心者即真如自體也從此真如流出教法故會相歸性則所謂重頌如授記如十二分教一切皆如以上展轉推尋真實之理極至於此譬之物不離夢夢不離人圓覺疏云生法本無一切唯識識如幻夢但是一心則以自心為教體也今此經者依正信願等法若文若義究極皆歸一心真如故古德云諸大乘經皆以一實相印為經教體此經一心不亂即是實相即是真如則合前二種會歸一心而為教體四無礙無礙者心境理事本自交徹境及事者是名隨相心者唯識理者歸性俱交徹故交徹者以一心原有真如生滅二門真如即是生滅故理不礙事境心生滅即是真如故事境心不礙理今此經者心即是土則一念無為而不妨池樓鳥樹昭布森列衆生信樂隨願往生土即是心則七寶莊嚴而不妨全體空寂不立一塵實無衆生生彼國者則心境理事互相融攝而為教體也六宗趣旨歸三初總陳二異解三正意初總陳已知此經能詮之體如是該羅未審所宗當在何者夫語之所尚曰宗宗之所歸曰趣而有通別通論佛教因緣為宗別則依古十門自我法俱有至圓融具德後後前前次第深淺是故諸經各有宗趣尚者崇也聖人立教一部語言何所崇尚所崇尚者名之曰宗歸者至也立此為宗為求何事究所歸至名之曰趣因緣者揀異無因邪因一代時教不出因緣如所謂因緣故生滅因緣故即空因緣故即假因緣故即中佛教所宗因緣攝盡故云通也十門者第一我法俱有宗內執有我外執有法名為附佛法外道第二法有我無宗則異外道繇是從前至後繇淺入深乃至第十圓融具德十門分別詳具華嚴玄談若約之為五不出有空法相法性圓融今此經者宗乎法性以淨土依正信願等皆歸一心一心不亂即法性故二異解今明此經古有多解有謂信願為宗有謂超過三界二種清淨為宗令諸衆生得不退轉為趣信願為宗者諸解多同以經中屢言若有信者應當發願生彼國土故二種清淨者論言極樂世界依正二報清淨莊嚴非三界所及故以為宗而要其所歸為令衆生生彼清淨極樂國土生彼國已即不退轉以此為趣三正意二初總舉二別明初總舉此經宗乎法性於法性中復分總別總而合之謂是依正清淨信願往生以為宗趣取前二説兼合言之總為宗趣以前説不該依正後説未詳信願故須兼合始得無遺良繇依正信願兼備交資而得往生皆不出自心故其總為宗趣者如華嚴例彼經亦兼衆説總因果緣起理實法界以為宗趣故若欲分之上句為宗下句為趣義亦自明若欲加之彼經加不思議今經亦爾二別明又別明之則成五對一教義二事理三境行四行寂五寂用以為宗趣一教義一對者以教為宗令達義為趣言崇尚此念佛往生之教其意云何正欲曉會經中所説阿彌陀佛正報依報清淨莊嚴信之願之則生彼國教中有如是義是其趣也不徒為語言文字而已二事理一對者以事為宗令顯理為趣承上一經言教俱約所詮之義而義中復有事理言崇尚此依正信願等事其意云何正欲顯發事中所具至理是其趣也不徒為事緣之迹而已三境行一對者以境為宗令起行為趣境即是所觀之理對能觀之智故名為境言崇尚此理其意云何既知彌陀自性淨土唯心正欲即此以為真境而起觀行執持名號一心不亂是其趣也不徒為曉達此理而已四行寂一對者以行為宗令至寂為趣言崇尚此念佛觀行其意云何良繇心雖本寂多生習染觸境生心若不修觀行縱令強抑妄心終非定慧平等今依正觀執持名號至於一心則復還空寂之體是其趣也不徒為有作妄計而已五寂用一對者以寂為宗令發用為趣言崇尚此寂其意云何良繇妄想執著無繇解脫妄盡心一則淨極光通喻如塵盡鏡明無像不現所謂既生本國得無生忍已還入生死以無數方便大作佛事度脫衆生妙用恆沙是其趣也不徒為沈空滯寂而已如是十門展轉生起以為宗趣七部類差別三初明部二明類三非部非類初明部已知此經宗趣沖深未審當部等類為有幾種初先明部者部有二種一謂大本二謂此經部者以是總歸一部而有詳略詳為大本略為此經大本有六一名無量平等清淨覺經後漢支婁迦讖譯二名無量壽經曹魏康僧愷譯三名阿彌陀經與今經同名吳支謙譯四名無量壽莊嚴經宋法賢譯五出寶積第十八經名無量壽如來會元魏菩提流志譯六名佛説大阿彌陀經宋龍舒居士王日休者總取前之四譯參而會之唯除寶積彼所未及然上五譯互有異同漢吳二譯四十八願止存其半為二十四其餘文中大同小異王氏所會較之五譯簡易明顯流通今世利益甚大但其不繇梵本唯酌華文未順譯法若以梵本重翻而成六譯即無議矣故彼不言譯而言校正也又其中去取舊文亦有未盡如三輩往生魏譯皆曰發菩提心而王氏唯中輩發菩提心下曰不發上竟不言則高下失次且文中多善根全在發菩提心而三輩不同同一發心正往生要旨乃反略之故云未盡然今疏鈔所引義則兼收五譯語則多就王文以王本世所通行人習見故餘五間取而槩以大本標之故上六種皆名大本今此經者名為小本文有繁簡義無勝劣判屬同部二明類二明類者自有三種一觀經二鼓音王經三後出阿彌陀偈經類者不同其部而同其類如從昆弟雖不同父而同其祖亦名比肩相為等夷故曰同類觀經者觀無量壽佛經具談十六妙門一心三觀詳本疏鈔鼓音王經者佛在瞻波大城伽伽靈池與比丘百人説中云若有四衆受持阿彌陀佛名號臨命終時佛與聖衆接引往生等後出偈經者始終唯偈是伽陀部中云發願喻諸佛誓二十四章願止存半與漢吳二譯同而四十八願自古及今傳揚已久二十四者或梵本缺略未可知也或問鼓音亦説持名云何不與今經同部答以有呪故彼經雖説持名重持呪故三非部非類三明非部類者帶説淨土如華嚴法華及起信等又非部類而中説專持名號如文殊般若帶説者諸同部同類之外復有諸經雖不專談淨土其中帶及勸讚往生也華嚴如行願品既明十大願王而末言以此十願導歸極樂是也法華如云誦斯經者命終當生阿彌陀佛極樂世界是也起信如前教起中所明是也等者如觀佛三昧十住斷結諸經帶説淨土層疊非一詳如後釋文中雜引文殊般若詳後執持名號文中八譯釋誦持五初明譯二明釋三明誦四明持五結勸初明譯已知此經為部為類詳略同別未委譯自何時凡有幾譯以至注釋闡揚讀誦受持有何靈驗初明譯者有二一名佛説阿彌陀經即今經姚秦三藏法師鳩摩羅什譯姚秦者周有嬴秦南北朝有苻秦姚秦今言姚者揀非餘秦也三藏者通經律論兼善華梵故法師者佛法所屬演揚誨衆為表範故鳩摩羅什者梵語具云鳩摩羅耆婆什上五字此云童壽什者深善此方文字之什華梵合舉稱羅什也譯者易也易梵成華也周禮掌四方之語各有其官北方曰譯今經自西來而言譯者漢之北官兼善西語摩騰始至遂稱為譯今仍之也按本傳師中天竺國人父名鳩摩羅琰家世相國棄榮出遊龜茲王以妹妻之生師師生而神靈七歲隨母入寺見鐵鉢試取加頂俄念此鉢甚重我何能舉即不勝重遂悟萬法惟心博學強記人莫能及以沖年高德故云童壽既通三藏東遊龜茲王設金獅子座處之苻堅據秦將事西討適太史奏異星現於西域分野當有大德智人入輔中國堅云朕聞龜茲有羅什者得非此耶遣將呂光臨發謂曰朕非貪地用兵聞羅什深解法相為後學宗若克龜茲即宜馳驛送什及破龜茲載什以歸中道聞堅已為姚萇所害遂止不返什師因不至秦後萇亦聞師名要請而光不允萇亡子興復請亦不允因遣兵伐光光姪降秦方得迎師入關奉為國師師閲舊經義多紕僻不與梵本相應乃集沙門肇睿等八百餘人新譯經論三百九十餘卷並暢神源發揮幽致師未終少日集衆謂曰願所宣譯傳之後世咸共流通今於衆前發誠實誓若所傳無謬當使焚身之後舌不焦爛以弘始十一年八月二十日卒於長安闍維薪滅形盡舌根儼然今此經者譯於什師而舌根不壞與諸佛出廣長舌讚歎此經合而觀之佛語不虗於是益信二名稱讚淨土佛攝受經唐三藏法師玄奘譯二經聯比小異大同時所宗尚皆弘秦本玄奘法師者唐洛州緱氏人姓陳氏少罹患難隨兄長腱法師出家於淨住寺年十一誦維摩法華卓然自立不偶時流年二十一講心論不窺文相涌注不窮時號神人貞觀三年往西域取經備經險難歷百五十國遂至舍衛取經六百餘部貞觀十九年還京於玉華臺翻譯經論總一千三百三十卷既臥疾見大白蓮華及佛相右脅纍足而逝兩月色貌如生先是西行之日撫靈巖寺松而作誓言吾西去汝西長吾東歸汝東向師去松西長至於數丈一日忽東回門弟子喜曰師歸矣已而果然時號摩頂松云按師誓言自要不爽如是真語實語亦什師舌根不壞諸佛舌相廣長意也所譯此經焉可不信聯比者先後重譯也小異大同者梵音稍別及語有繁簡如恆河殑伽六方十方之類而大意一無相乖也皆弘者法華三譯秦本盛行此經二譯亦復如是二明釋次明釋此經者論則有天親菩薩無量壽經論解則有慈恩通贊海東疏孤山疏乃至大佑略解等天親菩薩者常入日光定升兜率天宮內院親覲慈氏造無量壽經優婆提舍優婆提舍者此云分別義慈恩法師者諱窺基姓尉遲氏敬德猶子也奘師度之出家學通大小造疏計可百卷釋彌勒下生經筆鋒得舍利二七粒復示西方要義有彌陀經通贊一卷海東法師者諱元曉其疏此經大率依論為主孤山圓法師者十疏流通此疏居一義淵淨覺越溪等歷代諸師種種解釋率多散沒至元大佑師者乃有略解今唯海東越溪大佑所解僅存而已世遠人亡經殘教弛遂令如是廣大深遠法門不得人人曉了寧不悲夫若夫遠承佛旨弘闡祕宗為論為文為集為録為傳為偈為賦為詩交讚互揚其麗不億莫不叮嚀懇告感慨悲歌普勸迷流同歸覺路一曾過目可弗銘心上文專指注釋此經今謂其餘讚詠淨土所有言辭不可勝紀為論如十疑寶王等為文如龍舒無盡等為集如決疑指歸等為録如淨土自信等為傳如淨土略傳等為偈如徑路修行等為賦如神棲安養等為詩如諸家懷淨土等告而曰懇真誠之語冀其信受而奉行也歌而曰悲淒楚之辭或能感發而興起也麗數也不億者億不足以盡之言多也此皆淨土聖賢千言萬語不厭繁重直欲生死海中盡挈衆生於彼岸而後已我等應當銜恩報德鏤骨銘心展轉流通遞相勸導如其置而不覽覽而不信不曰愚蒙之訓則曰寄寓之談獨且奈之何哉三明誦次明誦此經者如舌根不壞天樂西迎方解冤而往生未終卷而坐脫歸如入定終覩白蓮銀臺而易金臺粗樂而來細樂舌根不壞者智論云有比丘誦彌陀經命欲終時語弟子言阿彌陀佛與諸大衆俱來迎我後從火化舌根不灰色相自若天樂西迎者宋唐世良誦彌陀經十萬過一日謂家人曰佛來迎我言已作禮坐逝其夜有利行人在道味山上夢西方異光幡華繽紛音樂嘹喨空中聲云唐世良已生淨土解冤往生者宋上虞民馮珉少事遊獵見巨蛇持矟將往刺之時蛇在巖下欲噬黃犢珉推巖石壓之至死蛇屢為祟珉修懺念佛經年蛇不能害一日請同社淨侶誦彌陀經合掌而化未終坐脫者晉智仙法師號真教住白蓮寺十三年西向十念十二時不暫廢一夕微疾命觀堂行人誦彌陀經未終卷安然坐脫歸如入定者宋釋處謙精修淨土一夕誦彌陀經畢稱讚淨土告衆曰吾以無生而生淨土如入禪定奄然而化終覩白蓮者宋嘉禾郡鍾嫗日誦彌陀經十遍念佛不輟一日語其子曰見白蓮華無數衆聖迎我遂端坐聳身化去銀臺金臺者懷玉禪師台州人布衣一食常坐不臥精進念佛誦彌陀經三十萬遍一日見西方聖衆多若恆沙一擎銀臺從窗而入玉曰吾一生精進誓取金臺何為得此銀臺遂隱玉感激倍復精進三七日後見佛滿空中乃謂弟子曰金臺來迎吾生淨土矣説偈含笑而逝郡守段公異之作詩讚美有枝低只為罣金臺之句云粗樂細樂者元子華禪師大歷九年於潤州觀音寺誦彌陀經六月忽得疾夜聞香氣樂音空中告曰粗樂已過細樂續來君當往生良久念佛而化異香連日不散又若書寫則化被蒼生講演則祥符白鶴書寫者唐善導大師凡得嚫施用寫彌陀經十萬卷勸人受持亦有讀誦至十萬遍者五十萬遍者僧俗歸仰至有感極焚身供養得念佛三昧者不可勝紀講演者宋沈三郎晚歲回心念佛因病請僧講彌陀經易衣而終縮膝欲起二子局於名教以易龕為難曳其脛直之將入殮忽舉首出衣被矍然而坐舉家大驚二子急前扶衛乃以肘節捶之子曰助父坐脫耳竟坐逝茶毗有白鶴二十九隻飛鳴雲表久之西去現前感應則寶地遙觀剋取往生則涅槃非比如斯感應屢見古今寶地遙觀者唐大行禪師初修普賢懺後入大藏隨手取卷得彌陀經日夜誦詠至三七日覩琉璃地上佛及二大士現前僖宗聞其事詔入內庭賜號常精進菩薩後琉璃地復見即日命終異香經旬肉身不壞涅槃非比者梁道珍法師講涅槃經天監中憩錫廬山慕遠公淨業禪坐中忽見海上數百人乘寶舫前邁師問何之答曰往極樂國因求附載報云法師雖善講涅槃經亦大不可思議然未誦彌陀經豈得同往師遂廢講念佛誦彌陀經及二萬遍將終四七日前夜四鼓見西方銀臺來至空中皎如白日聲云法師當乘此臺往生時衆咸聞天樂異香數日香猶未散其夜峯頂寺僧遙見谷口火炬數十明燎徹夜次日乃知師逝如上所録皆修因證果此感彼應疊見層出自古及今未及枚舉四明持若持名者或一念而飛一光或一聲而出一佛或響彌林谷或音徹宮闈或六時繫念而依正盈空或十字標心而聖賢入會洎乎昭代續有名流此正明執持名號也淨業諸賢多不繁載姑舉昭灼世人耳目者一二以為激勸飛光者唐善導大師人問念佛得生淨土否答曰如汝所念遂汝所願於是導乃自念阿彌陀佛一聲則有一光從其口出十聲至百光亦如之光明滿室帝聞其事敕所居為光明寺後登柳樹端坐而化出佛者少康法師在烏龍山建淨土道場勸人念佛衆見師念佛一聲口出一佛至於十念十佛次出猶若連珠臨終之日口旋異光數道奄然而逝響彌者唐道綽禪師平居為衆講無量壽經將二百遍人各掐珠口稱佛號或時散席聲播林谷音徹者唐法照於并州五會念佛感代宗皇帝宮中聞念佛聲遣使遙尋見師勸化之盛遂詔入宮宮人念佛亦及五會號五會法師六時者晉慧遠法師居廬山製蓮華漏六時念佛澄心繫想後十九年七月晦夕於般若臺方從定起見阿彌陀佛身遍虗空圓光之中無量化佛及菩薩衆水流光明演説妙法佛言我以本願力故來安慰汝汝七日後當生我國至期端坐而逝十字者宋長蘆宗賾禪師禪理洞悟宗説兼通而遠遵廬阜之規建蓮華勝會其法日念阿彌陀佛或千聲萬聲各於日下以十字記之一夕夢一男子烏巾白衣風貌清美謂賾曰欲入公彌陀會乞書一名賾問公何名曰普慧又云家兄普賢亦乞登名言訖遂隱賾覺而語諸尊宿皆云華嚴離世間品有二菩薩名乃知聖賢幽贊以二大士書於録首昭代者今代也如西齋空谷天奇毒峯等皆近世高僧篤信精修匹休前古相續不絶稍詳往生集中蓋千萬中紀其一二而已至於感護則宿冤得度惡鬼不侵靈應則瞽目重明俘囚脫難冤度者唐邵彪鎮江人為諸生時夢至一公府主者問汝知所以不第否彪對不知因使人引彪前行見大鑊中有蛤蜊作人語呼彪名彪怖遂念阿彌陀佛蛤蜊變黃飛去彪後及第官至安撫使鬼却者佛世有一國鄰於羅剎羅剎食人無度王約自今國中家以一人次第送與勿得枉殺有奉佛家止生一子次第充行父母哀號囑令至心念佛以佛威力鬼不得近明晨往視見子尚在將之而還自是羅剎之患遂息目明者宋崇氏女雙瞽念佛三年精勤不替雙目重明如故難脫者元末張士誠攻湖州江浙丞相與戰擒四十人囚檻送戮夜宿西湖鳥窠寺大猷謀禪師徐步廊下囚見師神觀間雅持誦不輟因求救拔師教令至心念南無救苦救難阿彌陀佛中有三人信受其語念不絶口天曉發囚易枷鎖至三人刑具不足惟繫以繩既而審鞫知良民被虜者遂得釋又復惡人則善和十念地獄現而化佛空迎畜生則鴝鵒稱名形骸掩而蓮華地發何況身無重慝報在最靈信願熏修寧成虗棄惡人者唐張善和屠牛為業臨終見羣牛索命於是大怖喚其妻云速延僧為我念佛僧至諭云經中説臨終惡相現者至心念佛即得往生和云地獄至急取香爐來即以右手擎火左手拈香面西專切念佛未滿十聲自言佛來迎我即化去畜生者宋黃巖正等寺觀公畜鴝鵒常念佛不絶一日立化籠上觀葬之已而土上出紫蓮華一朵尋土中則華從舌端而發靈芝照律師為之讚有立亡籠閉渾間事化紫蓮華也太奇之句如上持名所舉自飛光出佛至此亦千萬中紀一而已慝者惡之匿於心者也最靈者人為萬物之靈也末復結言惡人念佛尚得往生何況惡未必如善和畜生念佛尚得往生何況靈而號為人類以此比況知必生也信願熏修所作唐捐無有是處五結勸是以一音始唱千佛同賡三學高僧九流名德若幽若顯若聖若凡如萬水無不朝東似羣星悉皆拱北方之捷徑號曰普門豈虗語哉決志求生無容擬議者矣此總結淨土法門一切衆生所皈依也唱者導也賡者續也始唱者釋迦開示西方衆生始知淨業是引而導之也同賡者六方讚歎詳如經文中説是續而和之也三學者謂禪教律三宗也禪如永明以宗門柱石而上上品生圓照以獨秉單傳而標名蓮境教如僧睿弘輔什師而蓮華出榻四明中興台教而西向坐亡律如靈芝生弘毗尼而死生安養清照大闡律學而説偈西歸若廣舉者不可勝數九流者謂儒道農工醫卜等也儒如文潞公德業滿朝而結十萬同生之緣蘇長公文行絶世而有西方公據之説道如葛濟之捨仙學而回心淨業鸞法師焚仙經而專修觀經乃至子章之業岐黃而念佛張銓之荷耒耜而稱名幽如冥君敬禮羅剎休心聖如文殊求生普賢願往況顯與凡不待論矣朝東者會極義拱北者宗本義喻淨土為真際所詣勢必向往非強之使然也捷徑普門解見前文重言結之明不虗也決志者大本云設有大火充滿三千大千世界要當過此生彼國土則決定其志無退怯也擬議者易曰擬之而後言議之而後動今謂不須擬議昔人有言卜以決疑不疑何卜念佛往生但諦信不疑而已何復擬議為哉
