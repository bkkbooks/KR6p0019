body:
  text: 明古杭雲棲寺沙門袾宏述九總釋名題二初題義二譯人初題義如上八門敘義已知一經大旨今欲釋文先明總題使有綱領故次之以總釋名題佛說阿彌陀經疏題義有四初能說佛二正明說三所說佛四結說名言此土釋迦牟尼佛說彼土阿彌陀佛依正莊嚴信願往生之經也統括大意次乃離釋鈔統括者先且略表全文使血脈貫通意義具足次乃一一離而釋之題止佛名而言依正等者觀經言佛便周今舉佛名攝無不盡故疏次離釋也佛者梵語具云佛陀此云覺者備三覺故又云智者無不知故又佛者十號之一又佛地明十義佛天台明六即佛華嚴明十身佛故佛者天中天聖中聖凡單言佛者即本師釋迦牟尼也鈔梵者淨也對華名梵文質之謂也具者具足梵語當云佛陀不言陀者省文也譯以震旦之言則云覺者對迷者得名也三覺者自覺異凡夫覺他異二乘覺滿異菩薩三覺俱圓故曰自他覺滿之者又離心名自覺離色名覺他俱離名覺滿亦三覺義又云智者智即覺義無不知者智論云知一切衆生數非數常非常等是智無不知所謂得一切種智是也即覺滿義也十號者萬德世尊舉莫能盡略而言之如來至佛共有十號十號之中佛當其一具茲十德世出世間之所宗主故名世尊十義者具二智斷二障覺二諦得自他二利如夢覺華開二喻合之為十義也六即者始乎理即終乎究竟蓋始則全覺全迷中則覺而未盡末乃無所不覺今稱佛者指究竟也十身者一正覺佛至十隨樂佛詳具離世間品此十身佛唯華嚴有之然約其大要不出覺滿之義故曰十身初滿正覺始成名圓滿佛也天中天者天有四一世間天諸國王是二生天欲色無色諸天是三淨天四果支佛是四義天十住菩薩是佛並超之是天而又天也聖中聖者聲聞緣覺菩薩入聖域而未優惟佛居極果是聖而又聖也即釋迦者過去未來須標某佛釋迦見坐道場一土之中無二佛故喻如前朝帝主須稱國號當今天子直曰至尊亦以一國之中無二主故是知單言佛者即悉達所成賢劫第四佛也疏說者悅也悅所懷故四辨宣演故十二部等至四悉檀皆是說義鈔悅所懷者本願度生得機而說所懷暢悅如大本世尊欲說此經先且諸根悅豫顏色異常況今持名念佛得機而說悅可知矣四辨者曰義曰法曰詞曰樂說也四皆無礙名之曰說中論云諸佛依二諦為衆生說法詞無礙智以世智差別說樂說無礙智以第一義智善巧說不言義法者後後兼於前前詞及樂說攝義法故十二部等指所說也悉檀者合華梵云遍施以世界為人對治第一義四門作歡喜生善滅惡入道四益十二部經一切諸法隨宜而說無量方便要歸作世界等四說使人得歡喜等四益而已鑒機授法其文繁廣略舉不悉疏佛說者說揀五人故鈔五人者一佛二菩薩三天四仙五化人此五皆能說經今顯此經是至聖立言金口親出不同菩薩在因天屬凡類仙雜外道化人非真也如天子詔不同百官宰相諸王等語也疏阿彌陀者是標顯彼佛梵語阿此云無梵語彌陀此云量言佛功德不可窮盡故云無量如經壽命光明是無量中姑舉二事攝餘功德也鈔無量者有二義一者衆多無有數量二者廣大無有限量復有二義一者十大數中之無量二者更無窮盡之無量姑舉二事者以無量不止壽命光明也詳如後文中辨疏經者梵語修多羅此云契經有通別二義契復二義經復多義經雖多義不出貫攝常法四義鈔通別者佛所說教總名修多羅是之謂通析之則經名修多羅律名毗奈耶論名阿毗曇是之謂別契復二義者一者契理則合道之言二者契機則逗根之教今略契字但名曰經者省文也經復多義者華嚴疏引雜心五義謂一出生二顯示三涌泉四繩墨五結鬘佛地二義謂一貫穿二攝持此方四義謂一常二法三徑四典故云多義不出四義者指貫攝常法四字也良以經字西域正翻為線線有貫持義貫則貫穿所說之理持則攝持所化之生此二足該出生五義而此方經典亦名曰經經是線義此方不貴線故直取經字而加以契古稱最為允當又常者古今不易法者近遠同尊常則久而行之有共繇義即名為徑法則軌而正之有定據義即名為典亦二足該四則彼方貫攝此方常法合而言之四字之中盡經義矣疏又經復有通別二義經之一字是為通名佛說阿彌陀五字是為別名如教行理通別亦爾此三即配三德圓融具足如天台所稱聞首題名功德無量若配三大則佛是體大無量壽是相大無量光是用大如教中說鈔教行理者本理立教依教修行從行顯理諸經皆具教行理三故名為通專指此經則佛說是教執持名號是行阿彌陀是理局此異餘故名為別配三德者理即法身教即般若行即解脫又理通行教法身即般若解脫乃至行通理教教通理行舉一即三例上可知體相用者體者總體言佛便周故佛為體相者體中所具之相體無盡相亦無盡故無量壽為相用者體中所發之用體無不照用亦無不照故無量光為用若通若別等亦如上例疏諸經立名皆以人法喻或單或復此經單人人復有二兩土果人故實則三皆融通故鈔單復者如大方廣佛華嚴經具足人法喻三大方便佛報恩經人法無喻妙法蓮華經法喻無人菩薩瓔珞經人喻無法大般若經單法無人喻梵網經單喻無人法今此經者單人無法喻他皆例此兩土果人者菩薩在因如來在果故佛號果人今是此方之佛說彼方佛故融通者舉一即三故如今經雖屬單人而法從人說喻以人舉言偏義圓通融交徹理固然也疏此經本名稱讚不可思議功德一切諸佛所護念經今名是什師改定自有二義一者佛攝無盡義故二者彼佛人所樂聞故鈔攝義無盡者如前云言佛便周則一切功德皆從佛出佛即不思議故又彌陀萬德洪名十方三世一切衆生之所喜樂上至諸佛讚歎下至鬼畜歸依正謂不思議功德故疏云疏鈔者疏以釋經鈔以釋疏冀易曉也鈔疏者古云條陳也又記注也今謂經義得此條陳而不隱晦記注而不遺忘也鈔者古云略取也又寫録也略取則條陳之切要寫録即記注之顯明冀望也經難明疏通之疏難明鈔出之望人人曉了經義也疏稱理則自性覺是佛義自性覺無量是阿彌陀義自性本始二覺是兩土果人義自性覺體遍照是說經義後皆例此鈔稱理者以即事即理所謂總該萬有即是一心則依報正報何非自性又即理者事依理成如淨名云隨其心淨則佛土淨今經言一心不亂即自性彌陀惟心淨土為一經大旨也冥理而談云稱理也覺是總義覺體之中廣大悉備無窮無盡是為別義本始有二約先後則彌陀古佛此佛新成是彼本此始即自性本來是佛為本無明所覆今方破惑證智為始也約因果則此佛教令往生乃得見阿彌陀佛是此本彼始即自性本有成佛之智為本依本智而求佛智乃得成佛為始也本始互融常覺不昧輝天鑑地耀古騰今常說如是經百千萬億座問疏鈔此經正為發揮持名功德普勸諸人求生彼土也何乃一一消歸自性翻成極則之談依然淨土是心奚必捨此願彼答此正雙被二根雙破二惑如前序中所明良以鈍根者守事相而自足觀此使知事有理存毋滯事而迷理利根者崇理性而著空觀此使知理在事中毋越事而求理又此經本為託彼名號顯我自心與十六觀經同意則欲悟心者正應念佛求生又菩薩猶宜近佛如前教起中說則已悟心者亦正應念佛求生何足疑也又維摩經云雖知諸佛國及與衆生空而常修淨土教化於衆生故患不悟自心耳悟心則無一法出於心外即心即境即境即心往生淨土願見彌陀不礙唯心何妨自性又問昔人謂華嚴極教可得皆約觀行明諸法門方等而下何得亦約觀行古德答云諸了義不了義教皆是了義以唯一心故據此則圓機對教何教不圓理心涉事何事不理二譯人姚秦三藏法師鳩摩羅什譯疏姚秦標代三藏顯德羅什出名譯之一字結成能翻人也鈔出處始末備前茲不重録古稱什師七佛以來譯經師也猶是略舉且以七佛為言耳夫毗婆至於釋迦首尾止經二劫而彌陀成佛十劫則莊嚴劫前更上九劫所歷已幾萬佛既六方諸佛靡不讚歎此經則萬佛以來亦必皆說此經亦必皆有譯者而經稱母佛者曰世世佛生我為其母子佛者曰世世佛出我為其子以是例之什師譯經何啻七佛而此經流通久遠於是益信疏稱理則自性融通隱顯是華梵翻譯義鈔即梵可以成華則顯非密外方華未嘗不梵則密在顯邊當暗中有明當明中有暗互相掩映涉入重重妙體融通不一不異十別解文義三初序分二正宗分三流通分初序分二初五句證二列衆證初五句證如是我聞一時佛在舍衛國祇樹給孤獨園疏別解文義者已知一題總意未審經中自始至終為何等文闡何等義今乃章分句解俾文字般若達乎實相以有盡之言略彰無盡故於中分三今屬序分序者敘也又緒也未入正文先敘列此經之端緒也有證信發起二序今唯證信凡證信者皆以六種成就今順文便均其繁簡且分為二先明五句後明列衆合之成六茲復例前統括大意次乃離釋言如是之法我從佛聞彼一時釋迦牟尼佛在舍衛國之祗園也蓋是佛示阿難故如是我聞有三義一斷疑故二息諍故三揀邪故鈔文字般若謂般若無言賴言而顯故佛以文字說經今還以文字解釋然文字性空即是實相故三種般若相為融通不礙文字也略彰者言不盡意故云略也六種成就分合二科者例如五蘊六根或合色開心或合心開色隨其所宜無定法也佛示者智論云佛涅槃時示阿難言一切經初皆云如是我聞一時佛在某國某地蓋是遵佛遺敕故斷疑者阿難結集時衆起三疑一疑佛重起二疑阿難成佛三疑他方佛來今曰如是我聞三疑頓釋息諍者曰我聞則非臆見自作故揀邪者曰如是則異外道阿憂故如佛地論云如是之法我昔曾聞意避增減異分過失亦息諍義也疏如是者信成就也如智論中說又二字復為二義有多種解若以宗揀定約當宗則一心不亂曰如唯此無非曰是鈔智論云佛法大海信為能入信者言是事如是不信者言是事不如是肇公曰如是者信順之辭也故世人允可亦曰如是復二義者又離如是二字各釋也多解者有以聖人說法但顯於如唯如為是如劉虬所說有以如者當理之言是者無非之稱如生公所說有以如來順機為應名如衆生無非為感名是如融公所說有以實相之理始終不異名如如理而說名是如天台所說有以如為真空是為妙有敵破外道斷常二見如清涼折衷諸家所說餘說尚多恐繁不引以上各有意義小異大同並無相礙以宗揀定者如是二義隨宗以定今此經宗乎一心良繇執持名號一心不亂一心則非生非滅無去無來湛然常住故名曰如又此一心四過離百非絶故名曰是異此所明不得稱是疏我聞者聞成就也我者自我聞者親聞自我親聞非私淑故非讀古故鈔自我親聞者自揀非己親揀非面蓋是己躬面受之說也私淑者孟子云豫未得為孔子徒也豫私淑諸人也釋曰以孟子非親見孔子乃受業孔子之後人而私其道以善其身者也讀古者齊桓公讀書於堂上輪人以為所讀者古人之糟粕耳釋曰以桓公非面對古人古人已往為徒讀其遺言者也今阿難躬逢至聖非私淑也合上自我阿難耳聆至教非讀古也合上親聞自我親聞今以告衆便應信受更復何說疏聖人無我今何稱我智論有三一隨世間故二破邪見故三不著無我故以是三者不礙說我又法身真我亦得稱我鈔此下復分我聞為二離釋同前一云隨世間者謂世法中說我非第一義中說我隨順世間而說無有實體則不乖於第一義也二云破邪見者謂邪我慢我名字我世俗人具前二我學道人具後二我聖人唯最後我順俗稱我但是名字實無邪慢故無過咎三不著無我者諸聖人知一切法空實相無我而不著空不著無我又瑜伽有四義大略同此第三義言若定無我誰為修學人則生怖故不著無我又觀經疏云無我則無聞無聞則化道絶為傳化不絶假名說我法身真我者約本而言阿難亦通法身我也以無我法中有真我即法身我如涅槃常樂我淨之我何礙於無我疏聞者耳根發識廢別從總故云我聞大乘中三始教無聞終教聞而不聞頓教無聞不聞約當宗則傳法聖人以我無我不二之真我根境非一異之妙耳聞娑婆極樂無障礙之法門也鈔廢別從總者以不云耳聞而云我聞良繇我則統收諸根識等以總該別故云我聞始教等者若云我既無我聞亦無聞是大乘初門始教意也若云從緣故空不壞假名即不聞而聞聞而不聞終教意也若云能所雙寂無聞不聞離念頓顯頓教意也我無我者生而不生不生而生即法身故根境者聞說阿彌陀佛能聞所聞非一異故娑婆極樂者所謂娑婆依正全處極樂之自心故以此經分攝於圓應歸法性故疏或疑佛成道久阿難方始出家何得俱言我聞古謂有四義故曰聞無礙又阿難有三或聞不聞亦無礙故鈔疑者佛成道已歷年二十阿難出家又十年方命為侍者雖親侍佛而三十年前佛所說經何得俱稱我聞古答四義者一展轉聞如報恩經言阿難所不聞經從諸比丘邊聞或諸天子說如涅槃經乃弘廣菩薩之所流通故二者佛重說如報恩經言阿難因佛命為侍者乃求三願其三所未聞經請佛重說故三者阿難自通如金剛華經言阿難得法性覺自在三昧所未聞經自能憶持涅槃亦云若在若不在自然能解了故四者清涼折衷上三言阿難乃大權菩薩影響弘傳如不思議境界經言舍利目連乃至阿難等皆大權菩薩現聲聞身何滯於迹言不聞也三阿難者一名歡喜結聲聞藏二名喜賢結緣覺藏三名喜海結菩薩藏則阿難以大神力隨機示教是知一代時教此阿難不聞者彼阿難聞之又何聞與不聞而為礙也疏一時者時成就也師資相合當時說聽事畢即名一時以說聽無定故不言其年月日者十方時分不一兩土正朔不同故約當宗則即說聽頃心境泯凡聖會依正融一多等此諸二法皆一之時名一時也鈔說聽無定者或說者得陀羅尼一剎那頃一字之中說一切法門或聽者得淨耳根於一剎那聞一字時於餘一切悉無障礙或說者時少聽者時多或說者時多聽者時少說者神力延促隨宜聽者根器利鈍不一古謂三乘凡聖所見佛身報化年歲短長成佛久近各各不同故今止取佛及弟子師資機感相遇之頃說聽事畢便名一時也十方時分者以十方遍於橫豎豎則該乎天上四天一日人壽五旬橫則遍乎四洲贍部三更俱盧曰午不可定也兩土正朔者歲首之日名為正朔震旦五天不相統屬周正建子夏正建寅彼時震旦屬周而佛在舍衛舍衛建寅乃用夏正則五天正月震旦三月五天二月震旦四月也亦不可定故止言一時也心境者一心不亂無能念所念故凡聖者與諸上善人同會一處故依正者佛及水鳥樹林同說妙法故一多者一佛說經六方齊讚故如上種種二法皆成一味即以此時為一時也疏佛者主成就也佛義解見前文以是一期衆生所共宗故名之曰主又六種成就中最為主故鈔共宗者佛出世為一期一期之中六凡三聖一切衆生同所宗主如萬姓百辟歸一人故六成就中主者望前則際主之會成時聆主之語成聞受主之教成信望後則主之所居成處主之所化成衆是六種共成而歸重於佛亦言佛便周意也疏在舍衛國祇樹給孤獨園者處成就也在者天台謂在即住意別之有四曰天住梵住聖住佛住隨宜佛住乃至天住實則佛身無在無不在鈔在即住者大品論明佛在某所已而言暫在久住總成在意今謂無論久暫但就當時說經之處即名為在如天子所至即名行在也四住者佛攝衆生隨宜而住或現天住謂六欲天因即以施戒善心住或現梵住謂初禪至非想因即以四無量心住或現聖住謂三乘因即以三三昧住或現佛住即以首楞嚴百八三昧力無畏不共住上三隨他意住後一隨自意住問佛何以天住答屈至尊在至劣處為度生故也無在無不在者體寂寥故無在體圓通故無不在華嚴云佛身非至非不至何以故虗空無身故如來亦爾遍一切法遍一切衆生國土非至非不至即此意也然則佛在舍衛以就劣機故名天住如實而論即舍衛名梵住聖住佛住亦何不可疏舍衛梵語亦云室羅筏悉底華言聞物以德名故一云聞者以人名故鈔德者以國豐四德一者塵德五塵之境多美麗故二者財德七寶珍奇無弗有故三者聖德三藏聖法皆具足故四者解脫德人多解脫不染欲故以是譽動五天名聞物也以人名者多賢人故國以人為重故疏祇樹給孤獨園者梵語祇陀亦云逝多言祇者省文也此云戰勝給孤表德即須達多園者梵語僧伽藍摩此云衆園安衆僧故蓋祇陀施樹給孤買園兼二為名故云祇樹給孤獨園也鈔戰勝者波斯匿王太子生時王與外國交戰得勝喜而立名須達多者梵語此云樂施勝軍王大臣也喜樂行施遂成令名給孤獨者幼而無父曰孤老而無子曰獨今但無倚無養即名孤獨偏言孤獨者孔恩周急岐政先㷀非不普慈有緩急故衆居曰園者林蔭清幽學道之人應棲止故施樹買園者涅槃經說須達長者本舍衛人初未知佛為娉婦故入王舍城因珊檀那見佛生信請歸舍衛佛令身子選衆居處得祇陀園長者問價太子戲答金布地滿即當賣與長者布金太子感歎遂與易地地所有樹并以施佛因立精舍長者太子交相發心成此美事故雙標也疏若喻當經教理各有所表如法華華嚴釋例鈔喻當經者如舍衛國國之勝表此淨土法門廣大宏遠法之最上故即慈恩言王舍城城之勝城勝餘城表法華法勝餘法故下皆例此祇樹樹之勝表淨土蔭蓋衆生永離熱惱故給孤園園之勝表淨土安隱衆生恆受諸樂故祇陀太子種之勝表淨土生者畢竟成佛紹隆佛種故須達長者人之勝表淨土生者入正定聚俱上善人故如華嚴種種表法以顯一心皆此意也疏稱理則自性洞徹十方是阿難聞佛義自性不離當處是佛在祇園義鈔心聞洞十方則慶喜現今方結集真佛屋裏坐則釋迦原不住西乾反聞自聞反佛自佛當知祇園一會儼然未散豈獨靈山二列衆證三初聲聞衆二菩薩衆三人天衆初聲聞衆三初明類數二表位德三出名號初明類數與大比丘僧千二百五十人俱疏自此而下至諸天大衆俱衆成就也與者共義大者揀小具有三義謂大多勝異餘比丘故佛地亦具三義比丘梵語此云有三一乞士二怖魔三破惡僧者梵語具云僧伽不言伽者省文也此云衆和合千二百五十人者三迦葉目連舍利五人弟子共合成故上明類屬聲聞下明數有若干也俱者合上共義鈔共義者天台以七一釋共謂處一時一心一戒一道一見一解脫一也佛與大衆共居祇園是經正意廣之如上揀小者明非初心比丘即下所稱長老等是也大多勝者天王大人所共敬仰非小德也名大內典外籍無不博通非寡解也名多超出九十六種之上非劣器也名勝皆小乘中極也佛地三義者一最極利根波羅密多種性故名為大二皆得無學果位故名為大三皆得小果已趨大菩提故名為大則通大乘言也比丘三者一乞士謂乞食乞法乞食則離四邪命合四正命無事經營不勤畜積萬緣頓息一志清修僧宜以此活命故曰乞食資身也乞法則參師訪友懇苦翹誠詢求妙法期成聖果故曰乞法資心也二怖魔者若人發心出家魔王聞之生大怖畏以魔樂生死出家離欲趨向無生魔失黨與生怖畏故三破惡者能破煩惱九十八使悉皆斷絶故或加淨戒淨命則成五義今三義者以乞食攝淨命以破惡攝淨戒故也衆和合者四人以上多至無量悉皆同一羯磨不相違諍如水乳合名和合衆三迦葉者一優樓頻螺於火龍窟有五百弟子二伽耶於象頭山有三百弟子三那提於希連河有二百弟子後皆歸佛故有千衆目連舍利者二人共有二百五十弟子亦來歸佛成千二百五十人也一說度耶舍等五十人及陳如等五人共成此數疏獨舉千二百五十人者以常隨故鈔常隨者謂佛出世間所度羅漢比丘甚多無量何獨舉此以此千二百五十人者最先歸佛又常不離佛直至佛滅故獨舉也其他散在四方雖千里面談而據迹成文常法應爾如仲尼之門賢達之士蓋三千焉而獨舉七十子者以久在泗濵相依陳蔡亦常隨故二表位德皆是大阿羅漢衆所知識疏上句表位下句表德大者揀餘小聲聞故梵語阿羅漢此有三義一應供二殺賊三無生即前乞士怖魔破惡果也知識者聞名欽德曰知覩形敬奉曰識一云見形為知見心為識一云知即是識亦可衆中知識為衆導故鈔揀餘者初果至四果皆聲聞位今曰大阿羅漢者表是四果聲聞也應供者凡夫無德前三果有德而未大未名應供今梵行已立超出三界應受人天供養故俱舍云供養阿羅漢得現在福報是人天植福之良田受施無慚故曰應供始焉持鉢期福衆生今已證道理應受供云乞士果也然佛亦名應供羅漢局於人天佛則人天聲聞緣覺菩薩所應供也殺賊者煩惱劫功德財傷智慧命前三果見惑雖斷思惑尚存今斷思惑七十二品俱盡如亂流悉殄天下太平故曰殺賊始焉以惡為敵今惡已滅云破惡果也無生者凡夫生死無量初果七返生死二果一生欲界三果不來欲界猶生色界今生緣已盡不受後有故曰無生始焉願出生死令魔起怖今證無生云怖魔果也聞名覩形者是親疏一對知者耳聞則思慕願見識者目擊則奉事不違也見形見心者是淺深一對知者則面對光儀識者則神交意地也如二僧覲佛其一道亡佛以亡者為先見我即見心之謂也知即識者猶言相知相識也德高望重名滿天下人人知之人人識之故曰衆所知識也一說舉衆之中此為多知多識人天眼目云衆導也今人稱善知識亦具二義一者對惡而言以我所知識有善有惡今是善之知識故二者此人有了然之知卓然之識人所不及是知識之善故疏稱理則自性無漏是羅漢義自性無迷是知識義鈔心源本寂則諸漏全空心體本明則羣迷安在法華謂是真阿羅漢起信號曰真實識知彼沈空為寂作念而知者名字羅漢虗妄知識也是故邪見與正見一體衆妙與衆禍同門息心達本源庶幾可以為沙門矣三出名號二初衆名二總結初衆名長老舍利弗摩訶目犍連摩訶迦葉摩訶迦旃延摩訶俱絺羅離婆多周利槃陀伽難陀阿難陀羅睺羅憍梵波提賓頭盧頗羅墮迦留陀夷摩訶劫賓那薄拘羅阿㝹樓䭾疏長老者德長臘老又德臘具一亦通稱長老貫下十六尊宿鈔臘者出家一歲名一臘周歲之中惟一臘故亦云一夏意正同也通稱者上云德臘俱尊此謂獨德冠衆單臘先人亦得名為長老如毗婆沙論法性上座生年上座之類是也又唐譯具壽則雙備德臘魏譯慧命則專就德言雖曰二可通稱尤必以德為重今經所列蓋有有德而無臘者未有有臘而無德者也貫下者長老之稱不獨舍利弗乃至阿㝹樓䭾皆名長老皆上首弟子也疏舍利弗者梵語舍利此云鶖鷺梵語弗此云子故云鶖子亦云身子亦云珠子更有多號恐繁不引諸弟子中智慧第一稱第一者姑顯一德語云君子不器況復羅漢疏鶖子者其母身形端正眼淨如鶖鷺連母得名云是鶖鷺之子也身子即身端意珠子即眼淨意更有多號非今所急故不繁引下皆例此智慧者在母胎時已能令母辨勝其舅八歲登座十六大國議論無雙七日之內遍達佛法故云智慧第一姑顯一德者明非身子之外諸阿羅漢皆為劣慧亦非身子止具智慧餘則不兼蓋是各舉一德以表法門無量又以引諸偏好耳如經言舍利弗晏坐目連欲起其定竭盡神力不能動其衣之一帶常言目連神通第一孰知舍利弗神通乃至是乎君子不器者孔子語如舟不可陸車不可水是器也君子具足多能不滯一器豈得謂顏閔無文游夏缺行君子尚爾況超凡入聖三明皎然六通清徹號漏盡阿羅漢耶故曰姑顯一德也疏首舉舍利弗以此經惟智所解故鈔經中謂佛為衆生說此難信之法難信則惟智慧深遠者始信不疑是以首舉或難般若心經獨告身子則知身子之智在乎解空不在淨土噫色即是空空即是色獨不曰淨土即空空即淨土乎若撥淨土則非真空不解真空則非正智身子之智必不如是疏摩訶目犍連者摩訶此云大目犍連此云采菽氏一云萊蔔神通第一鈔目犍連姓也名拘律陀拘律陀者樹名禱樹神而生因以為名其族衆多故別以大神通者如佛升忉利毒龍障佛諸比丘請降龍佛皆不許目連化身大小龍懼遂服又如外道移山制之不動一城釋種舉之梵天及止車燒堂等故云神通第一疏摩訶迦葉者此云大龜氏一云飲光頭陀第一鈔大龜者先世學道有靈龜負圖而出因以為姓名畢鉢羅亦樹也稱大以別同名如三迦葉等飲光者繇宿生為治金師與一女人同以金嚴佛像遂感世世身如金色金色晃耀吞乎餘色名飲光也頭陀者梵語此云抖擻或云淘汰有十二行謂一阿蘭若二常乞食乃至十二但三衣以斯苦行掃除塵纍澄淨身心也迦葉年老不捨頭陀佛憫其衰勸令休息迦葉頭陀如故佛乃深讚有頭陀行我法久存故云頭陀第一疏摩訶迦旃延姓也此云文飾一云不定一云扇繩一云離有無等南天竺婆羅門族也論議第一鈔文飾者文采修飾也凡人論議心雖曉了此理若直遂而不文汗漫而不飾則辭不達意非善於論議者也不定者縱橫善巧是善論議意扇繩者子繫母故又破熱彈曲為扇繩不墮斷常發揮中道為離有無也如外道問人死不還知無他世謂人死受苦應當回還甘受不還故無他世答言如世罪人被駐牢獄寧得歸否又問天何亦不歸答言墮廁得出肯再入否如是種種妙說諸義增一阿含讚云善分別義敷演教道故曰論議第一疏摩訶拘絺羅者此云大膝舍利弗舅答問第一鈔大膝者從狀得名舅者與身子母是姊弟故往論勝姊姊懷身子機辨迅發弟不能及發憤遊學誓不翦爪讀十八種經答問者繇精勤故得四辨才觸問能答故云答問第一疏離婆多者此云星宿一云室宿無倒亂第一鈔星宿者從星乞子而生因以為名室宿者室為二十八宿中第十三宿或禱此星故無倒亂者心正故不顛倒心定故不散亂故云無倒亂第一疏周利槃陀伽者此云繼道一云大路邊僅持半偈得悟證果鈔繼道者其母孕時還家於中路誕子繼續於途路之間故云繼道大路者母生二子皆於路邊言大以別小也半偈者出家愚暗久無所解兄先入道怪其無知遣使歸俗倚佛寺門嗟歎流涕佛憐而録之使誦掃每日誦之記一忘一久之忽悟垢淨惑除得阿羅漢疏難陀者此云善歡喜放牛難陀也鈔放牛難陀者難陀有三阿難陀孫陀羅難陀兼此為三以放牛別餘二故疏阿難陀者此云慶喜又云無染佛之從弟多聞第一就當經則阿難與衆同聞淨土之教而獨以總持力憶念不忘成結集也鈔慶喜者佛成道日誕生王及臣民既聞太子成佛又聞宮中誕子雙美二難一時畢具舉國欣慶因以立名又見其相者聞其聲者覩其威儀者無不歡喜故無染者隨佛入天宮龍宮心無樂著亦其事也佛從弟者佛淨飯王子阿難白飯王子二王昆季故多聞者阿難侍佛二十五年佛所說法不忘一字涅槃稱阿難多聞士又迦葉讚曰佛法大海水流入阿難心是也同聞獨憶者正表強記超乎等夷也故曰多聞第一疏羅睺羅者此云覆障或云執日密行第一鈔覆障者本阿修羅名能以手障日月故名覆障亦曰執日障有二義一云佛為所障不即出家以未有子父王不許出家後以指腹懷妊方遂本志則佛被其障也一云六年在胎以宿生曾塞鼠穴幽之六日今報六年則已自被障也密行者經云羅睺羅密行惟我能知之惟佛能知則菩薩聲聞皆所不知況凡夫乎積行而人不知故曰密行第一疏憍梵波提者此云牛呞受天供養第一鈔牛呞者過去世中輕弄沙門今報牛呞又五百世曾為牛故牛雖不食恆事虗哨餘報未盡故稱此名天供者馬麥之報彼獨於天上尸利沙園受供又凡夫覩形不知觀德多輕之者恐人譏笑遭愆常居天上諸天敬奉故云受天供養第一疏賓頭盧頗羅墮上三字此云不動名也下三字此云利根姓也鈔先名後姓者其族凡十八稱名在先別其餘也奈耶律云樹提長者以栴檀鉢置剎頂上號於衆云神力能取者即與尊者現通取鉢佛呵責已敕令不得入滅留身久住應末世供為大福田也疏迦留陀夷此云黑光鈔黑光者顏容粗黑故又黑色光耀異常黑故夜行乞食人見驚駭佛禁夜行繇此制也疏摩訶劫賓那者此云房宿知星宿第一鈔房宿者二十八宿中第四宿也父母禱此星而生子一云初出家時將欲詣佛中路值雨寄食陶舍俄有比丘來共宿止彼比丘者即佛化現聞法得道則房宿者以於陶家房舍而旅宿故亦一義也知星宿者不假璣衡通曉天象故云知星宿第一疏薄拘羅者此云善容壽命第一鈔善容者顏貌端正故壽命者壽年百有六十故云壽命第一繇昔持不殺戒九十一劫壽不中夭又昔曾施一病僧訶梨勒果感五不死初生現異母以為怪置之熬盤不死復置釜中不死復置水中巨魚吞之魚為人獲刀破子現一無所損火不能炮湯不能煮水不能淹魚不能噬刀不能割名五不死又閒靜少欲收攝六根滅度之後塔猶却貝故常樂閒居不處衆中亦稱第一疏阿㝹樓䭾者一名阿那律陀此云無貧亦云無滅亦云如意天眼第一鈔無貧者昔於饑世曾以稷飯施辟支佛九十一劫資用充足至今不滅所求如意故有無貧等三譯天眼第一者出家喜眠佛說法時昏睡不覺佛乃呵責比之螺蛤發憤精進經七晝夜眼不交睫失其雙目佛教修習樂見照明金剛三昧遂得天眼觀大千界如覩掌果故云天眼第一二總結如是等諸大弟子疏如是者結上等者例餘大者收前大義弟子者學在師後曰弟解從師生曰子如斯勝會可謂難弟難兄善作善述鈔結上例餘者前結十六尊者後例千二百人也收前大義者此大弟子即前大比丘大阿羅漢以一大字攝前二也學在師後者先覺後覺如兄先弟後故解從師生者啓發育養而成法器所謂從佛口生當紹佛種如父母生子故難弟難兄者古稱元方難為兄季方難為弟言兄豪弟俊無可優劣今不取彼意略喻佛為兄諸阿羅漢為弟二俱難得故善作善述者古稱文王以王季為父父作於前以武王為子子述於後今亦不取彼意略喻佛為父諸阿羅漢為子師資道協故疏稱理則自性王數融通是佛與弟子俱義鈔台教云心王如來心數弟子今釋謂王者八識也此八識者善惡輪轉繇之主宰如王御臣如師率弟子故數者五十一心所也此五十一一則恆依心起二則與心相應三則係屬於心其於八識如臣向君如弟子奉師故又智覺云十大聲聞皆是自心十善法數毗曇偈云欲想更樂慧念思及解脫作意於境界三摩提以痛是知大迦葉者心欲數以志存出要善欲心發捨世惡欲故富樓那者心想數以想則分別辨才無礙故迦旃延者更樂數以問答往復更相涉入論議不窮故乃至慧舍利弗念優波離思羅睺羅解脫善吉作意那律三摩目連痛阿難等痛者受也領納意也王必具數數必歸王此二相扶而取開悟若王若數不出自心但得一心王數俱盡二菩薩衆三初明類二列名三總結初明類并諸菩薩摩訶薩疏并者承前言佛說此經不但聲聞與會大士亦所同聞也菩薩者梵語具云菩提薩埵今舉二字省文也此云覺有情覺情復有三義又勇猛求義摩訶薩者此云大道心衆生以具四種大故又法華六大佛地三大不出四故菩薩摩訶薩猶云菩薩中大菩薩也揀非諸小菩薩故鈔不但聲聞者言小乘大乘一切賢聖共聞此經毋謂淨土為菩薩所不屑也覺有情者同佛所證之謂覺無明未盡之謂情也復有三義者一悲智所緣義言覺是所修佛道情是所化衆生上以智求下以悲度也二能所合目義言覺是所求之果有情是能求之人以己之心悟佛之理也三利生為急義言廣覺一切有情所謂未能自度先能度人是也勇猛求者聲聞趨寂自安名為懈怠大士剋志菩提所謂大強精進勇猛也大有四義者清涼疏謂一者願大求大菩提故二者行大二利成就故三者時大經三無數劫故四者德大具足一乘諸功德故法華六大者信大法解大義發大心趨大果修大行證大道而信解發三第一願大中攝趨者第三時大中攝修者第二行大中攝證者第四德大中攝佛地三大者一數大二德大三業大德大可知數即願意業即行意故云不出四意也揀非小者如文殊彌勒等皆是等地位中菩薩非初心五品信住行向故疏稱理則自性真妄融是菩薩義鈔真不變而隨緣是之謂覺有情妄成事而體空是之謂有情覺真妄不立唯是一心成此大道心號曰摩訶薩二列名文殊師利法王子阿逸多菩薩乾陀訶提菩薩常精進菩薩疏文殊師利者此云妙首亦云妙吉祥亦云妙德法王子者佛為法王菩薩入法正位名法王子又首舉文殊者例前舍利弗義鈔文殊師利亦云曼殊室利言妙首等者準華嚴宗表三法門曰信行智妙首者信也信為萬行萬德之頭首故妙吉祥者行也佛地經言一切世間親近供養讚歎名妙吉祥又真諦云於怨親中平等利益不為損惱名妙吉祥又生時有十種瑞一光明滿室乃至十象生六牙名妙吉祥是即解之行故妙德者智也經云諸佛之母釋迦之師豈非妙德是即行之解故入法正位者如來據中道第一義而菩薩入於此地是謂紹隆佛種當繼佛位如大君體元居正所生王子今在東宮當紹王位名法王子又名佛子其意亦爾凡菩薩皆法王子獨稱文殊者荊溪云於王子中德推文殊又諸經文殊常為一切菩薩上首故例舍利弗者身子智慧第一文殊大智獨尊如前所明此經惟智方能信受故又分別而論則身子權智文殊實智權智明有生淨土實智明無生淨土鈍根則從權入實利根則權實雙融若推本而論不思議境界經云復有百千萬億菩薩現聲聞形亦來在坐其名曰舍利弗等則文殊身子同一甚深智慧益知此經非淺智所能信矣疏阿逸多者此云無能勝即彌勒菩薩也鈔彌勒此云慈氏姓也阿逸多名也具足當云慈無能勝以在母胎中即有慈心故以名族又過去生中遇大慈如來願同此號即得慈心三昧又昔為婆羅門號一切智於八千歲修習慈行又弗沙佛時與釋迦如來同發菩提心常習慈定又思益經云衆生見者即得慈心三昧又悲華經云發願於刀兵劫中擁護衆生是則慈隆即世悲臻後劫至極之慈超出凡小故無能勝疏又彌勒既聞此經龍華必說此經當知此經流通無盡鈔問何知必爾答法華稱古佛放光為說此經今佛放光知必說此則佛佛說法華也而此經者度生最急諸佛共讚既為諸佛共讚必為諸佛所說龍華之會必說此經何疑之有疏乾陀訶提此云不休息鈔不休息者行諸梵行歷恆沙劫然後授記經此多劫曾不休息故疏常精進者二義一者天台云見法性常住行無作正勤故二者寶積經云此菩薩為一衆生經無量劫隨逐不捨猶不受化曾無一念棄捨之心乃精進之至極也鈔二義者一是自利未生善增長已生善保持未生惡預防已生惡速滅名四正勤而言見性無作則了知法性本非善非惡雖云修善不修而修雖云去惡不去而去所謂一念不生是真精進故二是利他為多衆生猶未為難今曰為一衆生少時為一衆生猶未為難今曰無量劫多劫而易可化度亦未為難今曰猶不受化而不棄捨不棄捨猶未為難今曰無一念棄捨如是精進更無退墮故名曰常又不休息必常精進常精進必不休息此二菩薩亦名殊而德一者也三總結與如是等諸大菩薩疏結上例餘同前就當經則表信行願三成淨土因故鈔同前者結上文殊彌勒等例餘則普賢觀音一切菩薩也信行願者妙首表信求生淨土信為最先經云若有信者是也精進表願行精者不雜進者不退不雜者經云一心不亂不退者經云不退轉菩提是也不休息者即不退義又彌勒慈行乾陀梵行觀經云慈心不殺具諸戒行是也成淨土因則列諸菩薩非無因故疏稱理則自性無不照是文殊智義自性無不容是彌勒慈義自性無窮無盡是不休息常精進義餘可類知鈔類知者自性廣大是普賢義自性圓通是觀音義等如上隨舉一門以標名字若各具者即名字互通故謂心即名也如是解者即於正觀心中見一切菩薩也今見凡夫不見菩薩者以失正觀故故曰菩薩清涼月常遊畢竟空衆生心垢淨菩提影現中三人天衆及釋提桓因等無量諸天大衆俱疏及者承前言淨土法門不但諸聖與會一切凡衆皆同聞故釋提桓因此云能天主曰等又曰無量者盡一切諸天故曰大衆者盡一切衆生故俱者通結并諸菩薩以下文也鈔上并菩薩是小大一對今及諸天大衆是聖凡一對聖凡共聞此經毋謂淨土為凡夫所不能也釋提桓因者具云釋迦提婆因提釋迦者此云能提婆因提者此云天主詳有五種名恐繁不敘迦葉佛滅時一女人發心修塔三十二人佐之今王忉利統四方三十二天又阿含云本為人時行於頓施堪能作主故曰天主等者等三十二以及其餘也無量者又增詞以盡則槩欲色無色諸天也天有多義或名晝以晝長故或名無愁惱以常樂故或名燈明以無黑暗故大衆者諸天而下人及修羅盡六道一切衆生也一云兼前菩薩聲聞同名大衆通結者上言與大比丘衆俱今此俱者言亦與諸菩薩諸天大衆俱也或難無色則無耳無身鬼獄則極幽極苦何容與會而聞此經然無色者無粗色非無細色也佛涅槃時無色天人淚下如雨則身至耳聞亦復何疑地獄餓鬼重者或隔不通輕者未可例判又佛光所觸地獄天子得證頓圓然則佛說此經光照十方安知鬼獄不得聞也疏稱理則自性徹上徹下是羅漢菩薩諸天大衆俱義鈔是法平等無有高下上而徹乎諸聖也上亦與之俱下而徹乎六凡也下亦與之俱良以四諦十二因緣四等六度五戒十善萬行紛然乃至八萬四千諸塵勞門唯是一心真實性中無差別故龍蛇混雜凡聖交參此間佛法住持本來如是二正宗分四初詳陳依正令生信樂二正示願行令知修證三交引佛言令斷疑惑四互彰難事令切感發初詳陳依正令生信樂二初對機二示法初對機爾時佛告長老舍利弗疏此下文屬正宗以前是序引後是流通唯此為一經所宗之正義也爾時者當彼六種成就時也佛告者經無發起佛自說故良繇此經救世最急不俟請故鈔凡言爾時必上有緣起故云當彼時也佛自說者諸經皆有通別二序通則證信別則發起如法華則白毫放光啓一乘之教維摩則毗耶示疾開不二之談圓覺金剛以及諸經多因有問在先然後佛為宣演今經不然故無發起救世最急者末世衆生根鈍障深解脫禪定甚難可得佛以大悲出此一門橫截生死急救衆生唯恐不及故不待請譬如有人卒患惡瘍命在呼吸比有良方依之修製延緩日時藥未及成命已先殞現有成藥入口即活有仁心者即應速與尚何俟其禮聘殷勤然後投劑佛救衆生意亦如是疏問諸經無論只如本教二經皆有發起今經何獨不然答意彌切故亦是不發起之發起故鈔本教二經者十六觀經與此經大本皆專說淨土故稱本教觀經則韋提傷子惡逆厭濁求淨而曰我願生清淨世界不樂此閻浮提濁惡世也是以闍王母子為發起故大本則世尊一日容顏異常阿難問言我從侍佛未曾獲覩威容有如今日豈非念過去諸佛或念未來諸佛故致然耶佛言善哉阿難有諸天教汝來問汝自問耶汝所問者勝布施一四天下聲聞緣覺諸天人民乃至蜎蠕經於纍劫尚百千萬倍不可以及所以者何諸天人民乃至蜎蠕皆因汝問而得度脫是以如來顏容為發起故今難諸經發起且置勿論只如二經是淨土本教皆有發起此經不異二經何以獨無故為此通言佛說二經雖亦大悲心切特示往生然而觀法精微願門廣大如前序中說未若此經但事持名即生彼國尤為要而又要故佛意於斯亦復切而又切為諸衆生作不請友也不發之發者現前衆生樂著生死不求出離自能發起佛之大悲說此經故疏獨告舍利弗者例前唯智所信故又一告一切告故又淨覺云合四悉故鈔例前者即首舉身子意以甚深智慧洞察於淨穢之機融通於事理之際方能信受不疑如般若會上首舉須菩提者以般若談空須菩提解空第一故也一切告者告身子一人即是告見前一切聲聞菩薩人天大衆及未來一切諸衆生也四悉者一身子乃左面弟子經多居首法應爾故是世界悉檀二身子智慧第一衆所宗仰彼信淨土衆亦信之是為人悉檀三為不信淨土者自鄙不如轉其邪執是對治悉檀四為令習小法者效其向大求生淨土究竟成佛是第一義悉檀疏又不獨智為能信佛果成就皆繇智故鈔華嚴二十二經云一切諸佛莊嚴清淨莫不皆以一切智故則知阿彌陀佛亦以此智成就淨土功德而諸衆生修淨土者以智生信則為正信以智發願則為弘願以智起行則為妙行乃至成佛恆必繇之蓋通因徹果成始成終之要道也豈獨為信解之門而已哉疏稱理則自性自然智是佛自告舍利弗義鈔無緣而照弗慮而知妙性天然不從他得是故犍椎未動啓請無人熾然說無間歇二示法二初總標二別釋初總標二初標土顯依二標主顯正初標土顯依從是西方過十萬億佛土有世界名曰極樂疏土是所依名依報佛是能依名正報今先舉依也是者指此界言從此娑婆世界向西而去名過佛土者一大千界名一佛土過如是佛土至十萬億言去此方遠之遠也非壇經十萬八千之土也若據事據理亦未為遠世以時言界以處言極樂者梵語須摩提此云安樂亦云安養亦云清泰亦云妙意名雖小殊皆極樂義然土有多種四土之中今此極樂是同居土而亦通前三土又受用法性變化三土亦同此意又十種土亦同此意又佛雖無土為化衆生不妨說土鈔依報者身藉土居故名所依隨所作業依有勝劣故名為報言從是娑婆者娑婆極樂在華藏中二土相望今云過者從此西向橫亘而過也一大千者三千大千世界也至下六方中辨十萬億者從此過西之程以億計之當有十萬謂過一佛土十佛土乃至億佛土又從一億佛土十億佛土乃至十萬億佛土故曰遠之遠也然億有四種十萬百萬千萬萬萬皆得名億今之所指未可知也壇經十萬八千者訛指今西域也亦詳辨下六方中言未為遠者自有二義一者據事法華明東方世界之多而以抹土點塵計之則十萬億者特至少耳華嚴一世界種娑婆之外圍繞十三剎塵世界今極樂止過十萬億土何足為遠二者據理則所謂十萬億者對凡夫生死心量言耳淨業若成臨終在定之心即淨土受生之心也又謂分明在目前是也亦何嘗遠時謂過現未來處謂四維上下單時單處世界不成合時與處名世界也極樂譯有多名而極之為言顯至極之樂非人天一切諸樂之比故特標也四土者一曰常寂光土經云毗盧遮那遍一切處其佛住處名常寂光是極果人所居二曰實報莊嚴土行真實法感殊勝報七寶莊嚴具淨妙五塵故亦云無障礙土以色心不二毛剎相容故是法身大士所居三曰方便有餘土斷四住惑屬方便道無明未盡名曰有餘是三乘聖人所居四曰凡聖同居土是四聖六凡之所共居四土雖勝劣不同亦可各分淨穢今極樂國既曰菩薩聲聞諸天人民是與娑婆均名同居而此方則土石荊棘四趣紜紜彼國則八德七珍人天濟濟是同居淨也亦通前三者隨其機異所見亦異有於同居見寂光土有於同居見實報土有於同居見方便土有於同居但見本土如法華云我此土安隱天人常充滿像法決疑經云今日坐中無央數衆或見此處山林地土砂礫或見七寶或見是諸佛行處或見即是不思議諸佛境界皆隨機異見耳三土同上者一法性土即是寂光二受用土復分自他同乎實報三變化土同前三四方便同居則極樂者雖當變化亦可受用及法性也十種土者棗柏所分十種權實雖極樂是權非實然是且據權實對待分別言耳若論隨機權實無定所以者何彼云彌陀佛土為一分取相凡夫未信法空實理以專憶念其心分淨得生淨土是權非實則知就取相者非就入理者若理一心即權即實故云無定又上四土亦法爾具足不可但執寂光若證寂光於下三土隨心寄託自不撥無未證寂光撥無下三則無復所居之土錯之甚矣故不信他方有金色世界楞嚴所深呵也佛無土者十四科淨土鈔云八地以上永脫色纍照體獨立神無方所用土何為況復諸佛佛實無土而言有者以衆生解微惑重故以福樂引之行善蓋聖人接物之近迹耳故曰不妨說土疏偏指西方者定趨向故西方偏指極樂者如後文無苦有樂及往生經中說鈔恐有難言十方世界皆有淨土何為獨示西方教生彼國良繇道以多歧亡羊射以專注中鵠心無二用功戒雜施上都儀云歸命三寶要指方立相住心取境以凡夫繫心尚乃不得況離相耶若夫遍供十方諸佛還國猶在食時是生西方以後事所謂見卵而求時夜何太早計乎又問然則華嚴何以普禮剎塵如來答華嚴一即是多多即是一若知此義或普或偏常異常同無足疑也無苦有樂詳見後文又隨願往生經言佛國無量專求極樂者何一以因勝十念為因即得往生故二以緣勝四十八願普度衆生故疏問觀經云極樂不遠今言十萬億土二經遠近何以不同答以是即遠之近即近之遠故若依佛地則淨土遠近不可思議鈔去此不遠者觀經云爾時佛告韋提希言汝今知否阿彌陀佛去此不遠今謂即遠即近者良以去此不遠是明過十萬億之極樂去此不遠也過十萬億是明去此不遠之極樂過十萬億也心包法界何近而非遠法界唯心何遠而非近交互言之固無礙也不可思議者佛地論云如是淨土超過三界所行之處為與三界同一處所為各別耶答云有說在淨居天有說在西方等然亦周圓無際遍法界故不可說言離三界處即三界處但隨菩薩所宜現者或在淨居或西方等則知極樂淨土超出常情非方不方無在不在未可概以同居而為定論疏稱理則自性堅固清淨是西方義自性離障絶非是過十萬義自性橫該豎徹是世界義鈔堅固者西屬金體有堅固義即自性真常不易萬古如如故清淨者復有二義西當肅氣有澄清義即自性諸妄本空體露金風故西當白色有潔淨義即自性諸染不生本來一色故離障絶非者自性本無煩惱如十苦十惡十纏十使等並超越之有遠過義是知堅淨為西方盡西矣豈必專標日落迥絶為過無弗過矣誰能更計途程橫亘十方豎窮三際非近非遠絶中絶邊則從是過不可說不可說微塵佛土無世界不名極樂何但有世界名為極樂也二標主顯正其土有佛號阿彌陀今現在說法疏其者承上土必有人指能依之人曰佛佛必有號出本佛之號曰阿彌陀三世皆有佛揀過未之佛曰現在佛佛皆度生指度生之軌曰說法現在說法如大本及大雲中說鈔大本云彼佛非過去非現在非未來但以酬其志願見在西方其世界名曰極樂佛號阿彌陀大雲者大方等大雲經云爾時世尊熙怡微笑從其面門出無量光大雲密藏菩薩問故佛言西方世界有國名安樂佛號無量壽見在說法告一菩薩言娑婆世界釋迦牟尼佛今說大雲經汝可往聽今彼菩薩將來至此則正當釋迦說法時彌陀亦在彼說法故知非過非未現在說法疏凡言現在復有二義如釋迦彌陀均名現在而小不同鈔小不同者釋迦賢劫四佛是名現在而雙林示滅相好難親徒仰嘉名僅存像教阿彌陀佛則今日今時正於彼國現在說法是釋迦現在之過去彌陀現在之現在也古人云佛在世時我沈淪今得人身佛滅度懊惱自身多業障不見如來金色身感慕傷嗟一至於此今釋迦雖滅彌陀現存但得往生便能親炙而不信不願徒為無益之悲亦惑矣疏又此現在且據釋迦當時而言實則徹於前後亦復後後無盡皆名現在鈔前後者釋迦未出世前彌陀亦現在說法釋迦既滅度後彌陀亦現在說法乃至今日猶云現在後後無盡者以釋迦說法止於四十九年迦葉而上彌勒而下縱年數多亦有限量未若彌陀說法至為久遠諸佛莫及是故不唯今日猶名現在後後無盡皆可名為現在說法也問彌陀之後次補觀音安得無盡答彌陀住世幾劫觀音補之曾有數否彼觀音尚云住無央數劫無央數劫不可復計劫不可復計劫乃授勢至則彌陀可知矣豈非亦是有盡之無盡耶況勢至之補觀音永無般泥洹時雖云勢至實彌陀說法無異也謂之後後無盡夫奚不可疏又此現在且據釋迦對彼而言實則彌陀現在即釋迦現在鈔智覺云總持教中說三十七佛皆毗盧遮那一佛所現謂遮那內心證自受用成於五智自當中央法界清淨智次從四智流出四方四如來其妙觀察智流出西方極樂世界無量壽如來則一佛而雙現二土也故清涼云即本師也疏然諸佛說法多種不同今是依正皆說詳如此經及大本觀經中說鈔多種者如言說瞻視乃至香飯等故極樂世界不但金口說法依正悉爾如大本云阿彌陀佛為諸菩薩聲聞諸天世人廣宣大教敷演妙法莫不欣然悅適心得解悟各有所得又云東方恆河沙數諸佛各遣無量菩薩聲聞至阿彌陀佛所聽說妙法四維上下亦復如是是正報說法此經水鳥樹林演暢妙法及大本觀經如後文中詳引是依報說法又大本云彼國蓮華出無量光光中出無量佛一一諸佛皆說妙法是依正俱時說也疏有謂說法是應身報身有謂三身齊說各隨機見鈔應身說者有云法身一向不說報身具說不說應身定說則彼佛說法當是應身然亦兼報如大本高出一切世間之身觀經六十萬億那由恆沙由旬之身則豈定丈六然經云報化非真佛亦非說法者何得定言法身不說當是隨機所見自不同耳疏所惜者萬里百城為參知識梯山航海云禮道場豈可萬德如來現在說法漠然不顧甘墮城東是則名為可憐憫者鈔萬里者僧問大隨劫火洞然未審這箇壞不壞答云壞僧曰恁麼則隨他去也答云隨他去僧疑不決往還萬里廣參知識始得大悟百城者善財南遊百一十城參五十三善知識引此以況阿彌陀佛是最上知識也梯山航海如峨嵋普陀等引此以況西方極樂世界是最勝道場也然古之跋涉蓋為親炙聖賢今日奔馳祗是遙瞻影像而且備經險阻不憚劬勞何得現在慈尊捨之不往城東老母與佛同生而不見佛非此之流耶過未之佛勢所難逢現在空過故可憐憫疏稱理則自性體自靈知是其土有佛義自性即今顯現是現在說法義鈔終朝侍佛側不見金容竟日坐法筵罔聞妙道遂使魔王混於佛殿邪法亂乎真宗但能返照心源佛法一時雙足二別釋二初依報二正報初依報二初總名極樂二別示莊嚴初總名極樂舍利弗彼土何故名為極樂其國衆生無有衆苦但受諸樂故名極樂疏先釋依者順上文故亦令衆生生欣樂故苦者逼惱之義為四諦首衆苦者諸經論開有三苦八苦十苦百一十苦又約二種生死則變易亦苦況其餘者以苦事非一故曰衆苦也諸樂者如經所陳二種清淨莊嚴亦以樂事非一故曰諸樂也極樂者以諸國苦樂有其四種有苦多樂少者有苦樂相半者有苦少樂多者有無苦純樂者今當第四故鈔四諦者苦集滅道苦居最先知苦乃斷集修道證滅也三苦者一苦苦謂受有漏身已名為苦更加種種逼惱則苦而復苦也是為欲界苦二壞苦謂當樂壞時不勝憂惱也是為色界苦三行苦此苦處中即不苦不樂念念遷流也是為無色界苦又欲界具三色兼後二無色唯行為三苦也而彼國離欲清淨則無苦苦依正常然則無壞苦超過三界則無行苦八苦者生居胎獄老厭龍鍾病受痛疴死悲分散愛則欲合偏離冤則欲逃偏遇求則欲得偏失乃至五陰熾盛總成上七名八苦也而彼國蓮華化生則無生苦寒暑不遷則無老苦身離分段則無病苦壽命無量則無死苦無父母妻子則無愛別離苦諸上善人同會一處則無冤憎會苦所欲自至則無求不得苦觀照空寂則無五陰盛苦十苦者菩薩藏經謂一生苦二老苦乃至十生死流轉苦百一十苦者瑜伽論一無差別流轉苦二欲苦癡苦乃至五十五苦次九種苦於九種中又次第疊開成五十五合之為百一十苦今彼國皆無也然約之不出三苦八苦攝種種苦二種生死者謂分段變易分段者四大所成有分齊段落如上八苦中說變易則二乘菩薩雖離分段未免四相遷流因移果易亦名為苦彼國蓮華化生一生不退何慮二種苦也大本云彼國不聞苦名何況實苦故云無有衆苦二種清淨者論明一者器世間清淨二者衆生世間清淨即依正二報功德莊嚴如下文中及大本觀經詳辨問淨名云一切衆生即寂滅相不復更滅則一切國土即極樂相何更有樂今開苦樂似違彼經答賢首大師釋彼經意謂是但以迷倒妄見生死名在此岸悟生死空本來圓寂即名彼岸今謂亦以迷倒妄見五濁名住娑婆悟五濁空本來清淨即名極樂國土常淨衆生自迷迷多悟寡示苦示樂不容己也疏苦樂相對正以彼此二土較量勝劣令生欣厭如難易十種等鈔相對者以此極苦對彼極樂一勝一劣天壤較然欣厭自生取捨自定十種者慈雲懺主開此土彼土難易十種今以苦樂對之一者此土有不常值佛苦彼土無之而但有華開見佛常得親近之樂二者此土有不聞說法苦彼土無之而但有水鳥樹林皆宣妙法之樂三者無惡友牽纏苦而有諸上善人俱會一處之樂四者無羣魔惱亂苦而有諸佛護念遠離魔事之樂五者無輪回不息苦而有橫截生死永脫輪回之樂六者無難免三塗苦而有惡道永離名且不聞之樂七者無塵緣障道苦而有受用自然不俟經營之樂八者無壽命短促苦而有壽與佛同更無限量之樂九者無修行退失苦而有入正定聚永無退轉之樂十者無塵劫難成苦而有一生行滿所作得辦之樂等者如安國鈔開為二十四樂羣疑論廣為三十益皆舉樂明苦舉益明損大意同前茲不繁載疏四土苦樂略如天台教中說鈔所謂見思輕重同居苦樂體析巧拙方便苦樂次第一心實報苦樂分證究竟寂光苦樂文繁不敘疏問菩薩捐棄五欲雖輪王不以為樂憫念衆生雖地獄肯代其苦何得捨苦衆生自取樂土答智者十疑論中詳明又更有取捨多說不可不辨鈔論云菩薩未得無生法忍不能度生喻如破舟拯溺自他俱陷求生淨土得無生忍已還來此世救苦衆生乃克有濟故初心菩薩必先捨此苦處生彼樂處據此則捨苦者正欲拔衆生之苦取樂者正欲與衆生以樂也自利利他是菩薩道豈二乘獨善之可儔乎又多說者圭峯釋圓覺種種取捨皆是輪回謂如捨此娑婆取彼淨土而大梅亦云捨垢取淨是生死業故今辨云此等語言非不極致但得旨則號醍醐失意則成毒藥盡令而行何但捨娑婆垢取極樂淨為取捨也縱謂我土惟心而捨境取心亦取捨也縱謂我無取捨而捨此有取捨取彼無取捨亦取捨也亦輪回生死業也寧知理無分限事有差殊理隨事變則無取捨處取捨宛然事得理融則正取捨時了無取捨故菩薩雖知一切法平等不二而示苦樂境開取捨門權實雙行理事無礙斯論且置今汝自審果能糟穅臭腐以為飲食不異膏梁否廁溷坑穽以為牀榻不異華堂否木皮草葉以為衣服不異羅綺否虎兕熊羆以為伴侶不異父母兄弟否冬坐冰雪不異繒纊否夏暴烈日不異涼風否乃至地獄中銼燒舂磨不異入第三禪否異類中行不異遊戲否如其不然宛爾凡夫何得妄以大聖人過量境界而為己有取快一時流害無盡應聞此語生大悔恨起大覺悟涕淚悲泣求生淨土故苕水評圭峯疏謂欣厭取捨雖謂迷真起妄亦能順教成功但知全修即性則欣厭本空況安養一門諸佛共讚往來法界彌顯唯心託彼勝緣速登寶覺實生物歸棲之正路乃聖人汲引之妙權也疏稱理則自性無染是無有衆苦義自性常淨是但受諸樂義鈔染是苦義淨是樂義自性無染常淨是無苦常樂也華嚴六地觀察無明以無明至六入是行苦觸受是苦苦餘是壞苦我今此心無無明乃至無老死等成無苦義無此十二支即真解脫成受樂義經云無上菩提覺法樂無上涅槃寂靜樂皆樂義也以上且順經文苦樂對待如實而說染既不立淨亦何存淨穢雙忘苦樂平等如斯之樂乃所以為極樂也聖解還成魔境佛見早墮鐵圍是故我觀極樂實無可樂若有可樂與苦何別二別示莊嚴四初欄網行樹二池閣蓮華三天樂雨華四化禽風樹初欄網行樹二初詳陳二總結初詳陳又舍利弗極樂國土七重欄楯七重羅網七重行樹皆是四寶周匝圍繞疏此正明樂事也欄楯圍於樹外羅網覆於樹上重重相間其數有七也四寶者七寶前四也周匝者遍滿圍繞者回護言重重皆四寶所嚴飾也鈔欄楯者橫曰欄直曰楯此方華木亦作欄楯一防物損二示美觀彼土雖牛羊絶牧玩好無心而萬行功德之所莊嚴任運成就也羅網義同此行樹者次第成行無錯亂也七重者一重欄網圍覆一重行樹故曰重重相間也三事雖此方亦有而質唯木石彼純以寶也七寶前四者金銀琉璃玻瓈也周匝圍繞者如瑞相經云無量寶網皆以金縷珍珠百千雜寶莊嚴較飾周匝四面垂以寶鈴光色華耀羅覆樹林大本云其網柔軟如兜羅綿則非世寶必待雕琢矯揉而為嚴飾也欄楯寶飾例此可知大本云諸寶崖上有無數栴檀香樹吉祥果樹行行相值莖莖相望枝枝相准葉葉相向華華相順果果相當如是行列數百千重是名為行又云七寶諸樹遍滿世界所謂金根金莖枝葉華果亦皆以金則名一寶金根銀莖枝葉華果亦分金銀則名二寶如是三寶四寶其寶間錯轉展增多乃至七寶又云諸佛淨國殊勝莊嚴於寶樹中悉皆出現猶如明鏡觀經云七寶行樹一一樹高八千由旬一一華葉作異寶色琉璃色中出金色光玻瓈色中出紅色光等又云妙真珠網彌覆樹上一一樹有七重網一一網間有五百億妙華宮殿如梵王宮諸天童子自然在中又云一一樹葉縱廣正等二十五由旬其葉千色有衆妙華作閻浮檀金色如旋火輪宛轉華間涌出諸果如帝釋瓶有大光明化成幢幡無量寶蓋是寶蓋中映現三千大千世界一切佛事亦於中現又大本云佛講堂阿羅漢舍宅各各內七寶池外七寶樹數千百重據此則三經詳略為別此但言七重彼言數千百重此但言羅網彼言羅網之中出天宮殿此但言行樹彼言行樹之中現大千界又此言四寶彼言七寶蓋今經略示彼經詳陳以簡攝繁取文省故文雖不足義實無缺如靈芝云七重欄楯凡佛菩薩住處皆然非謂一國只七重也則知數百千重者多種七重積而成之七七相重重重無盡也餘可例見疏又皆言七者表七覺支七聖財等鈔七覺見後七聖財者一信二戒三聞四捨五慧六慚七愧前五如寶後二如人善守財故疏又大本言阿彌陀佛道場樹高十六億由旬四布枝葉八億由旬樹本隆起五千由旬一切衆寶自然合成復垂衆寶以為瓔珞復有寶網羅覆其上據此則行樹之外別有佛道場樹今文省便即行樹中攝又論中功德草亦樹中攝大本其樹有香亦寶中攝鈔道場樹即菩提樹如釋迦佛亦坐樹下而成正覺是也十六億由旬者王氏大本云一千六百由旬夫行樹尚及八千佛樹何得反劣今所引寶積本也即行樹攝者以道場樹亦復根莖枝葉華果行行相次故行樹足以攝之也功德草者論云寶性功德草柔軟左右旋觸者生勝樂過迦旃鄰陀今不言者以木攝草故樹香者大本法藏願云我作佛時國中華樹俱以無量雜寶百千種香而共合成其香普熏十方世界衆生聞者皆修佛行今不言者異寶必有奇香以寶攝香故二總結是故彼國名為極樂疏結前例後鈔結前者繇此欄網行樹清淨莊嚴所以珍域別於泥沙瓊樹異於荊棘無一切苦有一切樂名極樂也例後者後文功德莊嚴下雖無名為極樂之句義則有之此中名為極樂下雖無功德莊嚴之句義亦有之文互見也疏稱理則自性萬德縱橫是欄楯義自性包羅法界是寶網義自性長養衆善是行樹義鈔縱橫者六度萬行不離自性如自性本無慳貪是名布施以施為縱施無染心則橫成戒度施無傲心則橫成忍度施無倦心則橫成進度禪定智慧亦復如是餘之五度例上可知衆妙畢具是即美觀諸妄不干是即防損包羅者自性彌滿清淨包法界故長養衆善者如華嚴離世間品云菩薩妙法樹生於直心地信種慈悲根智慧以為身方便為枝幹五度為繁密定葉神通華一切智為果又淨名佛道品云無漏法林樹覺意淨妙華解脫智慧果皆根本於心地而發生無盡者也奈之何欄楯毀而斧斤入羅網頽而蔭覆疏尚枯瘁其根枝況發榮於華果然而覺林如故道種非遙何不猛與滋培重加整飾便見庭前柏樹檻外藥欄行行般若真如面面菩提佛性二池閣蓮華四初池水二階閣三蓮華四總結初池水又舍利弗極樂國土有七寶池八功德水充滿其中池底純以金沙布地疏又者承上不但陸地莊嚴有如是欄網行樹池水莊嚴亦復勝妙無比也七寶池者七寶所成池中之水亦七寶故鈔七寶所成者揀異此方土石所成故大本云內外左右有諸浴池或十由旬或二十三十乃至百千由旬猶如大海一寶二寶乃至七寶所共合成又云若彼佛池其方倍此皆七寶成今經不言佛池總攝池中故水亦寶者觀經云一一池水七寶所成其寶柔軟從如意珠王生分十四支作七寶妙色黃金為渠又云其摩尼水流注華間尋樹上下今止言寶池不言水亦寶成及流注上下總攝水中故水本就下從下上流此方所無故如下生經云兜率陀天有水遊梁棟間即其類也疏八功德者唐譯云一澄淨二清冷三甘美四輕軟五潤澤六安和七除飢渴八長養諸根具八種功德利益衆生也觀經疏開八德與此小異池底金沙者金沙為底無泥滓也鈔一澄淨者謂澄渟潔淨離汙濁故二清冷者謂清湛涼冷無煩熱故三甘美者謂甘旨美妙具至味故四輕軟者謂輕揚柔軟可上下故五潤澤者謂津潤滑澤不枯澀故六安和者謂安靜和緩絶迅泛故七除飢渴者謂水僅止渴今兼療飢有勝力故八長養諸根者謂增長養育身心內外故觀疏八德者一輕二清三冷四軟五美六不臭七飲時調適八飲已無患與上大同小異此合輕軟彼分為二此無不臭彼缺潤澤及與安和然義則互見以澄淨清冷必無臭惡既輕且軟豈不安和略少潤澤故云小異又彼配六入此則澄淨色入甘美味入至云長養諸根則耳鼻身意皆攝之矣又大本云大河之下金沙布地有諸天香世無能喻隨水散馥雜水流芳皆香入之證也下文說法是聲入與法入證也問甘美輕軟除飢長根此方所無則誠然矣凡水悉皆清冷悉皆潤澤何彼水以二獨稱功德答此水雖亦清冷逢日則炎遇火則沸彼縱劫火臨之清冷自如終不炎沸故此水雖亦潤澤日曬則乾火逼則涸彼縱劫火臨之潤澤自如終不乾涸故金沙者觀經云真金為渠渠下皆雜色金剛而為底沙大本云純一寶池底沙亦以一寶黃金池者白銀底沙水晶池者琉璃底沙二寶為池底沙亦二乃至七寶亦復如是今止金沙文省便故疏又大本敘寶池水畢復開三種殊勝妙用一水能隨意二水能說法三浴畢進業鈔隨意者大本云諸上善人入七寶池澡雪身體意欲令水沒足水即沒足欲令至膝水即至膝欲令至腰至腋至頸及灌其身悉如其意欲令還復水即還復調和冷暖無不順適開神悅體滌蕩情慮清明澄潔淨若無形是水本無心能隨人心意所欲也說法者大本云微瀾洄流轉相灌注不遲不疾安詳徐逝波揚無量自然妙聲或聞佛聲或聞法聲或聞僧聲寂靜聲空無我聲大慈悲聲波羅密聲十力無畏不共法聲諸通慧聲無所作聲不起滅聲無生忍聲乃至甘露灌頂衆妙法聲稱其所欲無不聞者發清淨心成熟諸根永不退於無上菩提是水本無情善能說諸妙法也浴畢進業者大本云既皆浴已或各坐於蓮華之上又云有在地講經者誦經者自說經者授經者聽經者念經者思道者坐禪一心者經行者有在虗空中講經者乃至坐禪經行者各隨其質而有所得未得四果者因得四果未得不退轉地菩薩得不退轉是水不但以可浴為功又能利益於既浴之後也以上三種殊勝皆攝寶池德水中故又後出經偈云但有河水流音響如說經是也疏稱理則自性汪洋沖融是寶池義自性悉備一切功德是德水義鈔汪洋沖融者汪深貌自性深玄無盡如池底故洋廣貌自性廣遠無際如池量故沖融者中和貌自性非真非俗純粹至善如池純以寶成故備諸功德者自性無染即澄淨德自性無煩即清涼德自性無惡即甘美德自性無我即輕軟德自性無竭即潤澤德自性無暴即安和德自性無乏即除飢渴德自性出生一切萬善即長養德又自性順萬物而無情上行則入聖流聖無所增下行則入凡流凡無所減不變隨緣周遍法界所謂流注華間及諸梁棟者也永明云水有十德同真性故意正如是定水湛然滿浴此無垢人無垢亦無淨是名八功德二階閣四邊階道金銀琉璃玻瓈合成上有樓閣亦以金銀琉璃玻瓈硨磲赤珠瑪瑙而嚴飾之疏四邊者中為池水周圍四邊為階道也金者梵語蘇伐羅銀者梵語阿路巴琉璃者此云青色寶玻瓈者此云水玉硨磲者此云大貝赤珠者梵語鉢摩羅伽瑪瑙者梵語鉢摩羅伽隸以斯七寶莊嚴較飾也鈔階道者離地曰階坦途曰道樓閣者重屋曰樓岑樓曰閣如觀經言黃金地上一一寶中五百色光其光如華成光明臺樓閣千萬百寶合成大本云阿彌陀佛講堂精舍宮殿樓閣皆以七寶勝於此界第六天上天帝所居百千萬倍菩薩所居亦復如是諸天及人宮宇樓閣稱其形色高下大小或以一寶二寶至無量寶又佛地論云且說七寶其實淨土無量妙寶故知曰四寶者文省便也又華嚴入法界品云危樓迥帶閣道傍出棟宇相承窗闥交映階墀軒檻種種滿足一切皆以妙寶莊嚴即斯義也又大本云是諸樓閣有隨意高大浮於空中若雲氣者有不能隨意高大止在地上者以求道時德有厚薄所致又云樓觀欄楯瓔珞覆上皆作五音又觀經云樓閣兩邊各有華幢無量樂器以為莊嚴八種清風鼓此樂器演說苦空無常無我之音以是推之則此止言樓閣不分佛及菩薩天人亦不分在空在地亦不言樂音演法悉文省也金者四義一色無變二體無垢三轉作無我四能令人富銀四義同而功稍劣琉璃青色是其正譯又名不遠者不遠山名山出此寶以近波羅奈城故水玉者今水晶也硨磲言大貝者貝為海中介蟲大者名寶一云非梵語以其似車之渠渠者網也赤珠者佛地論云赤蟲所出有天赤珠名因陀羅非世所有大論真珠或出魚腹或出蛇腦或出蚌胎或生竹中則色非定赤故以前譯為正瑪瑙者或云丹丘之野鬼血所化一云如馬腦故莊嚴者有整齊義較飾者有文彩義以斯嚴飾則如前或以一寶二寶乃至七寶之類是也又此七寶姑取名同此方實則不類如天金天銀已非人世所有何況彼土疏又七寶者常喻取貴重義如梵網中說鈔貴重者梵網經菩薩心地品言棄捨大乘經律不學而學外道二乘邪見等者如捨七寶反取瓦礫對瓦礫言故知寶者取貴重義正明二土淨穢不同令欣厭故問堯處茆茨箕諫象玉世間王臣且崇素朴淨土菩薩何貴寶嚴答此有二義一者上智之士知心淨則土自淨正勝則依必強理固有然心實無著喻如舜在畎畝躬荷犂鋤一承堯禪警蹕冕旒不期自辦舜何樂焉故曰有天下而不與也二者曲為鈍根凡夫須示苦樂令生欣厭先以欲鉤牽後令入佛智喻如正厄饑寒之國忽聞飽暖之鄉方沈幽暗之崖乍覩光明之境豈不身心踊躍舍故即新但得往生終成解脫方便接引當如是耳疏稱理則自性平直是階道義自性高邃是樓閣義自性具足功德法財是七寶義鈔平直者自性解脫自在離諸垢汙曠闊坦夷無有偏陂是名階道高邃者自性迥超塵境觀照不遺囊括虗空廣博無盡是名樓閣功德法財者自性常而不遷淨而不染我而隨緣不礙樂而富有不虧是名金銀自性內外明徹無障無礙是名琉璃自性本體潔白離過絶非是名硨磲自性光明熾然是名赤珠自性堅實不易是名瑪瑙衆美畢具資成法身是名嚴飾也且善財遍歷重城博參羣彥最後於彌勒樓閣彈指而登今但持名不涉回塗便居妙境其如終日寶階行自稱迷路漢可謂倚門彈指不知身在玉樓中者也惜哉三蓮華池中蓮華大如車輪青色青光黃色黃光赤色赤光白色白光微妙香潔疏上言池外今表池中蓮華梵語芬陀利亦云優鉢羅亦云鉢特摩亦云拘勿頭鈔梵語芬陀利此云白蓮華未開名屈摩羅將落名迦摩羅處中正開名芬陀利優鉢羅者青蓮華也鉢特摩者紅蓮華也拘勿頭者黃蓮華也疏車輪者言其形也大小無定婆沙等說種種不同各隨機見鈔車輪大小者婆沙論云輪王千輻金輪周圓十五里華嚴鈔云金輪大一由旬觀經云一一池中有六十億七寶蓮華團圓正等十二由旬大本云池中蓮華或一由旬乃至百由旬千由旬而人世車輪大不逾丈不可以此而為定準又云衆寶蓮華周遍世界一一寶華有無量百千億葉按經別蓮華勝劣三種十葉百葉千葉今曰無量百千億葉葉既無量則華之大亦無量矣又如來藏經云爾時世尊於栴檀重閣正坐道場而現神變有千葉蓮華大如車輪華中化佛各放無數百千光明故知車輪不可思議寧得局以人世常所御車而為限量隨機者以或小或大繇其因地念佛功有勝劣機感自致耳乃有以華如車輪抑此經為散善蓋未考於輪義疏大如車輪且喻形體以輪喻德亦有多義鈔形體者輪體圍圓有蓮象也多義者又輪有轉義此蓮華者托孕衆生易凡成聖即轉義故又輪有輾義此蓮華者不染汙濁破除煩惱即輾義故又輪有飛行義聖王金輪一日之中繞四天下此蓮華者遍至十方接彼念佛衆生歸於極樂即飛行義故餘不煩舉疏青黃赤白言其色也不唯舉色而言光者此土蓮華有色無光故但舉四色者省文也鈔四色解見前疏光者後色而發如珠瑩潔則能發光彼土蓮華至為清淨故有光也大本云青色青光白色白光玄黃朱紫之色其光亦然煒燁煥爛明耀日月一一華中出三十六百千億光一一光中出三十六百千億佛一一諸佛又放百千光明普為十方衆生說微妙法據此則青白玄黃朱紫已成六色而佛地論復云七寶故知四色其文省故其實蓮華具無量色具無量光也又不言說法者亦文省故疏微妙香潔言其德也舉四德者亦文省故鈔四德者離垢是蓮華正義推廣其義略說為四一言微者復有四義二同二別一者根潛池底不可窺視是為幽微二者不生高原陸地與繁華麗蕊而爭妍豔是為隱微三者觀經言一一葉上有八萬四千脈猶如天畫是為細微四者七寶所成珍奇粹美是為精微前二通於此方後二彼國獨擅故二同二別二言妙者復有十二義四同八別一者方華即果不待華落是為因果同時妙二者染而不染不染而染是為垢淨雙非妙三者一華遍圍於子外衆子羅列於華中是為總別齊彰妙四者晝則開敷夜則還合是為隱顯隨宜妙五者巨蓮在中而有百千萬億蓮華以為眷屬是為主伴相參妙六者上中下品各三成九九九無量隨其宿修不相錯謬是為勝劣分明妙七者大一由旬乃至百千萬億由旬是為小大無定妙八者不以春生不以秋瘁亘古常新是為寒暑不遷妙九者朱紫玄黃或復純白雜色雜光亦復如是是為彩素交輝妙十者生於彼國而能從空來至此土迎取當生是為動靜一源妙十一者諸佛菩薩結跏其中念佛衆生托質其內是為凡聖兼成妙十二者此方念佛華即標名勤惰才分榮枯頓異是為感應冥符妙前四後八同別可知三言香者此方彼國相較勝劣亦有二義一者此方則出汙泥中宜為所溷而清馨淡然是為穢中香二者彼國則如大本言光色既異香氣亦異芬芳馥郁不可勝言故青蓮華香白蓮華香誦斯偈者尚致口出蓮華之香超一切香香無與比是為香中香則知此方之香已勝餘華彼國乃勝而又勝者也四言潔者此彼勝劣亦有二義一者此方則出汙泥中宜為所染而瑩然清淨是為垢中潔二者彼國則根自金沙異濁土故生從德水異常流故質成妙寶異凡卉故超一切潔潔無與比是為潔中潔勝而又勝例上可知以上從其切近略表四德若廣演之亦應無量問有謂下品下生生鐵蓮華其說然否答未見佛說如上所明色不止四有七寶華則知金蓮華者黃色所攝玻璃硨磲及與銀蓮白色所攝赤珠瑪瑙紅色所攝乃至琉璃亦黃色攝推而廣之帝青蓮華青色所攝如真珠等亦白色攝以是參合應無鐵蓮鐵於五金金所賤故鐵於七寶寶所無故九品下生猶勝天宮天宮皆以寶成不聞有鐵況在西方何得有此疏又蓮華者往生彼國托質之所念佛之人特宜知此鈔托質者未證無生生必有托六趣衆生則中陰之身自求父母往生善土則一彈指頃蓮華化生下文一心不亂即得往生阿彌陀佛極樂國土即是生此蓮華中也是蓮華者乃卸凡殼之玄宮安慧命之神宅往詣之國號曰蓮同修之友號曰蓮社約禪誦之期號曰蓮漏定趨向之極號曰蓮宗重其事也修淨土者若禮佛時當想己身在蓮華中作禮佛在蓮華中受我禮敬若念佛時當想己身在蓮華中結跏趺坐佛在蓮華中接外於我然後一心持名昔有二僧作蓮華開合想遂得往生況復加之一心持名而不生者問此經不兼色像今胡乃爾答有專主故兼亦無礙如菩薩偏行六度時以施為專主餘非不修但隨力隨分今念佛亦然專主於觀想者少時持名專主於持名者少時觀想亦隨力隨分之意也所謂不兼色像者蓋恐一心執持名號又一心觀想色像不唯心無二用而兩事雙行輕重不分俱無成就耳苟明於正助之義則一心持名以為其正少時之助助亦歸正如火益薪復有何礙疏稱理則自性清淨光明是蓮華義鈔清淨表色自性纖塵不立故光明表光自性萬法朗然故佛地論云如是假實之色皆不離佛淨心即此淨心能顯假實之色故經云青色青光黃色黃光等是光色不二寂照雙融也又自性寂是華合義自性照是華開義自性具足一切善法是微妙香潔義然則不離塵境未浴寶池常在蓮華中經行及坐臥四總結舍利弗極樂國土成就如是功德莊嚴疏如上欄網行樹池閣蓮華種種莊嚴皆是阿彌陀佛因中所發大願及願後所修大行無量功德之所成就也如華嚴中願行亦同此意鈔願以起行行以實願菩薩因地莫不皆然行滿願遂名為成就因中者為法藏比丘時也言願者所發四十八願也有願云我作佛時生我剎者皆於七寶水池蓮華化生又願云我作佛時我剎中自地以上至於虗空皆有宮殿樓閣池流華樹悉以無量衆寶百千種香而共合成又云若我成佛周遍國中諸莊嚴具無有衆生能總演說是為大願言行者大本云法藏比丘於世自在王佛所攝取二百一十億佛剎清淨之行如彼修持又云法藏比丘發四十八願已住真實慧勇猛精進阿僧祇劫修菩薩行護身口意修行六度了空無相無作以行教化致無量衆生發菩提心是謂大行言功德者即此行願名為功德大本云如是積功纍德無量千萬億劫功德圓備方得成就斯願而入佛位華嚴願行者華藏世界品云此華藏莊嚴世界海是毗盧遮那往昔微塵數佛所修微塵數大願之所嚴淨又下云普賢智地行悉成一切莊嚴從此出例法藏願行亦猶是也疏又功德者無漏性功德也復有勝劣今是勝功德故鈔無漏功德者初祖以營修世福為有漏之因不名功德又云功德在法身中則此之大行大願皆自性無漏功德非事上人天小果有漏之因也勝劣者聲聞菩薩乃至於佛皆有功德小大懸殊今是彼佛因地修無量願行之所成就崇功至德不可思議故云勝也疏問金剛般若謂莊嚴佛土者實非莊嚴是名莊嚴今乃廣陳依正云何二經意義相背答性相不殊所宗異故鈔性相不殊者全性起相全相歸性性相本非二物而當經各有所宗彼經以無相為宗故唯明第一義相不取形相實則清淨心中身土自現喻如磨鏡塵盡像生其專言性者蓋即相之性非棄相而取性也今經以勸生淨土為宗故於極樂依正種種莊嚴反覆開明令起欣慕實則相本自空唯心唯識其廣陳相者蓋即性之相非離性而言相也為門各別究竟是同故知二經義不相背疏問諸天宮殿園苑亦以寶嚴與此何別答粗妙異故鈔粗妙者如世珠玉雖均名寶而質有粗妙價有重輕故諸天自下而上依正莊嚴從粗漸妙勝劣迥殊何況極樂超越三界寧不寶嚴之中獨為最勝經云輪王亦有三十二相而不及佛即此意也疏又此功德雖佛力成就亦兼繇衆生以心淨土淨故鈔兼繇衆生者維摩經云直心是菩薩淨土菩薩成佛時不諂衆生來生其國深心是菩薩淨土菩薩成佛時具足功德衆生來生其國乃至萬行悉亦如是是以此方念佛彼土蓮成則極樂種種清淨莊嚴雖彼佛為菩薩時之所成就而謂勤修淨業衆生共與成就亦可也故曰隨其心淨則佛土淨疏稱理則自性能生萬法是莊嚴義鈔六祖云何期自性能生萬法華嚴經云一切寶鈴網解一切法如幻心所生一切寶樓閣無著善根無生善根所生乃至衣蓋幢座等莫不皆然又云此華藏莊嚴世界海中若山河乃至樹林塵毛等處一一皆是稱真如法界具無邊德是故當知淨土唯心更無外境
