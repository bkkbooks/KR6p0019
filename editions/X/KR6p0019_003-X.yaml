body:
  text: 明古杭雲棲寺沙門袾宏述三天樂雨華四初天樂二金地三雨華四總結初天樂又舍利弗彼佛國土常作天樂疏上敘寶池此談金地之上華樂交輝也天樂者異世樂故常作者無間歇故鈔異世樂者大本云第一四天王天及諸天人百千香華百千音樂以供養佛及諸菩薩聲聞之眾於是第二忉利天王欲界諸天以至第七梵天一切諸天香華音樂轉相倍勝又云亦有自然萬種伎樂無非法音清暢嘹喨微妙明雅一切音聲所不能及觀經云無量諸天作天伎樂又有樂器懸處虗空如天寶幢不鼓自鳴以是天人所作之樂非人間所有故云異世樂也無間歇者世樂須人有作有輟天樂自鳴故云常作也今人念佛臨終之日天樂迎空正唯淨土常作天樂故疏稱理則自性萬德和融是天樂義鈔自性如實空則不立一塵如實不空則交羅萬德調和而克諧不悖融液而一味無乖忍進相與低昂則塤鳴篪奏止觀雙成定慧則玉振金聲慈悲則哀矣不傷喜捨則樂而不泆如斯天樂非唯不鼓兼復無聲羽寂宮沈響天震地二金地黃金為地疏此躡前起後謂極樂世界上則樂作於天下則金嚴其地而居此黃金地上不獨耳聞天樂亦且眼見天華也黃金者謂瑠璃地上間以黃金然亦眾寶無定鈔間以黃金者如觀經云見瑠璃地內外暎徹下有金剛七寶金幢擎瑠璃地其幢八棱百寶所成一一寶珠放千光明一一光明八萬四千色暎瑠璃地如億千日瑠璃地上以黃金繩雜廁間錯界以七寶分齊分明據此則地本瑠璃而黃金者又地面之莊嚴也大本云彼剎自然七寶體性溫柔相間為地或純一寶光色晃耀超越十方廓曠蕩不可窮盡地皆平正無有須彌及諸山海坑坎井谷幽暗之所據此則亦可專以黃金為地良繇彼國廣大非止一隅黃金瑠璃且以一寶二寶言之眾寶為之當亦無盡疏稱理則自性真如平等是金地義鈔真如則無雜無穢無變無遷歷萬劫而常新平等則不增不減不高不下為千聖所共履毗舍如來謂當平心地則世界平如舍利弗心有高下乃見丘陵坑坎是也是故人人行處是黃金何待如來以足指按地三雨華三初天雨妙華二持以供佛三供已自適初天雨妙華晝夜六時雨天曼陀羅華疏言此黃金地上常雨天華也彼無須彌日月而言六時者以華鳥為候也盧山蓮漏蓋倣此意鈔此土日月旋環遶須彌而分晝夜如贍部正當須彌之南晝則始東洲半經乎南洲終西洲半夜則始西洲半經乎北洲終東洲半配十二支六時成晝六時成夜為一日也彼國既無須彌又無日月常明不昏晝夜無辨唯以華開鳥鳴而為晝華合鳥棲而為夜也然日月有無諸本不同漢譯云日月處空吳譯仍漢王氏復云處空而不運轉曹魏不言有無元魏及宋直云無有若和會之當是日月雖存以佛及聖眾光明掩暎與無同耳而以理揆之無者為正何者忉利而上尚不假日月為明何況極樂或漢譯日月上缺無有二字未可知也高明更詳之蓮漏者遠祖於廬山集眾念佛刻木為蓮具十二葉引流泉入池每度一時水激一葉晝夜六時禪誦不輟與會諸賢往生甚眾今人六時淨業本於遠祖遠祖本此疏曼陀羅天華名也此云適意又云白華天雨者讚歎道德如空生帝釋事鈔白華者天華多種如曼殊沙則云赤華今止白華文省便也亦可西方屬金取白業義適意者天華妙好適悅人意也大本云一切諸天皆賷天上百千華香來供彼佛及諸菩薩聲聞之眾是也讚歎者世人行善諸天歡喜何況彼國如來菩薩賢聖上善之所集會讚歎雨華理固應爾如空生帝釋者須菩提宴坐帝釋散華須菩提問空中散華當是何人答曰我乃天帝以尊者善說般若故是知淨土往生之眾一心不亂則諸念不生萬法空寂即是善說般若感動諸天又何疑哉疏又華有二種一者天華二者樹華今是天華以天攝樹故鈔天華者從天而下義如前釋樹華者大本云四方自然風起出五百音聲吹諸樹華華生異香隨風四散散諸菩薩聲聞大眾華墮地者積厚四寸極目明麗芳香無比及至小萎自然亂風吹去是彼土亦雨樹華故曰以天攝樹疏稱理則自性開覺是華義鈔自性在迷如華尚蕊自性忽悟如華正開又妙色煥爛不繪而成妙香馥郁不行而至華雨自空不種而生不採而下自性神靈通達亦復如是二持以供佛其土眾生常以清旦各以衣裓盛眾妙華供養他方十萬億佛即以食時還到本國疏此言天所雨華眾生持取供佛也眾生者除佛而言也清旦者六時之一也衣裓者盛華之器也供畢還國猶在食時以神足故鈔除佛者唯佛一人獨稱大覺菩薩而下以至往生彼國初心凡夫皆名眾生也以生佛相對故六時之一者清旦於晝時為最先以旦供佛表至敬也又旦是夜氣清明之際清旦供佛取心淨也彼國眾生雖晝夜一心固無清濁而未登佛地猶有無明觸事涉緣不無少動亦以平旦號清明心亦可隨順此方言清旦也常者日日恒然不疲厭故各者人人皆然無勤惰故盛華器者真諦謂衣裓為外國盛華之器或言衣襟亦以襟盛華也他方自本國而他方也不言本國者文省也十萬億佛一佛一大千土言廣遠也食時者晨齋時也清旦至於晨齋為時至少以至少時供至多佛明其速也如大本言諸大菩薩承佛威神一食之頃徧至十方無量世界供養諸佛華香伎樂衣葢幢旛無數供具若欲獻華則於空中化成華葢周四十里乃至六百八百里各隨大小停於空中勢皆下向以成供養復以妙音歌歎佛德聽受經法既供養已忽然輕舉還到本國猶為未食之前據此則有種種諸供養具又化華成葢又供畢聽法今止言以華供養皆文省也神足者如大本法藏願云我作佛時我剎中人皆得神足如一念頃過百千萬億那由他世界又願云即得宿命又云天眼又云天耳又云他心則生彼國者六通自在不止飛行今不言者亦文省也疏按此神足住位行位菩薩所有如華嚴中說鈔華嚴經云八住菩薩一剎那頃遊行無數世界又十行頌云佛剎無邊無有數無量諸佛在其中菩薩於彼悉現前親近供養生尊重則今之神足豈易及哉問此於三種意生身當屬何等答楞伽三種分屬聲聞菩薩大聖則生彼國者隨其所修各有所證如九品例疏稱理則自性自嚴是盛華供養義自性自徧是十萬億佛義自性自空是食時還義自性自住是本國義鈔自嚴者心本具含萬德還以萬德嚴心德無所德嚴無所嚴是真供養思益經云誰能供養佛通達無生者寶雨經云如理思惟即是供養如來是也自徧者以心徧一切處即是一一承事無空過者故維摩經言無前無後一時供養自空者心體本空空無來往是故以食時還聊對此方䟦涉耳實則不越剎那還國已竟自住者心源湛寂常住不遷是當人故鄉田地安身立命處金剛經還至本處即此經還到本國也此之謂務本三供己自適飯食經行疏承上食時故次言食經行者循環不斷義返已而食食已而行彷徉自適也鈔飯食者大本云諸往生者其飯食時銀鉢金鉢種種寶鉢隨意現前百味飲食充滿其中酸鹹甘淡各如所願不餘不缺不以美故過量而食食已自消而無遺滓或見色聞香意以為食自然飽適無所味著身心輕利食畢化去時至復現循環者如經貫緯絡繹連緜往來無已也食已而行一以調身使無凝滯一以調心使不放逸也彷徉者優遊自得意世人食已非奔走塵務則增長睡眠彼國飯食經行解脫之風逍遙之狀可想見也疏唯言飯食不及衣等唯言經行不及坐等亦文省故鈔衣者大本法藏願云我作佛時我剎中人所欲衣服隨念即至不假裁縫擣染浣濯又復有無量上妙衣服寶冠環釧耳璫瓔珞華鬘帶鎖諸寶莊嚴百千妙色自然在身又云復有無量如意妙香塗香末香其香普熏彼佛國界故不言衣以食攝衣及一切資生之具故不及坐者教開四種三昧一曰常行二曰常坐三曰半行半坐四曰非行非坐就此文中則唯第一然二部中皆言往生者坐蓮華中般舟三昧則復言立當知以行攝坐及四威儀故疏稱理則自性常定是飯食義自性常慧是經行義鈔禪悅為食故定有食義智能運轉故慧有行義如論頌云愛樂佛法味禪三昧為食又佛地論淨土中諸佛菩薩能說能受大乘法味又正體智受真如味能住持身命使不斷壞長養萬法故名為食又阿含唯識等說出世五食一禪悅二願三念四解脫五法喜謂禪定資神輕安適悅即為食義願力持法法身增長即為食義念力明記聖道現前即為食義解脫除障居然資益即為食義法喜內充極喜樂故即為食義今止言定者舉一兼四禪定之中無不攝故維摩經云未發大乘意食此食者至發意乃消已發意者得無生忍已乃消得忍者至一生補處乃消華嚴具足優婆夷云一生所繫菩薩食我食者皆於菩提樹下成等正覺皆自性真如無盡之理而為食也經行者持世經云如來行處是無行處無行處者真慧也故知拈匙放箸口口不離舉足動身步步踏著何得埋頭喫飯空過一生翫水觀山徒勞萬里四總結舍利弗極樂國土成就如是功德莊嚴疏結上天樂天華等種種莊嚴皆本佛願行功德所成就也鈔願者如大本法藏願云我作佛時自地以上皆無量雜寶百千種香而共合成又願云我作佛時十方無央數世界諸天人民聞我名號然燈散華又願云我作佛時剎中菩薩以香華等種種供具欲往他方世界供養諸佛一食之頃即可徧至又願云我作佛時我剎中人欲食之時寶鉢之中百味飲食化現在前食已自去今來成佛一一所願皆悉成就行者如大本云法藏比丘既發願已天雨妙華而散其上又云或為比丘或為天王或為輪王或為大臣恒往佛所承事供養又云手中常出衣服飲食幢旛寶葢一切音樂今來成佛如上天樂天華等報自合成就四化禽風樹三初化禽演法二風樹演法三總結二嚴初化禽演法二初正示法音二釋無惡道初正示法音二初宣音二獲益初宣音復次舍利弗彼國常有種種奇妙雜色之鳥白鶴孔鸚鵡舍利迦陵頻伽共命之鳥是諸眾鳥晝夜六時出和雅音其音演暢五根五力七菩提分八聖道分如是等法疏上言諸天獻瑞此言禽樹成音又上言供養之勝今言聞法之勝也種種言非一奇妙言異常雜色言美觀白鶴等者多種中舉一二也白鶴孔鸚鵡常見可知舍利解現前文迦陵頻伽此云妙音共命一云命命如是種種悉皆奇妙非凡鳥比鈔奇妙者形殊眾鳥名奇音能說法名妙白鶴者此土鶴有四種玄黃蒼白以白為勝然鶴雖白自無純白非真白鶴也孔鸚鵡皆此土所貴故獨舉也頻伽此云妙音未出殻時已有音聲超眾鳥故正法念處經云此鳥音聲若人若天緊那羅等無能及者唯除如來故云妙音共命亦云命命亦云生生梵語耆婆耆婆迦二首一身報同識異謂是釋迦調達宿因又雪山有二頭鳥一曰迦婁嗏一曰優波迦婁嗏是也彷彿如二頭之蛇九頭之鳥千頭之魚今刻繪作人身二首恐非也上文數鳥四通震旦二局西乾在此土者已稱珍異若在彼國形體色音轉更奇妙今姑取名同而實則異例如欄網行樹等皆以寶成非人世所有也舉一二者多不悉陳如觀經中有鳧鴈及鴛鴦等今以少攝多亦文省也疏然此土諸鳥唯鸚鵡解作人言而亦僅稱學語彼國則晝夜出音且和且雅為能演暢根力覺道一切道品非漫鳴也鈔僅稱學語者謂但依人語未能知義記曰鸚鵡能言不離飛鳥猩猩能言不離禽獸則人道未通何況佛心鸚鵡且然餘可知矣和雅者和與暴對如鴟鴉等是名暴音雅與俗對如鶯鸝等是名俗音優柔平中無有麤厲能令聽者躁心自釋是名和音正大謹嚴無有邪靡能令聽者欲心自平是名雅音由之瑟尚缺於和鄭之聲大背於雅鳥兼二美是黃鍾大呂所不及也演者張而廣之義無盡故暢者敷而達之意無滯故如是演暢根力覺道三十有七諸道品也道品者以是入道之品類故疏然此三十七品屬小乘法實通大乘隨其心行如諸經論中說鈔通大乘者瑜伽四十四云大乘菩提分乃有多種三十七品是其中別義通於大小智論云三十七品無所不攝即無量道品亦在其中淨名云道品是道場又云道品是法身因攝大乘云道品是菩薩寶炬陀羅尼涅槃云若人能觀八正道即見佛性名得醍醐皆約大說隨心行者如涅槃云智有二種一者中智二者上智觀諸陰苦是名中智分別諸陰有無量相非聲聞緣覺所知是名上智則知道品是一觀智大小固無定也疏五根者一信二進三念四定五慧能生聖道故名為根又如俱舍具三義故鈔根有二義一者能持義持其所已得而自分不失也二者生後義生其所未得而勝進上求也言信根者謂於諦理深忍樂欲是名信根此一為總餘四承上進根者既信此理勤求不息是名為進念根者既求此理念茲在茲明記不忘是名為念定根者既念此理繫緣一境相應不散是名為定慧根者既定心在道復正觀分明決擇是非是名為慧能生聖道者以此五法調治其心譬如陰陽和適一切種子皆得發生故俱舍三義者俱舍論明最勝自在光顯為根最勝者根體勝故自在者根用勝故光顯者體用雙彰故於中開二十二根有信等五根故疏五力者即前五根增長具有大力故名為力鈔力有二義一者不為他伏二者又能伏他如瑜伽論此五力者能於後後所證出世間法生深勝解難制伏故又具大威勢摧伏一切諸魔軍故信力者深信諦理轉更增長能遮疑惑不為動搖能拒邪外不為迷亂能破煩惱不為侵害故一總餘承如上根例進力者進根增長能破身心種種懈怠成辦出世種種事業故念力者念根增長能破邪念成就一切出世正念故定力者定根增長能破一切諸雜亂想發起事理諸禪定故慧力者慧根增長能破一切邪外等見能斷一切偏小等執故疏七菩提分者即七覺支亦繇前根力得此慧用謂一念二擇法三精進四喜五猗六定七捨一云一擇法二精進三喜四除五捨六定七念今依後釋鈔覺支者覺即菩提支即是分謂分分隨宜而用也繇前者瑜伽云諸已證入正位者如實覺慧用此為支故知根力既固後須覺慧合宜則用依後釋者以天台所釋意明顯故又華嚴疏亦以擇法為自體餘分為分故一擇法者觀諸法時善能覺了揀別真偽故二精進者修道法時善能覺了不謬行於無益苦行故三喜者心得法喜時善能覺了不隨顛倒之法而生喜故四除者除諸見煩惱時善能覺了斷絕虗偽不損真正善根故五捨者捨所見念著之境時善能覺了取捨虗偽永不追憶故六定者發諸禪定時善能覺了諸禪虗假不生見愛故七念者修出世道時善能覺了常使定慧均平若心沈沒當念用擇進喜三支察而起之若心浮動當念用除捨定三支攝而伏之念念調和使中適故疏八聖道者亦名八正道繇前擇法故入正道謂一正見二正思惟三正語四正業五正命六正精進七正念八正定鈔一正見者雜集云若覺支時所得真覺以慧安立諦理分明無有錯謬故二正思惟者見此理時無漏心相應思惟籌量為令增長入涅槃故三正語者不惟心無邪思以無漏智攝口四業住四善語故四正業者以無漏智除身三種一切邪業住清淨身業故五正命者以無漏智通除三業中五種邪命故六正精進者以無漏智應勤行精進趨涅槃道故七正念者以無漏智於應念正道法及助道法心不動失故八正定者以無漏智相應正住於理決定不移故皆言正者以不依偏邪名正能至涅槃名道若華嚴離世間品則八正俱菩薩道正見者遠離一切諸邪見故正思惟者捨妄分別心隨順一切智故乃至正定者善入菩薩不思議解脫門於一三昧中出入諸三昧故釋云據此文證豈不深玄以例推之七覺根力三十七品皆隨眾生因地所修機見不同證大證小各有所得疏言如是等法者等四念處四正勤四如意足成三十七品及等餘一切法故鈔三十七品上惟二十有五故等以攝之四念處者所謂觀身不淨觀受是苦觀心無常觀法無我而云念處者以不淨是觀身者所當念處之所也苦無常等亦復如是四正勤者解見前文以生善滅惡不懈弛故名之為勤勤所當勤合於理故名正勤也四如意者亦名四神足所謂欲如意足心如意足勤如意足慧如意足良繇念處正勤以來精進增多定心稍弱修此四種定力攝心則智定均等能斷結使所願皆遂名如意足也合此七類則為三十七品婆沙智論皆以喻顯念處如種子正勤如栽植神足如抽芽五根如生根五力如莖葉覺支如開華聖道如結果故名道樹餘一切法者如四心六度無量法門等疏問何不先敘念等而首舉根答以重信故又上三科至此始有根力故鈔據七類次第聞法先當念持次即勤修勤故攝心調柔柔故成根根增成力乃七覺分別八道正行今重信者此經以信為主而根力二俱首信信持餘四是道之元德之母也如五位之中信亦居初十信之中信亦居初十一善法信亦居初故上三科者從念處正勤如意修為至此方得根力堅固能使前所得法無有退失故又後當得法畢竟能得亦繇乎信故首舉也疏稱理則自性變化是眾鳥義自性出生一切法門是根力覺道義鈔下文言彼佛變化所作今謂妙色雅音全體是自心顯現何得高推聖境又心地含諸種則五根等全體是自心培植何得向外馳求故先德謂信心堅固湛若虗空即五根力覺心不起即七覺支直了心性邪正不干即八正道故云海生萬物無物不海心生萬法無法不心二獲益其土眾生聞是音已皆悉念佛念法念僧疏聞音無益則同世音祇取娛樂今念三寶正明益也三寶者略有三相一住持相二別相三同相可尊貴故名之曰寶鈔住持相者雕鑄塑畫名為佛寶黃卷赤軸名為法寶比丘五眾和合無爭名為僧寶即世間三寶也別相者略有三義一者三寶自別二者三寶大小乘別三者三寶名相各別括其大意則常身尊特示現不同名為佛寶教行理果為門不同名為法寶三賢十聖四果四向緣覺獨覺階位不同名為僧寶即出世間三寶也同相者若約五教則一者立事就義門二者會事歸理門三者理事融顯門四者絕相理實門五者融通不礙門雖前淺後深而同歸一原括其大意則性體靈覺照了諸法名為佛寶恒沙性德皆可軌持名為法寶性相不二冥合無違名為僧寶即出世間最上三寶也尊貴者佛兩足尊法離欲尊僧眾中尊依之修行則出三界世間珍重無與為伍故名為寶通書亦云至尊者道至貴者德況三寶道德之極豈不稱寶疏聞念三寶自有四義一者鳥音之中讚三寶故二者說法有方善入人故三者晝夜無間熟耳根故四者鳥尚解說激勝心故鈔讚三寶者雖上根力覺道種種諸法為品不同約而言之皆三寶攝演暢此法時或明含靈本具覺性眾生聞者得自本心乃知有佛或明性具種種諸相眾生聞者解入深義乃知有法或明性相和合不二眾生聞者事理無礙乃知有僧故念三寶善入人者雖談妙法不善為辭聞則扞格今惟和雅之音優柔調適理義悅心聽者生喜故念三寶熟耳根者雖善說法一暴十寒心則懈廢今唯六時相續習聽飫聞浹隨淪肌熏陶成性故念三寶激勝心者鳥能說法人胡不如慚恥一生精進自發故念三寶疏稱理則自性真心一體是佛法僧義鈔如上同相所陳則知唯一真心更無別體心體本自覺照即佛寶心體本自性離即法寶心體本自不二即僧寶故曰自歸依佛自歸依法自歸依僧但令歸自不說歸他念念還歸自心是名真念三寶二釋無惡道舍利弗汝勿謂此鳥實是罪報所生所以者何彼佛國土無三惡道舍利弗其佛國土尚無惡道之名何況有實是諸眾鳥皆是阿彌陀佛欲令法音宣流變化所作疏恐疑淨土何因而有畜生不符法藏本願故明彼國實無惡道以彼佛欲令法徧人耳神力變化非真畜生故又不同天鳥能說法故鈔何因者愚癡暗蔽以為之因生畜生趣慳貪嫉妒以為之因生餓鬼趣十惡五逆以為之因生地獄趣名三惡道以六道中天為最善人道次之脩羅介乎善惡之中故獨此三最名為惡夫因於淨心生於淨土何繇淨土而有惡道如其有者是雜穢處不異娑婆何名極樂故有疑也本願者大本法藏願云我作佛時剎中無餓鬼畜生以至蜎蝡又願云我剎中人皆不聞不善之名何況有實不得是願終不作佛云何佛道已成頓違宿願故明彼國原無惡道非唯目所未覩亦復耳所不聞良繇耳之所聞唯是諸佛如來萬德洪名菩薩聲聞及諸天善人種種嘉號曾無三惡名字歷耳根故變化所作者復自難言既無畜生今白鶴孔等何所從來而在彼國乃出其繇是佛化作非真實有如觀經云如意珠王涌出金色微妙光明化為百寶色鳥是也法音宣流者宣則宣布自上徧下猶如王言流則流通自近及遠猶如逝水佛欲法音普周無間故不獨以人說法使彼鳥音皆說妙法無處無時而不聞聽此則大神通力之所變化豈同愚暗為因而感報畜生之真鳥耶然此變化自有二義一者如佛遣化人說種種法二者性具諸法依性起修果上自能色心互融依正不二皆悉說法是則鳥音演暢法爾自然非佛有心特為變作也不同天鳥者正法念處經云諸天遊樂池中鳧鴈等皆出音聲宣揚偈頌開示五欲畢竟無常不可耽玩諸天聞已有涕淚者此則實鳥繇在世時口說妙法不務真修報作諸鳥處於天宮以其宿習猶能說法非如淨土佛所變化故不同也疏問法藏偈云地獄鬼畜生皆生我剎中何言彼無惡道答偈意自明不俟疑辯女人生者義亦如是鈔偈意自明者法藏比丘願後說偈先云地獄鬼畜生皆生我剎中次即云一切來生者修習清淨行如佛金色身妙相悉圓滿則知必於娑婆已植淨緣故得往生既生彼國失本惡道皆成上善相好如佛尚何地獄鬼畜舊日之形體耶女生亦然者論謂女及根缺俱不生彼故援上例亦繇女人宿修淨行一生彼國具丈夫相無復女形矣今繪九品猶存女人謬也當是娑婆念佛時相不可謂是極樂得生時相也抑或表其因地以明一切皆得往生耳達者審之疏稱理則自性本無貪瞋癡等是無三惡道義自性本具如幻法門是變化所作義鈔若據不二門中貪瞋癡即戒定慧則善道惡道悉皆如幻幻無自性唯是一心一心不生萬法俱息二風樹演法舍利弗彼佛國土微風吹動諸寶行樹及寶羅網出微妙音譬如百千種樂同時俱作聞是音者自然皆生念佛念法念僧之心疏前言行樹羅網今言此諸樹網因風出音如上鳥鳴化導眾生利益無盡也風曰微者風之美也音曰微妙者音之美也微妙即和雅意百千種樂者以少況多讚其至美極人天樂所不能及其音亦宣根力覺道種種道品不言者文省也又大本云微風觸身今不言者亦文省也鈔微風為美者此土颶風吹動則出傾湫倒峽可戰懼聲猛風吹動則出撼屋拔木可厭惡聲乃至毗嵐風吹動則出摧山碎嶽壞諸世界無可避聲即令明庶清明等風雖亦稱美止是披拂山林生長百物而已彼國之風似有似無非寒非熱輕細醇和不可云喻觀經云八種清風清即微意況彼行樹及諸羅網皆是七寶被以微風互相敲叩自然而出微妙音聲如百千樂同時並作則六律交暢八音克諧和之極也雅之至也彼風樹既非絲竹誰為宮商而能與百千種樂同此洋洋誠謂希有人天莫及者如大本言世間帝王之樂百千萬種不如忉利天宮一音之美忉利天宮百千種樂不如夜摩天宮一音之美展轉諸天乃至不如極樂國中風吹樹林出妙音聲之美是超出人天也亦宣道品者以經中但稱妙音其實意含說法若非法音何能使人憶念三寶故大本云微風徐動吹諸寶樹或作音樂或作法音是其證也以前例後皆文省故言觸身者大本云彼國一切有情為風吹身安和適悅猶如比丘得滅盡定則亦不說法之說法也疏又此寶樹等三種寶中今是最勝能作佛事故鈔智論言寶有三種一人寶者輪王之寶能雨諸物二天寶者諸天之寶能隨使令三佛寶者能於十方而作佛事今能說法是為寶中最勝出過人天故疏又佛道樹說法今不言者亦文省故例前池水皆說法故又華嚴般若等皆有此義鈔道樹者大本言佛道場樹眾寶莊嚴寶網覆上微風徐動出無量妙法音聲徧諸佛剎眾生聞者得深法忍住不退轉以至成就無上菩提今不言者如前疏引攝行樹中謂行樹尚能說法佛樹寧獨不然故曰文省又例推之如前止說寶池疏引二部經文則寶水流衍皆說妙法故又例推之如大本言其道場樹眾生見者無其眼病聞其香者亦無鼻病食其果者舌亦無病樹光照者身亦無病觀想樹者心得清淨無復貪瞋煩惱之病又云見此樹者得三法忍則知樹色香味皆亦演暢根力覺道如是等法眾生聞者咸念三寶又例推之彼國金沙彼國階道彼國樓閣彼國蓮華天樂天華衣裓食器一切諸物皆亦演暢根力覺道如是等法眾生聞者咸念三寶如華嚴香雲臺網皆出頌言又忉利天鼓演莫測之真詮雷音寶林說無生之妙偈又大般若云淨土樹林等內外物中常有微風衝擊發微妙音說一切法皆無自性等同此義也疏善會之者此土有情無情亦皆說法如聞鶯擊竹等況復淨土鈔善會者謂不以境為境而會境即心則物物頭頭皆祖師意今姑舉二事也聞鶯者一僧因疑法華云諸法從本來常自寂滅相久參未悟忽聞鶯聲遂得大徹頌云諸法從本來常自寂滅相春到百華香黃鶯嗁柳上擊竹者香巖以不會父母未生前句發憤住山一日治地次拋石擊竹鏗然有聲忽爾大悟作頌有一擊忘所知更不假修持動容揚古路不墮悄然機等語如是則簷前鵲噪野外松聲一蚊一蠅一草一葉莫不演揚妙法鼓發道心況清淨佛土乎問教中聖說法聖默然二不偏廢今水鳥樹林演法無已則有動無靜答大本云其欲聞者輒獨聞之其不欲聞者輒獨不聞也則寂用隨心即動即靜疏稱理則自性理智交融是風樹義鈔理含萬法如樹智周法界如風智與理冥理隨智顯然而風樹各不相知理智原無二本百千種樂不是風作不是樹作仁者心作三總結二嚴舍利弗其佛國土成就如是功德莊嚴疏結上化禽風樹二種莊嚴皆彼佛因地願行功德所成就也又變化功德大乘功德等四種成就如論中說前後功德繁不各係條下鈔願所成者大本法藏願云我作佛時我剎中人隨其志願所欲聞者自然得聞故鳥樹皆成妙法音也行所成者大本願後修行如云常以和顏愛語饒益眾生是以得成風吹林樹皆出妙音故如云於佛法僧信重恭敬是以得成眾生聞者咸念三寶故變化功德者如論頌云種種雜色鳥各各出雅音聞者念三寶忘相入一心是也大乘功德者如論頌云大乘善根男等無譏嫌名女人及根缺二乘種不生是也等者等虗空及性也前後如是功德莊嚴下不各係論頌以今頌一缺化作二缺惡道故特明之言眾鳥出音若非佛作焉能聽者忘相一心也不云惡道以人中尚無女人聖中尚無小聖況復有惡道也前後明顯可知故不繁係又正報二功德在如是莊嚴條外故亦不係疏稱理則自性般若周徧法界是鳥樹說法義鈔首楞嚴鈔云若能轉物即同如來以心外無物物即是心但心離分別即是正智般若周徧法界無有障礙是故西方水鳥樹林悉皆說法今不見鳥樹說法以未離念故起信云離念相者等虗空界是故虗空界中普皆說法二正報二初化主二化伴初化主二初徵名二顯德初徵名舍利弗於汝意云何彼佛何故號阿彌陀疏上明依報之勝而依從正生故次明正報於意云何審其解否也已知彼佛號阿彌陀未知其義以彼佛乃一經正主故須審問鈔正主者報有依正佛居其正故正有主伴佛為其主故義須審者以彌陀萬德之號其義深廣應為開闡使人曉了生向慕故疏稱理則自性正思惟是於意云何義鈔籌量名意世人起於意識念念逐外籌量是邪思惟也旋其意識扣已而參思之又思思盡還源思無所思全身即壽即光何論彼佛此佛二顯德二初名含多義二道成遠劫初名含多義二初光明無量二壽命無量初光明無量舍利弗彼佛光明無量照十方國無所障礙是故號為阿彌陀疏無量已如前釋然未知無量得名之故今謂是光明壽命二皆無量也光明者有二一者智光二者身光復有二義一者常光二者放光又光所因復有二義一是萬德所成一是本願所致鈔先釋光明也智光身光者如盧舍那此云光明徧照自受用身照真法界是名智光他受用身徧照大眾是名身光又涅槃云瑠璃光菩薩放身光明文殊言光明者名為智慧則事理圓融身智不二也常光放光者常所顯光無放不放如圓光一尋等是也放光者或於眉間或於頂上或口或齒或臍或足之類是也今言光者正意在常而亦兼放及與身智如大本言爾時阿彌陀佛從其面門放無量光又云我以智慧光廣照無央界故萬德所成者華嚴賢首品開四十四門光明各出其因或歸三寶或發四弘三學六度之所成就一一結云是故得成此光明又般若經佛言我於一切法無所執故得常光一尋則知今佛光明非一德所致也本願所致者大本法藏願云我作佛時頂中光明勝於日月百千萬億倍又願云願我作佛時光明照無央數天下幽冥之處皆當大明諸天人民以及蜎蝡見我光明莫不慈心作善來生我國又願前偈云能使無量剎光明悉照耀故今成佛得如所願疏無量者言所照之廣也十方者不同他經照一方故無障礙者不同日光猶有礙故鈔不同他經者如法華東照則不說餘方萬八千則不該餘國義各有取故今則四維上下一切國土無不照故不同日光者日雖有光脩羅掩之則礙鐵圍兩間則礙覆盆之下則礙又閻浮明則單越礙瞿耶明則弗于礙今則徹山透壁通幽達冥無能遮障使光隱沒無能隔礙使光斷絕故如大本云彼佛光明最為遠著諸佛光明所不能及十方諸佛頂中光明有照一里者二里者如是漸遠有照二百萬里者有照一世界者二世界者如是漸遠有照二百萬世界者唯阿彌陀佛光明照千萬世界無有窮盡故號無量光佛無邊光佛無礙光佛乃至超日月光佛皆光明無量義也觀經云彼佛圓光如百億三千大千世界又云彼佛有八萬四千相一一相有八萬四千隨形好一一好有八萬四千光明徧照十方念佛眾生攝取不捨又大本言阿難頭腦著地稱佛名號禮未起際佛放大光明徧十方上下皆光明無量義也或難日猶有礙世所共知佛光無礙當有何據答須達老女不願見佛避入深閨佛光所及垣壁俱徹內外四方恒與佛對即無礙之徵也二壽命無量又舍利弗彼佛壽命及其人民無量無邊阿僧祇劫故名阿彌陀疏光明無量是無量之一義今言壽命亦無量也佛壽有三法壽報壽應壽如法華及觀經疏中說然佛壽無量隨機所見今之無量亦可即無量之無量鈔壽命者壽之所歷有短有長今當減劫壽僅百年彼增劫時亦止八萬縱輪王天帝諸佛住世亦有限量唯彼佛壽命至為久遠不局常數云無量也三壽者法華壽量品疏云壽者受也若法身真如不隔諸法故名為受若報身境智相應故名為受若應身一期報得百年不斷故名為受法身以如理為命報身以智慧為命應身以因緣為命觀經疏云示同生滅有始有終者應身壽也一得永得有始無終者報身壽也非壽非不壽無始無終者法身壽也又謂彼佛壽命實有期限人天莫數是有量之無量也越溪解云此經雖云無量乃是三十二相常所見身非觀經勝應尊特之身亦同上意今謂隨機所見者此經佛身無定前義理中已辯況經文但言阿彌陀佛現在其前未曾指定現何等身越溪安得判屬三十二相必謂劣應則劣機自見非此經專以劣應而被劣機也大本法藏願云我作佛時假令十方眾生皆作緣覺聲聞皆坐禪一心欲計我年壽幾千億萬劫無能知者豈亦常所見身之無量乎是故入滅雙林或見靈山未散舍那千文或見丈六金身佛本不移機自異故則謂彼佛壽命即無量之無量亦何不可疏及其人民者巧用倒語故言人民者佛如王故阿僧祇此云無數倍之名無量無邊人壽有二一佛本願力故二自功德力故鈔倒語者正語當云佛及人民壽命無量如波羅密云彼岸到當是到彼岸耳以意會之無以辭害佛如王者彼國雖無君臣父子然佛為法王有君主義生彼國者依佛學佛有人民義非如此土版籍所統實編氓也僧祇者入十大數之首從百洛叉倍倍積累而生又僧祇僧祇為一無量無量無量為一無邊今合言者自有二義一是實明其數以僧祇計之有無量無邊僧祇也二是極讚其多無復邊量無復窮盡之僧祇也佛力者大本法藏願云我作佛時我剎中人壽命皆無央數劫無有能計其數者是承佛願力有此壽故自力者一心念佛心清淨故蓮華化生清虗之身不同質礙肉身有老病死是自精進力有此壽故疏問云此無量亦可即無量之無量者還有證否答例如華嚴中說鈔上引觀疏云此無量是有量之無量而言亦可即無量之無量者以今文正似華嚴故彼經十迴向文云無量阿僧祇釋云此非數中之一但是無數之言若定是數便當局限今經亦云無量無邊阿僧祇二經文勢意極相類故言彼佛壽命亦可即是更無限量之無量也問華嚴壽量品謂娑婆世界一劫為極樂世界一晝夜極樂世界一劫為袈裟幢世界一晝夜展轉劫日相對乃至百萬阿僧祇世界極於勝蓮華則極樂僅勝娑婆劣後殊甚安得為更無限量之無量乎答彼鈔釋云三身既融三壽無礙即長能短即短恒長無長無短長短存焉一一圓融言思斯絕其義自明不勞更辯疏又壽命光明者約而言之少攝多故二部名題止曰無量壽者約之又約體攝用故若具說者依報正報悉皆無量鈔約言者佛具萬德今止舉壽命光明者如華嚴八地言身相無量智慧無量方便無量光明無量清淨音聲無量等則知舉二事者以少攝多也體攝用者或難既光壽雙舉云何大本及觀經題皆止云無量壽不言光者復是何義良以一真如心無去無來亘古亘今其壽無量其光亦爾金體金光不相離故起信云心性不起即是大智慧光明周徧法界不起壽也智慧光也言壽則光在其中故單舉也依正無量者自佛一身所有功德及如下文聲聞菩薩乃至前之欄網行樹等種種莊嚴悉無量故疏稱理則自性常照是光明義自性常寂是壽命義自性寂照不二是阿彌陀義鈔靈明洞徹光絕涯涘湛寂常恒壽何籌算常恒而復洞徹故即壽而光洞徹而亦常恒故即光而壽如是則阿彌陀佛雖過十萬億剎之外而實於此娑婆世界眾生心中結跏趺坐儼然不動何乃佩長生之訣枉自殤亡負杲日之明翻成黑暗心本是佛自昧自心佛本是心自迷自佛二道成遠劫舍利弗阿彌陀佛成佛以來於今十劫疏已知彼佛得名之義未審彼佛成佛至今經幾何時劫者具云劫波此云時分十劫者一云大劫一云小劫今謂明遠應是大劫又十大劫亦是一期赴機之說究極而言成佛以來亦應無量如法華中說鈔一大劫者成住壞空各二十小劫八十劫終方成大劫云十大劫是八百小劫也經意為明成佛久遠而曰小劫未見其遠今依唐譯云十大劫亦應無量者如法華中眾疑世尊成佛未久云何曠劫菩薩是所教化佛言我實成佛以來無量無邊劫則彌陀成佛其可量乎疏若考阿彌陀佛成佛以前因地不但法藏一因有多種因如諸經中說鈔法藏因者大本云定光佛前五十三佛名世自在王法藏時為國王捨位出家發四十八願今阿彌陀佛是法藏所成之佛也多種因者一法華經大通智勝如來時十六王子出家淨修梵行求無上菩提佛滅度後常樂說是妙法華經後悉成佛第九王子於西方成佛彼王子者今阿彌陀佛是二悲華經云無量劫前有轉輪王名無諍念供養寶藏如來時王發願願成佛時國中種種清淨莊嚴佛與授記過恒河沙劫西方世界作佛國名安樂彼國王者今阿彌陀佛是三大乘方等總持經云無垢𦦨稱起王如來時有淨命比丘總持諸經十四億部隨眾生願樂廣為說法彼比丘者今阿彌陀佛是四賢劫經云雲雷吼如來時有王子名淨福報眾音供養彼佛彼王子者今阿彌陀佛是五彼經又云金龍決光佛時有法師名無限量寶音行力弘經法彼法師者今阿彌陀佛是六觀佛三昧第九經云空王佛時有四比丘煩惱覆心空中教令觀佛遂得念佛三昧彼第三比丘今阿彌陀佛是七如幻三摩地無量印法門經云獅子遊戲金光如來時有國王名勝威尊重供養彼佛修禪定行彼國王者今阿彌陀佛是八一向出生菩薩經云阿彌陀佛昔為太子聞此微妙法門奉持精進七千歲中脅不至席不念愛欲財寶不問他事常獨處止意不傾動復教化八千億萬那由他人得不退轉彼太子者今阿彌陀佛是以上略舉數端若其多劫多因亦應無量疏稱理則自性本來成佛是十劫義鈔華嚴舉十是表無盡即今自性成佛以來何止威音那邊更那邊塵沙劫又塵沙劫也若定執十劫昔人道猶是王老師兒孫二化伴二初見在二往生初見在三初聲聞二菩薩三總結初聲聞又舍利弗彼佛有無量無邊聲聞弟子皆阿羅漢非是算數之所能知疏主必有伴先聲聞次菩薩明皆賢聖之侶也今初聲聞聲聞者聞四諦聲教而得證果阿羅漢者揀非前三也不言緣覺攝聲聞中故非算數者甚言其多也鈔聞四諦者世尊為憍陳如等五人轉苦集滅道法輪初示二勸至三則證諸漏已盡成阿羅漢因聞聲教以得開明故名聲聞聲聞之號通前三果今四果也緣覺攝者緣覺觀十二因緣而得開悟雖十二支而束之不出四諦雖有利生之心而亦未廣故攝聲聞中也算數者世間算數盡於九章佛說算數如阿僧祇品則非世人心力所計今云算數通世出世間而言也以其多多無盡超出算數之外雖洛閎一行無所施其巧者也上言無量無邊十大數中當其二三是有算數而今言非是算數所知故知無量乃讚歎極多之語未可以常數泥也如大本云假使比丘滿億那由他百千數量皆如目連神通欲共計算彼佛初會聲聞盡其神力百分中不能知一乃至鄔波尼殺曇分亦不能知一又云佛告阿難假使有人出一身毛碎為微塵以一一塵投海出水毛塵水多海中水多阿難答言毛塵出水不及半合海水無量佛言彼佛剎中聲聞弟子有知數者如毛塵水數未盡者如海中水疏論言二乘不生今言聲聞者以慣習小不久證大終無小故如觀疏說若據變化小亦無礙鈔終無小者觀經疏謂習小之人本不得生繇彼臨終發大乘心亦乃得生以慣習小纔聞苦空無常等法順其先習遂證小果而向大之心已成況得近佛自當不久證大安在其為聲聞乎是則經舉聲聞以暫有故論明二乘不生者以終無故小亦無礙者淨土尚容眾鳥聲聞豈不鳥如鳥既變化所成聲聞寧獨實有縱使彼國久有聲聞亦復何礙二菩薩諸菩薩眾亦復如是疏承上不獨小乘諸大乘菩薩無不生故亦復者亦無量無邊不可算數也又復具無量無邊功德如大本中說鈔菩薩者自初心以至地盡前如教起中辯後如補處文中所引甚多無量何可數計功德者大本佛讚彼國菩薩種種功德為二十三喻一堅固不動如須彌山二智慧明了如明日月三廣大如海出功德寶故四熾盛如火燒煩惱薪故五忍辱如地一切平等故六清淨如水洗諸塵垢故乃至二十三如慈氏觀等法界故末復結云今為汝等舉要言之若廣說者一劫不盡則知菩薩之數無量無邊菩薩功德亦無量無邊也疏如華嚴云如來所都諸清淨眾於中止住正同此義鈔華嚴二十五經云一切諸佛國土莊嚴如來所都不可思議同行宿緣諸清淨眾於中止住未來世中當成正覺如來所都即阿彌陀佛極樂國土清淨眾者即諸菩薩未來成佛即下文一生補處疏稱理則自性即空即假是佛有聲聞菩薩義鈔性空則一真凝寂性假則萬用恒沙凝寂則杳莫邊涯恒沙則廣無際限曾何算數可得評量者哉是則賢聖三乘共宗一佛真俗二諦同出一心一心了然福足慧足三總結舍利弗彼佛國土成就如是功德莊嚴疏結上聲聞菩薩弟子莊嚴皆彼佛宿因願行功德之所成就也論云如來淨華聚正覺華得生是也鈔願者大本法藏願云我作佛時剎中菩薩神通智慧辯才相好威神悉皆如佛今來成佛得遂所願也行者大本言爾時法藏教化眾生修行六度廣行教化致無量眾生發菩提心行今成就有斯莊嚴也淨華聚者如淨名經七種淨華一者戒淨三業淨故二者心淨煩惱結漏盡故三者見淨見法真性不起妄想故四者度疑淨見深疑斷故五者分別道淨是道宜行非道宜捨故六者行斷知見淨所行所斷通達故七者涅槃淨以無學故海東謂論頌聲聞今謂亦可兼通菩薩如道品亦通大小乘故自欄網行樹至此依正共五番莊嚴極樂之義略盡於是下文眾生生者及補處等亦正報中攝二往生二初大眾二上首初大眾又舍利弗極樂國土眾生生者皆是阿䟦致疏承上不獨見在彼國無非賢聖但有生者悉皆不退也眾生者統攝一切阿䟦致者此云不退轉地如大本及論所明復有多種因緣故得不退如十疑五種通讚十勝羣疑三十益等鈔生皆不退者恐疑彼國固多賢聖然是久修上士其新生者未必不退故言不論聖凡但往生者即不退轉以決其志也大本所明者如云生彼國者處仁遷義不妄動作終無淫怒之心愚癡之態又云生彼國者皆悉具足三十二相諸根明利乃至成佛不受惡趣又論頌云人天不動眾清淨智海生不動即不退也良繇念佛之力得依如來智海含潤而生有進無退故五種者十疑論云有五因緣故得不退一者彌陀大悲願力攝持故不退今釋謂如大本法藏願云我作佛時聞我名號皈依精進即得第一忍第二忍第三忍於諸佛法永不退轉譬如涉海得乘巨航不沈溺故二者佛光常照故菩提心增進不退今釋謂如大本言見佛光明而生慈心又念佛之人佛放光明攝受此人譬如日月照燭闇途不墮坑塹故三者水鳥樹林風聲樂響皆說苦空聞者常起念佛法僧之心故不退今釋謂如此經及二部中說譬之亡者聞鐘磬聲增其正念故四者純諸菩薩以為勝友外無魔邪內無煩惱故不退今釋謂如此經言諸上善人同會一處譬之置子莊嶽不復楚語故五者壽命永劫與佛齊等故不退今釋謂如經言佛及人民壽命無邊譬之涉萬里途假以時日終至寶所故十勝三十益大約同此恐繁不引疏又不退三義大乘不退已得不退未得不退例如彌勒問經說鈔大乘不退者往生彼國趨入大乘更不退轉復作二乘故已得不退者但生彼國凡所已得更不退轉喪失本有故未得不退者但生彼國凡所未得更不退轉阻其前進故又彌勒問經云自分堅固名不退勝進不壞名不轉今以大乘已得未得三義參之則前二同乎自分後一同乎勝進也疏又同名不退而有淺深如起信妙宗及慈照所說等鈔起信論云生彼國者常見佛故終得不退疏明不退有三位一者信行未備未得不退以無退緣名不退二者信位滿入十住得少分法身名不退三者賢位滿入初地以去證徧滿法身名不退又妙宗鈔云不退有三若破見思名位不退則永不失超凡之位伏斷塵沙名行不退則永不失菩薩之行若破無明名念不退則永不失中道正念又慈照宗主四土圖說以未斷煩惱生同居土為願不退破見思生方便土為行不退破塵沙分破無明生實報土為智不退破三惑盡生寂光土為位不退則不退名同而淺深自別如九品義疏又四教不退非今經義鈔四教各明不退謂藏教別相念不退通教性地不退別教七住不退圓教七信不退則知自此以前進退未定今念佛者但生彼國雖惡人畜生即得不退豈不勝妙直捷異乎諸教疏稱理則自性常住是不退轉義鈔譬如虗空自古及今不曾退轉縱欲退轉退至何所二上首其中多有一生補處其數甚多非是算數所能知之但可以無量無邊阿僧祇說疏承上言生彼國者豈惟不退復有補處菩薩不可勝紀深勸求生也補處者止此一生次補佛位即等覺菩薩也鈔深勸求生者生皆不退已超餘國復多補處可謂超越殊勝極其至也止此一生者此土修行捨身受身千生萬生未有窮已乃至證三果者猶尚有生阿羅漢地方斷後有雖斷後有不得成佛今此唯餘一生次即補佛前如護明後如慈氏菩薩之極位也又大本云生彼國者皆具三十二相究竟深入妙法要義皆當一生遂補佛處據此則如儲君暫在東宮必紹南面非餘百官轉展陞進止是位極人臣之比也此等菩薩咸皆往生薄劣西方不揣甚矣疏問彼處觀音次當補佛次乃勢至勢至之後不聞補者今言補處甚多何日當補又補處者菩薩地盡住等覺位如星中月何得甚多而在彼國答補處不必定補彌陀之處十方世界無盡諸佛涅槃無盡補處菩薩亦無盡住彼國中而待補處奚為不可又諸佛尚如微塵無有窮盡況復菩薩其數甚多無足疑也如大本中說鈔大本云佛告彌勒此世界中有七百二十億菩薩生彼一一已曾供養無央數佛如彌勒者諸小菩薩不可勝紀他方世界第一光遠照佛所有八十億菩薩皆當往生第二寶藏佛所有九十億第三無量音佛所有二百二十億展轉至十四佛剎以及無量佛剎往生者不可復計但說佛名窮劫不盡況其菩薩當往生者言如彌勒則甚多補處益可為證疏如上依正二報或經文中有本願中無或本願中有經文中無互見無礙鈔若據慕佛發願滿願成佛則彼方種種所有皆彼佛願願所成悉應契合今明互為有無者以文雖小殊而意則具足也又如法藏願云我作佛時剎中諸天人民一切萬物皆嚴淨光麗形色殊特窮微極妙無能稱量者雖得天眼不能辨其名數觀此則正報依報攝無不盡不可拘文而限義也疏稱理則自性決定成佛是一生補處義鈔圭峰云今知心是佛心定當作佛然而本來成佛非作得故則但見始覺新來不知本覺固有可謂補則決定補成則實不成二正示願行令知修證四初發願二起行三感果四結勸初發願二初勸發願心二出其所以初勸發願心舍利弗眾生聞者應當發願願生彼國疏上陳依正二報今言眾生得聞此者應當發起大願願生彼國是為第一重勸後乃反覆申明鈔第一重勸者經中反復勸聞勸信勸願約有四重今當最初是聞依正莊嚴勝妙功德之說而發願也二言聞是說者是聞一心持名決定往生之說而發願也三言聞是經者是聞持名佛護不退菩提之說而信受也不言願者信受即願故四言若有信者是總結聞已深信信有願者無一不生之說而發願也聞聞轉深願願倍切語雖反覆義不雷重憫物情深誨人不倦疏又聞攝信義願攝行義三事資糧悉備於此鈔聞然後信匪聞則信自何生願然後行無願則行何繇起下文信行此為本原信行願三淨土資糧充足無欠疏又願之為力不可思議彼佛淨土亦繇願故臨終往生惟仗願故三界因果悉隨願故諸大菩薩皆願生故鈔彼佛淨土者法藏以因中四十八願今成佛道廣度眾生則如來無盡功德皆從願生故云不可思議臨終往生者行願品言是人臨命終時一切諸根悉皆敗壞以致親屬威勢象馬珍寶等悉皆散滅惟有願王不相捨離一切時中引導其前一剎那間即得往生極樂世界故云不可思議三界因果者願受天樂則貧母上生願作冥王則嶽神治鬼種種隨願莫為而為故云不可思議菩薩願生者普賢頌云願我臨欲命終時盡除一切諸障礙面見彼佛阿彌陀即得往生安樂剎乃至願蒙授記廣利眾生等至如文殊發願往生所說之偈亦云願我命終時滅除諸障礙面見彌陀佛往生安樂剎與普賢若合符節他如天親龍樹等多難悉陳故云不可思議疏稱理則自性還歸本體是願生彼國義鈔若知本體不離當處則非生彼國乃生此國耳雖云十萬億程何曾咫尺動步故謂不勞彈指到西方也如其真如不守自性五道隨緣則是窮子旅泊他鄉應歸故里二出其所以所以者何得與如是諸上善人俱會一處疏此躡前徵起何故教人發願生彼以彼國是諸上善人同會之處得生彼國則入如是勝會故當求生鈔徵有二義一者娑婆亦是佛何必遠離故國二者十方無盡佛剎若為偏向西方故徵其繇今融而答之復有三義一者或有國土人畜鬼獄之所共居未必皆人故二者或有國土雖純人所居未必皆善故三者或有國土雖純善人所居未必皆上善故今曰諸上善人則不獨為人中之善亦復善中之善也如上所列聲聞菩薩乃至補處此等諸上善人今得往生即與俱會一處所謂觀音勢至把手共行文殊普賢親為勝友喻如登龍與瀛世所希故是以大士求登蓮錄況復凡夫卜居猶擇里仁矧云學道如斯勝會可勿願歟疏問生極樂者其類不一何得槩稱上善答以皆得不退轉故鈔類不一者謂有聖有凡有大有小上中下品分位秩然乃略其中下槩曰上善故為此難今明眾生生者皆是阿䟦致則究竟皆成無上正覺是佛境界故無別也疏稱理則自性萬善同歸是同會一處義鈔百川會於一海眾景會於一空諸上善人不會此之一處而將奚會二起行二初揀餘行二示正行初揀餘行舍利弗不可以少善根福德因緣得生彼國疏承上言凡羣易就善聚難親何況最上善人之會豈可以少善少福而得生也於中靈芝以善根為正行屬之持名以福德為助行屬之淨業三福海東則總以多善多福為正行云是發菩提心以少善少福為助行云是執持名號二義相違今雙為和會謂欲生彼國須多善多福今持名乃善中之善福中之福正所謂發菩提心而為生彼國之大因緣也鈔相違者一以持名屬正一以持名屬助二說矛盾而此經大旨正重持名若持名為助行則下文聞說阿彌陀佛執持名號義云何通助行持名斷無此理又靈芝以觀經三福配此福德則第三福發菩提心乃成助行與海東菩提心為正行二亦矛盾而觀經以三福為淨業正因則助行菩提亦無此理今雙為和會者還以持名為正行復以持名為發菩提心則雙取兩家而和會其義也善根者觀經則如上第三福發菩提心大本則三輩往生皆言發菩提心據此則發凡夫心是謂無善根發聲聞心不發菩提心者是謂少善根也福德者觀經則孝養父母等大本則修諸功德等據此則施戒等乃至立寺造像禪誦苦行一切福業捨置不作是謂無福德但作此福種人天小果有漏之因是謂少福德也善中善者自有五義以具智論五菩提心故一發心菩提謂於無量生死中發大菩提心也而持名正於凡夫生死心中起大覺故二伏心菩提謂斷諸煩惱降伏其心也而持名則正念纔彰煩惱自滅故三明心菩提謂了達諸法實相也而持名正即此一心明了一切諸法實相故四出到菩提謂得無生忍出三界到薩婆若也而持名即得一二三忍捷超生死趨一切智故五無上菩提謂坐道場成最正覺也而持名則得不退轉地直至成佛故又海東疏引菩薩心地品云諸菩薩初發心能攝一切菩提分法殊勝善根瑜伽第三十七云菩薩所集善根以純一淨妙信心迴向無上菩提梁攝第十云所作善根悉以迴向無上菩提則皆以菩提為善根而今經持名正迴向無上菩提之善根也以阿彌陀佛即無上菩提故是則善中之善名多善也福中福者亦有二義一者彌陀乃萬德名號一名纔舉萬德齊圓不期於福福已備故二者以持念力自然諸惡不作眾善奉行以之修福福易集故是則福中之福名多福也疏因緣者清涼以親能發起為因假之助發為緣今此復有二義一者善根為因福德為緣二者善福各有因緣鈔善因福緣者菩提善根入道正因如諸經言不發正覺菩提之心雖行六度萬行經恒沙劫終不成佛故知萬善之所根本是之謂因然須一切福德助成菩提以福濟慧以事實理輔翼入道是之謂緣各有因緣者善根福德其所繇來從何發心均名曰因而善根發起必有種種善緣為助福德發起必有種種福緣為助是各有其緣也疏問何故觀經發菩提心在第三福答以福有事理不專事故鈔觀經三福一者孝養父母奉事師長慈心不殺修十善業二者受持三歸具足眾戒不犯威儀三者發菩提心深信因果讀誦大乘勸進行者難謂云何發菩提心而與上之二者同名曰福今明福有事理此菩提心是般若中如虗空不可思量之福非達摩所斥人天有漏之福也故前二福猶共凡小此獨擅大乘耳然今疏不以配福而屬之善根者何良以善之與福別之則二總之則一別而言之則菩提心偏屬善根總而言之則菩提心亦可云福觀經總舉言福無礙問寶積大本云欲見無量壽佛者應發無上菩提心復當專念彼國積集善根則菩提善根似為二事今何直以善根屬菩提心答彼但言善根此乃云多善根多之一字非菩提心何以當此疏問即持名為多善根福德此經之外別有證據否答歷歷可證如大悲大品等說鈔證善根者大悲經云一稱佛名以是善根入涅槃界不可窮盡又云我滅度後北天竺國有比丘名祈婆伽修習無量最勝善根已而命終生於西方過百千億世界無量壽佛國以後成佛號無垢光如來又大莊嚴經論佛世一老人來求出家舍利弗等諸大弟子俱不肯度以觀彼多劫無善根故佛自度之即證道果因告大眾此人無量劫前為採薪人猛虎逼極大怖上樹稱南無佛以是善根遇我得度華嚴第十迴向云願憶念無量無邊世界去來現在一切諸佛而次云以此念佛善根凡此皆持名為多善根之明證也證福德者大品般若經云若人散心念佛亦得離苦其福不盡況定意念稱揚諸佛功德經云若有得聞無量壽如來名者一心信樂持諷誦念此人當得無量之福永離三途命終之後往生彼剎智論云譬如有人初生墮地即能日行千里滿一千歲七寶奉佛不如有人於後惡世一聲稱念阿彌陀佛其福勝彼增一阿含經云四事供養閻浮提一切眾生若有稱佛名號如𤛗乳頃功德過上不可思議凡此皆持名為多福德之明證也又寶積十九經云時一比丘聞佛讚揚不動如來佛剎功德心生貪著而念生彼佛言不以愛戀之心遂得往生惟有植諸善本修諸梵行得生彼剎善本即善根梵行即福德此又雙顯持名為多善多福之明證也諸經交讚可弗信受疏問此土單修圓頓不願往生者寧可謂之少善根耶答圓頓行人雖悟一心尚餘後有正宜求生彼國親近彌陀喆老青公皎然覆轍若其自負圓人不願往生當知亦是善根薄故如華嚴中說鈔後有者後陰也即來生也圓人見地雖與佛齊然而麤細無明猶未盡除恒沙性德猶未悉備有惑潤生寧無後有既存後有則有生方不離六道除彼已登實報餘或未免人天而天上多欲人間雜苦墮落者眾解脫者希不生淨土而將焉往喆老青公俱稱有悟而喆老後身耽戀富貴青公後身多歷苦憂皆繇不慕往生自失善利致使淹滯多生曠菩提路豈非善根涼薄乃致如斯言華嚴者入法界品云遮那會上諸大聲聞不見佛者以善根不同故本不修習見佛自在善根故故知執持名號願見彌陀誠多善根大善根最勝善根不可思議善根也疏稱理則自性出生一切法是善根義自性富有一切法是福德義鈔何期自性能生萬法何期自性本自具足二示正行舍利弗若有善男子善女人聞說阿彌陀佛執持名號若一日若二日若三日若四日若五日若六日若七日一心不亂疏承上多善多福乃至彼國而善根難植福德難修況復云多累劫劬勞莫之能辦如寶積十心華嚴十願等今有一法直捷簡易即為多善多福故顯持名功德殊鈔善根難植者如前身子發大乘心因婆羅門乞眼退失等福德難修者如涅槃三十四經云五品心修十善謂下中上上中上上各十善而成五十始修終修方成百福則福之不易修明矣寶積十心者一於眾生起大慈無損害心二於眾生起大悲無逼惱心三於佛法不惜身命樂守護心乃至十於諸佛捨離諸相起隨念心具此十心往生淨土華嚴十願者一者禮敬諸佛乃至十普皆迴向亦以此十生彼國土以上皆菩薩廣大智行非可易植易修今持名功德就使十心未備十願未齊淨業一成便生彼國既得往生此心此願自然成就豈非多善根福德乎不經迂曲是謂直捷無諸煩瑣是謂簡易直捷而深造簡易而廣獲諸餘法門之所不及是謂殊勝疏善男子女人者善有二義一是宿生善因一是今生善類男女者通指緇素利鈍及六道一切有緣眾生也鈔宿生善因者大本云世間人民前世為善乃得聞阿彌陀佛名號功德一聞佛名慈心喜悅志意清淨毛髮聳然淚即出者或宿世曾行佛道或他方佛所菩薩固非凡人則信心念佛者皆宿修善本者也今生善類者如華嚴云寧在諸惡趣恒得聞佛名不欲生善道暫時不聞佛夫不以人天為善而以得聞佛名為善則信心念佛者皆善人之儔類也緇素利鈍者淨土法門一切收攝如大本云其上輩者捨家離俗而作沙門亦有不捨家離俗者即出家五眾在家二眾也但念佛者俱得往生是通緇素又蓮分九品上該盛德菩薩下及悠悠凡夫乃至惡人等但念佛者亦得往生是通利鈍又鬼畜地獄雌雄牝牡亦可均名男女但念佛者俱得往生是通一切眾生也往生集中稽古驗今頗載一二願詳覽焉疏次文有三謂彌陀名號是標念境執持一心是明念法一日七日是剋念期鈔非境則法無所施非法則境為虗立非期則雖境勝法強懈怠因循功不速建三事具故能令淨業決定成就疏標念境者彼佛萬德成就淨土攝生故以阿彌陀佛四字洪名為所念之境依之修行有所指故鈔極樂依正言佛便周佛功德海亦言名便周故以四字名號為境依於此境而加執持然後向往有地詣至也謂至於彼國也或謂心外無境觀心即足何以境為不知心境一如亦復互發先德謂有三昧直觀三道顯本性佛有三昧兼持呪有三昧兼誦經有三昧兼念佛等今標念境即是兼念佛三昧皆助顯本性之佛也或直顯或助顯其致一也況初學凡夫障染濃厚全資勝境發我妙心實為修行要術不可忽也疏明念法者謂既聞聖號要在執持執者聞斯受之勇猛果決不搖奪故持者受斯守之常永貞固不遺忘故鈔執持分釋如上單言持則攝執總之為專念不忘意也又持復有數種一者明持謂出聲稱念二者默持謂無聲密念三者半明半默持謂微動脣舌念呪家名金剛持是也又或記數持或不記數持具如密教中說隨便皆可而各分事理憶念無間是謂事持體究無間是謂理持下當詳辯以是為因後一心不亂亦有事理其不解此意者以念佛是被鈍根參禪乃能悟道初機聞此莫能自決不知體究念佛興前代尊宿教人舉話頭下疑情意極相似故謂參禪不須別舉話頭只消向一句阿彌陀佛上著到妙哉言乎疏又執持即歸命義鈔歸命者梵語南無解見前序若不委身歸命焉能一心執持故義同也歸復二義亦如前序中說一者歸投義執持名號一心向往即事一心二者歸元義執持名號還歸一心即理一心也疏以上境法二中復有三義一者聞說佛名是為聞慧二者執受在懷是為思慧三者持守不忘是為修慧鈔聞慧者阿彌陀佛雖有無量功德而此功德非聞不知非說不聞故華嚴云得無生慧先賴多聞又云佛法無人說雖慧不能了或聞經論之所宣揚或聞知識之所開示一歷耳根永為道種是之謂聞而言慧者聞即是慧對木石說頑不聞故對愚人說聞不䬸采如不聞故故曰聞慧思慧者既入乎耳須存乎心諦審諦觀是何法門是何義理是之謂思而言慧者思即是慧禽畜雖聞不解思故愚人雖聞入耳出口不憶想故故曰思慧修慧者既深思之宜力行之是之謂修而言慧者修即是慧狂人雖思蔽精役神不實踐故問此指三慧有何證據答佛地論云菩薩履三妙慧淨土往還釋云以聞思修得入淨土故知念佛必有三慧疏復有三義聞說佛名心不疑貳是之謂信信已而執心起樂欲是之謂願願已而持心勤精進是之謂行鈔信願行下文中當辯疏名號者阿彌陀佛四字洪名不兼色像等如文殊般若及毗婆沙論中說以色像等攝名中故鈔不兼色像等者正明此經專主執持名號也文殊般若經云佛告文殊欲入一行三昧者應處空閒捨諸亂意不取相貌繫心一佛專稱名字隨彼方所端身正向能於一佛念念相續即是念中能見過去未來現在諸佛念一佛功德與念無量佛功德無二阿難所聞佛法猶住量數若得一行三昧諸經法門一一分別皆悉了知晝夜宣說智慧辯才終不斷絕阿難多聞辯才百千等分不及其一龍樹毗婆沙論云佛法有無量門如世間道有難有易易行疾至應當念佛稱其名號阿彌陀佛本願如是攝名中者二義一者名必有相故二者名相皆不離一心故則一舉佛名正報依報攝無不盡何疑色像疏今人聞佛不肯執持者約有四障四障破除方能執持乃至一心故鈔障者遮也以此四種遮障念心不肯執持故須破除四障者一謂即心是佛何必捨己念彼不知即佛是心不妨念佛故良繇即心是佛豈不即佛是心但執念心不許念佛則心佛是二即義不成是以念佛念心兩不礙故二謂何不徧念諸佛而唯念一佛不知心專志一乃成三昧故良繇眾生智淺繁則不勝故用志不分者神凝役心行岐者功喪如普廣大士問佛十方俱有佛土何以獨讚西方佛言閻浮提人心多雜亂令其專心一境乃得往生以諸佛同一法性身念一佛即念一切佛故三謂佛佛可念何不隨念一佛而必念阿彌陀佛不知彼佛與諸眾生偏有因緣故良繇彼佛名號人所樂稱就令惡人有時不覺失聲念佛乃至人逢善事不覺念佛歡喜讚歎人逢惡事及與苦難不覺念佛傷悲痛切機感因緣莫或使之而自然故四謂何不念佛功德智慧相好光明而但念名號不知持名於末法中最逗機故不思議故逗機者文殊般若經云眾生愚鈍觀不能解但令念聲相續自得往生不思議者如前所明一行三昧則不但逗乎鈍機神用不測故如遺教經言心者制之一處無事不辦今制心佛號而至一心何可思議疏剋念期者一日至七日是所剋定之期要也七日者世出世間重其事者恒以七故七日稱佛免地獄故又七日之期復有二義各分利鈍又多則大本十日聲王十日大集七七日般舟九十日等少則大本一日觀經十念等言日者以經天道晦明之一周故鈔期要者若據如來得菩提實不係於日則非日非劫焉有七日若據菩薩修行動經塵劫則無窮無盡何止七日今立期要者以末法眾生修諸功德精進恒難廢弛恒易應須剋限乃發勝心也七為世重者如禮懺曰七夜持呪曰七徧此經欄網行樹曰七重乃至國家記祖曰七廟教民曰七年竭誠曰七日齋戒之類是也免地獄者經律異相云有王害父七日當墮地獄一尊者教其稱南無佛王便一心稱佛七日不懈命終至地獄門稱南無佛徧獄罪人皆得解脫利鈍者有謂利根一日鈍或至七今謂利鈍二根各一至七利根者性敏捷故一日功成即得一心便無所亂其稍鈍者或二或三乃至七日方得純一亦有利根經於七日端然一心終不少亂其稍鈍者僅六僅五乃至一日或便散亂是故各有利鈍不應偏屬十日者大本云齋戒清淨一心常念十晝夜不絕者命終必生我剎又鼓音王經云若受持彼佛名號堅固其心憶念不忘十日十夜除捨散亂必得見彼阿彌陀佛七七日者大集經云若人專念一方佛或行或坐至七七日現身見佛即得往生九十日者般舟三昧經云若人自誓九十日中常行常立一心繫念於三昧中得見阿彌陀佛又文殊般若云九十日中端坐西向專念於佛即成三昧一日者大本法藏願云一心繫念於我雖止一晝夜不絕必生我剎十念者觀經下下品云其人苦迫不遑念佛十聲稱佛等則知一日至七隨日多少皆往生期顧力行何如耳晦明一周者從子至午乃自晦而明從午至子乃自明而晦是為天道一晝夜夫心固剎那生滅呪晝夜乎於此一心所謂二六時中念念無間者也疏又此七日不必定是臨終七日以平時有如是定力者必生彼國鈔平時者恐人執七日之文謂必一日至七而便命終方名七日故言或臨終或平時但有一日或七日之定力者皆得往生也所謂閒時辦忙時用後至命終因果相符必生彼國疏一心不亂言執持之極也是為一經要旨鈔心者揀口誦而心不念也一者揀心雖念而念不一也不亂者揀念雖一而有時乎不一也一心不亂淨業之能事畢矣疏釋此四字先總明大意次乃詳陳事理大意謂一往是正反語正語一心反語不亂鈔一則不亂亂則不一有其一心無其亂心故云正反如言純一不雜精一無二之類是也華嚴十迴向第四文云所謂不亂迴向一心迴向釋云一心者專注正境也不亂者不生妄念也專注不妄即正反意疏次明事理者如來一語事理雙備故同名一心有事有理如大本云一心繫念正所謂一心不亂也而事理各別初事一心者如前憶念念念相續無有二念信力成就名事一心屬定門攝未有慧故鈔前執持中以憶念體究略分二種憶念者聞佛名號常憶常念以心緣歷字字分明前句後句相續不斷行住坐臥唯此一念無第二念不為貪瞋煩惱諸念之所雜亂如成具光明定意經所謂空閒寂寞而一其心在眾煩惱而一其心乃至襃訕利失善惡等處皆一其心者是也事上即得理上未徹惟得信力未見道故名事一心也言定者以伏妄故無慧者以未能破妄故疏理一心者如前體究獲自本心故名一心於中復二一者了知能念所念更非二物唯一心故二者非有非無非亦有亦無非非有非無離於四句唯一心故此純理觀不專事相觀力成就名理一心屬慧門攝兼得定故鈔體究者聞佛名號不惟憶念即念反觀體察究審鞫其根源體究之極於自本心忽然契合中二義者初即如智不二能念心外無有佛為我所念是智外無如所念佛外無有心能念於佛是如外無智非如非智故惟一心二即寂照難思若言其有則能念之心本體自空所念之佛了不可得若言其無則能念之心靈靈不昧所念之佛歷歷分明若言亦有亦無則有念無念俱泯若言非有非無則有念無念俱存非有則常寂非無則常照非雙亦非雙非則不寂不照而照而寂言思路絕無可名狀故唯一心斯則能所情消有無見盡清淨本然之體更有何法而為雜亂以見諦故名理一心也言慧者能照妄故兼定者照妄本空妄自伏故又照能破妄不但伏故疏又教分四種念佛從淺至深此居最始雖後後深於前前實前前徹於後後以理一心即實相故鈔四種如前序中說一稱名二觀像三觀想四實相稱名者即今經觀像者謂設立尊像注目觀瞻如法華云起立合掌一心觀佛即觀相好光明現在之佛也若優填王以栴檀作世尊像即觀泥木金銅鑄造之佛也故云觀像觀想者謂以我心目想彼如來即觀佛三昧經十六觀經所說是也實相者即念自性天真之佛無生滅有空能所等相亦復離言說相離名字相離心緣相是名實相所謂我欲見極樂世界阿彌陀佛隨意即見是也此之四者雖同名念佛前淺後深持名雖在初門其實意含無盡事一心則淺理一心則深即事即理則即淺即深故曰徹前徹後所以者何理一心者一心即是實相則最初即是最後故問豈得稱名便成實相答實相云者非必滅除諸相蓋即相而無相也經云治世語言皆與實相不相違背云何萬德洪名不及治世一語一稱南無佛皆已成佛道何況今名理一心也又觀經第九觀佛相好疏直謂觀佛法身相好既即法身名號何非實相疏又理一心正文殊一行三昧及華嚴一行念佛一時念佛又如起信明真如法身及諸經中說鈔文殊一行者以般若智專持佛名詳見前文華嚴一行者德雲比丘示念佛法門疏云一行三昧觀其法身以如為境無境非佛又修念佛三昧多約漸修謂先化身次報身次法身今則一時而修不歷次第一行不二行一時不二時故曰即理一心也起信真如者論云若觀彼佛真如法身常勤修習畢竟得生住正定故又摩訶般若經云菩薩念佛不以色念乃至不以四智十八不共法念何以故是諸法自性空故自性空則無所念無所念是為念佛又觀佛三昧海經佛示阿難云住念佛者心印不壞釋曰諦了自心名為觀佛不為境亂名為三昧一體不移名為心印等又舍利弗陀羅尼經云唯修一心念佛皆理一心義也疏又雖云一心實則觀經三心起信三心論三心乃至華嚴十心寶積十心無不具故又淨名八法亦一心故德雲二十一念佛門亦不出此理一心故鈔觀經三心者一者至誠心二者深心三者迴向發願心與起信三心名殊理一良以至誠心者即起信直心正念真如而此一心不亂更無虗妄更無遷流隨順真如故深心者即起信樂集一切善根而此一心不亂萬善同歸故迴向發願者即起信度盡一切眾生而此一心不亂頓融物我故論明三心一清淨心而此一心垢無不盡故二安清淨心而此一心理無不具故三樂清淨心而此一心慈無不攝故與上二種三心正相配合也華嚴十心者菩薩十念藏具明十種念佛一寂靜念二清淨念乃至十無障礙念今一心則不動是寂靜念一心則不染是清淨念一心則同乎法界是無障礙念寶積十心者解見前文前謂十心難具今謂心既一矣慈悲喜捨百千種心何所不具淨名八法者菩薩成就八法行無瘡疣生於淨土而第八結云恒以一心求諸功德今既一心百千種法何所不具德雲念佛門者華嚴入法界品德雲比丘告善財言我得憶念一心諸佛境界智慧光明普見法門而復開二十一門起於智光普照終於住虗空今謂心外無境界心外無智照心外無虗空故不出一心悉皆具足那先經云諸善之中獨有一心最為第一一其心者諸善隨之正此意也疏又此一心即作是二義故鈔觀經云心想佛時是心作佛是心是佛今謂此經一心持名繇此一心終當作佛從因至果名之曰作即此一心全體是佛非因非果名之曰是疏又此一心即定中之定故鈔定中定者以定散判之修餘少善福者散善也一心不亂者定善也又以一心而分定散事一心者定善中之散善也理一心者定善中之定善也疏又此一心即菩薩念佛三昧故鈔或疑佛說菩薩念佛三昧經其間並無信願往生等語惟言正念諸法實相是名念佛似與此經意義相戾今謂彼專主理此兼理事理一心者念而無念即實相也蓋彼以無念正入此以有念巧入作用稍別究竟不殊是故同名念佛三昧疏又此一心即達摩直指之禪故鈔尋常說禪者諱淨土今謂達摩說禪直指靈知之自性也此理一心正靈知自性故門庭施設不同而所證無兩心也善哉中峰之言曰禪者淨土之禪淨土者禪之淨土也有味乎言之也或謂直指之禪不立文字今持名號若為會同不知傳法以四句之偈印心以四卷之經較之四字名號文更繁矣蓋非以斷滅文字為不立也不即文字不離文字達者契之疏又此一心當知心王心所無不一故鈔王所解見前文此之八者及五十一紛然不齊雜然競起而言無不一者良繇王所雖多遡流窮源不出一心今念佛人初以耳識聞彼佛名次以意識專注憶念以專念故總攝六根眼鼻舌身如是六識皆悉不行念之不已念極而忘所謂恒審思量者其思寂焉忘之不已忘極而化所謂真妄和合者其妄消焉則七識八識亦悉不行主既不存從者焉附其五十一又何論也當爾之時巨浪微波咸成止水濃雲薄霧盡作澄空唯是一心更無餘法故云無不一也疏故知至心念阿彌陀佛一聲滅八十億劫生死重罪良繇正指理一心故如法華三昧中說鈔人有疑言罪既多劫業重障深久勤懺摩漸積功德庶可消亡而念佛一聲滅多劫罪因微果巨固所不信今謂至心者即一心也若事一心雖能滅罪為力稍疏罪將復現多多之念止可滅少少之愆此之至心正屬理一一心既朗積妄頓空喻如千年闇室豈以一燈闇不速滅故一稱南無佛皆已成佛道不獨妙法蓮華有之法華三昧觀經云十方眾生一稱南無佛者皆當作佛惟一大乘無有二三一切諸法一相一門所謂無生無滅畢竟空相習如是觀五欲自斷五葢自除五根增長即得禪定釋曰一稱成佛者歸命一心無不成佛以離自心一相一門外更無有法可作歸依畢竟空寂如是觀者五欲自斷乃至六度萬行悉皆成就如上所說非理一心而何又佛名經云一聞佛名滅無量劫生死之罪一聞則不待稱念無量則不止八十億劫因彌約而果彌廣非理一心安得致此但患心之不一何慮罪之不滅疏故知古人知見不普之論乃至定心專心之辨良繇且就事之一心非理一故鈔知見不普者華嚴論云一乘大道非樂生淨土菩薩境界以情存淨穢知見不普今謂此指僅得事一心者若得理一則妙悟一心有何淨穢然雖知平等法界無生可度而常修淨土教化眾生正所謂一乘大道也知見之普孰過於是又普賢菩薩為華嚴長子非一乘境界乎而欲面見彌陀往生安樂謂之情存淨穢可乎定心專心者永明謂九品上下不出二心一者定心如修定習觀上品上生二者專心如但念名號得成末品今謂既云但念但之一字正唯得事未得理故疏故知古云愚人求淨業者非唯不指理之一心亦復不指事一心故鈔古德謂有參禪不靈遽變前因朝暮掐數珠求淨業又云念幾聲佛欲免閻老子手中鐵棒乃愚人所為執此語者遂生疑謗不知此為參禪志不歸一輒自改途者說非呵淨業故但言愚人朝暮掐數珠求淨業不言愚人朝暮一心不亂求淨業也觀經云但聞佛及二菩薩名能滅無量生死之罪何況憶念憶念者且指事一心也則知事一已非愚人何況理一疏故知修淨業人復業餘行非唯不知理一尚未能持事一心故鈔念念念佛更無雜念是名一心一心念佛又一心修餘種種法門是二心也夫無雜念者止得事之一心今且未能何況理一故念佛者守志不二勿因三昧難成而輒改修餘行先儒有言不可以仁之難熟而甘為他道之有成此之謂也疏又此四字若離合釋之則相即故名一心相非故名不亂鈔相即者即空即假即中則如前所明此能念所念即有而無即無而有二邊叵得中亦不存三德渾然不可分別是名一心相非者假非是空空非是假中非假空則能念所念雙亡成般若德能念所念雙立成解脫德俱存俱泯顯乎中道成法身德三德歷然不可混雜是名不亂疏又此一心不亂亦分五教今不敘者以正指頓圓故鈔亦分五教者以蓮分九品則小大淺深自有差等如小教以繇心造業而感前境為一心始教以阿賴耶識所變為一心終教以識境如夢唯如來藏為一心頓教以染淨俱泯為一心圓教以總該萬有即是一心而佛說此經本為下凡眾生但念佛名徑登不退直至成佛正屬頓圓又二乘種不生故略前三不復分五天台四教例此疏又此事理二持起信中具有此意鈔論云專念阿彌陀佛即得往生者此雙含事理而言也次云若念彼佛真如法身又云雖念亦無能念可念皆指理一心也疏又此事理二持即顯密二意鈔四字名號全皆梵語但念不忘與持呪同是名曰密且念且參觀心究理是名曰顯為門少異歸元則同顯密圓通事理無礙疏又此事理二持雖上詳分勝劣有專事者有專理者機亦互通不必疑阻鈔此恐僅能事念者自疑理性不明所為無益故言事得通理以決其疑大勢至圓通章云不假方便自得心開空谷云不參念佛是誰直爾純一念去亦有悟日是也又恐唯勤理念者自疑稱佛名少或致落空故言理得通事以決其疑念念理一是念念彌陀也其為稱名不亦大乎是故攝心體心兩種念佛事理互通本不二故疏又此事理二持或漸進或頓入亦隨機不定鈔漸進者根稍鈍人先勤事持後漸究理若根性大利徑就理持故名頓入作用小殊及其成功一也疏又一心不亂下有本加專持名號二十一字今所不用以文義不安故仍依古本不加而以即是多善福之意言外補入斯為允當鈔文義不安者上文已有執持名號四字不可更著專持名號一句上下重復不成文義舊傳此二十一字是襄陽石刻當知是前人解經之語襄本訛入正文混書不別耳善文義者當自見得疏稱理則自性非憶非忘是執持義非今非昨是七日義非一非多是一心義非定非亂是不亂義鈔本無生滅何有憶忘體絕去來誰成今昨一亦不為一多尚奚存定且無定形亂將安寄如斯會得終日念佛終日念心終日念心終日無念即心即佛非佛非心是則名為真念佛者
