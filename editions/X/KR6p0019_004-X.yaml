body:
  text: 明古杭雲棲寺沙門袾宏述三感果二初佛現我前二我往佛處初佛現我前其人臨命終時阿彌陀佛與諸聖眾現在其前疏其人指持名者承上但能一心不亂命終之時佛必現前也以自力佛力感應道交故如二部經及諸經中說鈔自力者凡人命終前有將謝後有未生平生善惡自然現前如十惡五逆地獄現前慳貪嫉妬餓鬼現前乃至五戒十善人天現前今專念佛一心不亂則淨念成就清淨心中寧不佛現前乎楞嚴云憶佛念佛現前當來必定見佛是也佛力者大本法藏願云我作佛時十方無央數世界諸天人民有發菩提心修諸功德願生我剎臨壽終時我與大眾現其人前三輩往生中又云其人命欲終時佛與聖眾悉來迎致觀經九品或言阿彌陀佛至行者前或云至其人所皆現前意也言諸經者稱揚諸佛功德經云若有得聞無量壽如來名者一心信樂其人命終阿彌陀佛與諸比丘住其人前魔不能壞彼正覺心又鼓音王經云若有四眾能正受持彼佛名號臨命終時阿彌陀佛即與大眾住其人前令其得見又華嚴四十六經云如來有十種佛事一者若有眾生專心憶念則現其前等所謂念佛眾生攝取不捨是也若依般若則自力復二一者念力二者本有佛性力兼以佛攝取力乃成三力本有如舟船念佛如帆楫佛攝取如便風三事周圓必登彼岸矣疏佛及聖眾者佛兼報化聖眾兼菩薩聲聞等鈔兼報化者觀經明佛先言六十萬億後開丈六次言下品化佛來迎則知九品所見不一攝論亦云登地方見報身轉展細妙今但言佛不分報化以一攝多故兼菩薩聲聞者如觀經上品上生云佛與觀音勢至無數化佛百千比丘聲聞大眾無量諸天現其人前而亦有佛不來迎菩薩來者今從多分疏問臨終佛現亦有魔否答古謂無魔脫或有之貴在辨識鈔無魔者單修禪定或起陰魔如楞嚴止觀諸經論中辨之甚悉今謂念佛者佛威神力佛本願力大光明中必無魔事然亦有宿障深厚或不善用心容有魔起固未可定須預辨識如經論說行人見佛辨之有二一不與脩多羅合者是為魔事二不與本所修合者是為魔事所以然者以單修禪人本所修因唯心無境故外有佛現悉置不論以果不協因故今念佛人一生憶佛臨終見佛因果相符何得槩為魔事若或未能了決但如前辨別察識而已問既曰非魔當是真佛而古謂佛無去來云何有佛現在其前答感應道交不妨不來而來無見而見故永明謂如幻非實則心佛兩忘而不無幻相則不壞心佛又云法身真佛本無生滅從真起化接引迷根此乃如來本願功德令彼有緣眾生專心想念能於自心見佛來迎不是諸佛實遣化身而來迎接則佛身湛然常寂眾生見有去來如鏡中形非內非外如夢中事不有不無又經云應以佛身得度者即現佛身而為說法亦此意也是故水清則月自來心淨則佛自現所謂感應道交難思議也疏故知臨終設像助念文載聖經法傳西域不應疑阻鈔華嚴十五經頌云見有臨終勸念佛又示尊像令瞻敬俾於佛所深歸仰是故得成此光明疏云西域法有欲捨命者令面西於前安一立像像亦面西以旛頂掛像手指令病人手捉旛脚作隨佛往生想兼與燒香鳴磬助稱佛名非直亡者得生佛前亦終成見佛光也若神遊大方去留無礙者置之言外不爾勉旃斯行如上則特為設像以助往生何況一心不亂感佛現前乃慮為魔自生疑阻疏稱理則自性妄窮真露是臨終佛現義鈔妄心未盡幽幽緜緜是為命根未斷惑斷執空情消見謝人亡家破煙滅灰飛命終之謂也諸妄盡除不真何待求佛不現前不可得也然而佛慈無限豈必臨終是故時時示時人時人自不識二我往佛處是人終時心不顛倒即得往生阿彌陀佛極樂國土疏上言臨者是將欲命終今言終時正煖盡識去心不顛倒者以一心不亂故不顛倒以不顛倒故不生他處即得者言其速也鈔顛倒者繇其平日隨順妄想不修正念心多散亂如前所謂將捨煖觸一生所作俱時現前心神惶怖動止揮霍應入地獄者刀山劍樹視作園林應墮畜生者馬腹驢胎認為堂宇就令作善合生人天未免憎愛父母乃至小聖初心猶不能正知出入皆所謂顛倒也乘此顛倒三界七趣隨業受生今既一心不亂則內凝正念外感佛迎捨此報身徑生彼國如佛言隨其心淨則佛土淨又言一切國土唯想所持淨想成就必得往生固無疑也他處者有三一者娑婆世界二者餘佛國土三者彼國邊地今皆揀之速者不經中陰不隔時日觀經所謂如彈指頃生極樂國也又智者云臨終在定之心即是淨土動念則往生淨土時所云在定者今心不顛倒是所云動念者後願生彼國是疏大本云其身體非世人之身體亦非天上人之身體也皆積眾善之德自然虗無之體蓮華中化生亦無乳養之者鈔積善者即是善根福德成就之身非以欲愛為因四大為體故不繇胎獄託質華池也亦無乳養者明自然增長非如北洲猶待指端出乳而為養也疏其往生者繇上一心不亂作三九因更細分之亦應無量鈔三九者大本三輩觀經九品也以一心分事理事理亦復各分勝劣後得往生如其本因而為品位也三輩者如大本謂上輩者發菩提心專念阿彌陀佛修諸功德願生彼國命欲終時佛與聖眾現其人前便於七寶池內蓮華化生住不退轉智慧勇猛神通自在所居七寶宮宇在虗空中去佛為近是名上輩生者配前則雙得事理一心者也中輩者不能大修功德而亦發菩提心專念迴向命終生彼功德智慧次於上輩是名中輩生者配前則得事有餘得理不足者也下輩生者不能作諸功德而亦發菩提心一向專念乃至十念生彼宮宇惟在於地又次中輩是名下輩生者配前則僅得乎事未得乎理者也九品者觀經所云上之三品有生彼即得百千陀羅尼門者有經一小劫得無生忍者有經三小劫得百法明門住歡喜地者配前則雙得事理一心而有深淺故成三品例上輩也中之三品有生彼國即得阿羅漢者有生彼半劫得阿羅漢者有生彼一劫得阿羅漢者配前則事盈理歉亦以深淺故成三品例中輩也下之三品有往生彼國經十小劫得入初地者有經於六劫蓮華乃開發無上道心者有十二大劫發菩提心者配前則有事無理亦以深淺故成三品例下輩也細分者如前階品中分之又分則百千萬億無盡輩品皆以事理所得深淺而為次第也疏如觀經以上品上生為得無生忍天台判屬初地而華嚴明無生忍自有淺深則上上品中信有多品況復餘品鈔淺深者八地淨忍分中疏云無生忍略有二種一約法二約行約法則諸無起作之理皆曰無生慧心安此故名為忍約行則報行純熟智冥於理無相無功曠若虗空湛如渟海心識妄惑寂然不起方曰無生前說猶通諸地後唯八地所專餘如前序中辨故知無生忍位自有淺深則上上品中從一地以至八地已容多品餘可知矣故細分之亦應無量疏又三輩九品二經相配諸說稍異如輔正所解融之鈔觀經疏云此經九品為令識位高下即大本三輩也孤山謂大本三輩止齊觀經六品以三輩純明善行不及惡人也靈芝判三輩止對上品故云諸說稍異草庵輔正解曰天台以九品同三輩者乃約位次相同不約行因而言則孤山靈芝皆不違天台所以然者以天台但約位次則輩品正同二師唯約行因則止齊中上各有所據取義不同故不違也剋實而論則煩惱不異菩提始惡何妨終善惡人既已成善豈不賢聖同科三輩九品正相配合又何疑焉疏又華嚴明念佛者數與心等即是三輩九品隨因不同義鈔數心等者華嚴二十三經離垢幢菩薩偈云以佛為境界專念而不捨此人得見佛其數與心等釋云數與心等者謂隨念隨現隨念有二一隨念多少佛亦如之如念佛一聲有一化佛從口中出等二隨念淺深佛應稱之如臨終見佛有勝有劣等多少淺深即輩品分別也此人得見佛者即阿彌陀佛現在其前也專念者即一心不亂也疏又志眼二種淨業亦三輩九品義鈔志眼法師云往生一門有二淨業一曰正觀默照本心也二曰助行備修萬善也二事俱得則了達四淨土矣如止得事善者近生同居遠作三土因耳故知淨土正究理菩薩所登境界而兼容悠悠眾生耳又云圓機體道是最上淨業苟加願以導之即預優品愚朴之輩但稱佛發願者亦生觀淨土一門則聖人無棄物也按所云正觀通乎上中所云助行通乎中下又法師此論極善觀者毋忽疏有言九品八從蓮生以第一品云金剛臺故今參合經論仍以九品皆屬蓮生鈔八從蓮生者據觀經上品上生文云自見其身乘金剛臺獨無蓮華二字故言下之八品乃從蓮生然經論所明歷歷皆說生西方者俱從蓮生大本法藏願云無央數世界諸天人民以至蜎蝡生我剎者皆於七寶池內蓮華中化生言皆則槩舉九品矣又云他方諸大菩薩欲見阿彌陀佛者徑於彼國七寶池內蓮華化生言大菩薩則必非中下矣又云其上輩者命欲終時佛與聖眾悉來迎致即於七寶池內蓮華化生言上輩即正對上品矣並無最上不蓮之意又法華云聞此經典如說修行命終即往極樂世界阿彌陀佛大菩薩圍繞住處生蓮華中得菩薩神通無生法忍夫得無生忍非上上品乎又行願品普賢菩薩以十大願王導歸極樂而曰彼佛眾會咸清淨我時於勝蓮華生夫普賢往生非上上品乎又寶積明十心迴向後得蓮華化生夫十心菩薩非上上品乎以是參考確有明證問果爾則上上文中何以曰金剛臺不曰蓮華答文互有無不足泥故何以知之上品中生亦曰乘紫金臺又將曰七從蓮生乎況中品之下亦但云此人命終譬如壯士屈伸臂頃即生西方極樂世界文中並無蓮華二字又將曰六從蓮生乎夫既以不蓮為勝則中下劣品何以不蓮又中品之上獨曰蓮華臺其金剛臺紫金臺之類乎其蓮華之類乎錯雜不倫進退無據灼知文互缺而義必周也愚意各有蓮華華各有臺臺各不同而金剛為臺之最勝耳如懷玉銀臺初來金臺繼至可驗也且臺之義二一者基臺之臺則臺在華下如世刻像下作寶臺臺上安華華上安佛是也二者房臺之臺則臺在華內如法華玄義以蓮表十如至如是報文云譬如蓮實圍繞房臺又云實依於臺實者蓮子子藏臺中則世所謂蓮房是也又華嚴十地蓮華文云瑠璃為莖栴檀為臺瑪瑙為鬚閻浮檀金為葉並稱莖臺鬚葉而涅槃亦云譬如莖葉鬚臺合為蓮華此所謂臺皆房臺也即法華甄叔迦寶以為其臺之意也觀是則知觀經華座觀中先言作蓮華想次云釋迦毗楞伽寶以為其臺則華內之臺也又云一一金色處處變化或作金剛臺或作珍網等則華下之臺也故上品中生先言紫金臺次云足下亦有七寶蓮華則紫金臺在華下明矣華必有臺臺必有華言金剛臺不言華與言華不言臺文前後互顯耳但上上品一生蓮中即時華開即時見佛即時證道其餘則華開漸晚見佛漸遲證道漸遠以是分別知上上獨勝非為無蓮也若以無蓮為勝有蓮為劣是薄蓮也何取於蓮而華座觀明佛坐蓮華則佛亦劣矣理云何通問極樂九品八從蓮生四明何為有是言乎答四明只說八從蓮生未說不蓮為是何品以中下品亦無蓮華故若果上上不蓮當必有說而乃徒開其端不竟其說者何也或此八字傳寫之誤安知不是極樂九品必從蓮生俟高明更辨之疏問下品之外復有胎生為實有否答表信力不堅故實無胎生鈔非胎生者大本云佛告彌勒若有眾生修諸功德願生彼剎不了佛智志意猶豫臨命終時方悔已過以是生彼纔入邊地見七寶城即便止住於蓮華生亦有自然快樂如忉利天惟於城中經五百歲不得見佛不聞經法以此為苦故名胎生非實胎育如人間也又云如剎帝利其子犯法幽之內宮處以華觀層樓綺殿好飾奇珍寶帳金牀服御所資悉皆豐備而以閻浮金鎖繫其兩足不得自在即胎生喻也又云若識其本罪深自悔責求離本處即得往詣無量壽佛所又菩薩處胎經云西方去此閻浮提十二億那由他有懈慢界國土七寶其樂無比發意欲生彌陀佛國而染著於此不能前進亦疑城邊地類也如是皆繇信不切故疏問既云七日彼臨終十念特俄頃耳何得往生答正以一心故如智論中說又自力他力如那先中說鈔智論云臨死少許時心何能勝終身行力答曰雖時頃少心力猛利是最後心名為大心當知即是一心不亂故那先經云王問那先人生造惡臨終念佛得生佛國我不信是語那先答言如持大石置於船上因得不沒人雖本惡因念佛故不墮泥犂而得往生亦復如是則己之心力佛之願力交相成也疏問既云往生昔人又謂生則決定生去則實不去是乃有生無往今曰往生二義相戾答以生於自心故不往而往名為往生如華嚴解脫長者說鈔華嚴重重法界不出一心楞嚴十方虗空皆汝心內是知極樂之生生乎自心心無界限則無西無東去至何所狀其易穢而淨脫舊而新離一得一似有所往名之為往豈曰從此向彼如世間經城過邑之往耶解脫所說者入法界品解脫長者言彼諸如來不來至此我不往彼若欲願見安樂世界阿彌陀佛隨意即見既云隨意則不越一念而生彼國故知狀其得生名之往生實無所往不往而往不妨說往究極而言非但無往亦復無生不生而生不妨說生疏問兜率內院昔人亦願往生今何偏示極樂答因難易故境勝劣故主師資故又問勝蓮華世界甚超極樂何以不往答樂在近不應求遠故鈔問意蓋謂彌勒亦現在說法內院亦清淨莊嚴而不求生當是何故答有三義一因難易者凡生內院必智斷功德堪與聖流非若極樂但求生者淨念成就即克如願無論惑業昔奘師謂內院易生良以兜率之離人世可計由旬極樂之去娑婆歷多佛剎彼論地不論因今論因不論地義各有取然極而論之奘師為當時一類之機此經乃萬世常行之道耳二境勝劣者內院不越三界之中極樂出過三界之外極樂疑城尚無女人內院外生便有五欲故曰下生猶勝天宮也三主師資者彌陀圓萬德之果已證如來彌勒稱補處之尊猶居等覺經云其中多有一生補處則彌勒方與觀音勢至同侍導師之側曰師資也故見彌陀即見彌勒見彌勒未必見彌陀也又古德有云先生西方後生龍華亦大有理偏求極樂不亦宜乎勝蓮華者詳見前壽命文中今謂華嚴較論國土娑婆之後即云極樂遠之又遠至百萬阿僧祇世界方曰勝蓮則極樂者隣勝蓮者遐域也喻如越饑吳稔舉足即吳捨吳不往而遠慕燕秦惑亦甚矣疏問見有一生念佛臨終未必往生何也答良繇一生念佛未是一心念佛故鈔悠悠之徒一生念佛所謂雖不懈怠亦不精進未能一心故不得生若果真實用心而未純一雖今世不生亦植生因必於來世成就三昧而得生彼如梵網云不得戒而得增益受戒宗門謂才出頭來一聞千悟者是也慎毋藉口曰某某念佛徒勞無功遂謗聖教為不足信疏稱理則自性無形是不顛倒義自性無垢是生極樂義鈔六祖云吾有一物無頭無尾無背無面是則求於正相尚不可得將以何物而名顛倒般若心經云是諸法空相不垢不淨是則求於淨相尚不可得將指何處而號娑婆不顛倒處全身坐極樂蓮臺顛倒纔生應念住娑婆國土即心即土即土即心西方去此不遠四結勸舍利弗我見是利故說此言若有眾生聞是說者應當發願生彼國土疏是利者指上見佛往生此言者見斯大利故說此一心持名之言也不願往者則孤佛說是為第二重勸鈔無利益語佛所不談持名即得往生於諸眾生有大利益故佛說也良繇已得往生是名自利生彼國已聞法得道還能廣度無量眾生是名利他具斯二利故云大利第二勸者初言眾生聞者止是得聞彼國莊嚴勝妙故起願樂未委如何得生今出其繇言一心持名佛來接引遂得生彼則願當益切故云二勸疏又言利者反顯不願往生之害示欣厭也鈔此土修行多劫升沈不能解脫今以稱名往生遂登不退較其利害明若指掌利即諸樂害即眾苦故當欣厭疏又我說者正明無問自說故鈔見斯大利急為指陳恐諸眾生遲遲失利故不俟請問也疏稱理則自性具足是利義鈔試觀自性欠少何事靈知體上彌陀聖眾終日現前常寂光中極樂淨無時不往奈何佛見是利眾生若盲佛說是利眾生若聾雖是勞他金口宣揚須是一迴親見始得三交引佛言令斷疑惑二初明佛同讚二釋經應讚初明佛同讚二初本佛讚二他佛讚初本佛讚舍利弗如我今者讚歎阿彌陀佛不可思議功德之利疏承上不獨我見是利而說此言亦十方諸佛同見是利而說此言也讚者稱讚歎者感歎不可思議者上言我見是利今極言其利非尋常之利也文有三轉一非無益故云利二非但事福之利故云功德之利三非但功德之利故云不可思議功德之利也以是讚歎非偶然故鈔稱讚者稱揚讚美彼佛廣大功德令人歸信也感歎者感激歎息此法人天希有歷劫難逢令人悲喜喜者喜其得聞悲者悲其聞之晚也不可思議是此經原名義見前序經名不可思議者正以阿彌陀佛有此不可思議大功德也文有三轉者利中多含展轉深廣初事福之利者修事相福世間因故是名小利二功德之利者出世間因故是名大利三不思議功德者出世間上上因故是名大利中大利蓋功德雖勝事福於中復分勝劣有可思議有不可思議今是不可思議之功德也故大利中復稱大利疏不可思議如聲王中說彼安樂世界所有佛法不可思議神通現化不可思議若能信如是事當知是人不可思議所得業報亦不可思議又依正因果四俱不可思議鈔此分為四一是施法廣大功德謂無量壽無量光三寶道品種種等二是神化周徧功德謂水鳥樹林咸宣妙法衣食服用受用自然眾生皆具相好神變等三是信受宿根功德謂難信之法能信受者宿修無量善根等四是果報難勝功德謂即得往生即得入上善會即得不退轉地畢竟成佛等皆超越常情故云不可思議如金剛般若云是經義不可思議果報亦不可思議是也依正因果者依謂同居即寂光正謂應身即法身因謂七日功成果謂一生不退亦復超越常情故俱不可思議也昔英法師於東都講華嚴經四十徧因入綽禪師淨業道場深入三昧歎曰自恨多年空尋文疏勞身心耳何期念佛不可思議疏稱理則自性離心言相是不可思議功德義鈔起信論云是心從本以來離心緣相離言說相是故舉心即錯動念即乖滯句者迷承言者喪然則當如之何縱饒緘口忘機依然墮落無記是之謂不可思議二他佛讚六初東方二南方三西方四北方五下方六上方初東方三初列名顯廣二現相表真三發言勸信初列名顯廣東方亦有阿閦佛須彌相佛大須彌佛須彌光佛妙音佛如是等恒河沙數諸佛疏引諸佛讚者見此淨土法門乃千佛萬佛無量諸佛異口同音之所讚歎當諦信勿疑也唐譯具有十方今缺四隅者文省也先東方者舉方常法亦以東表智故鈔十方者奘師譯有四隅則成十方今止六者以正攝隅故文省也舉方常法者經中凡舉十方每先東為首東者於時為春萬物生長有智慧義以智者萬法之先導故首舉東方即舍利文殊首眾意也疏舉六方者釋迦處中故鈔既言上下四方中央何獨不舉蓋釋迦處娑婆世界以本所居為中前之後之左之右之仰之俯之成六方也疏阿閦者此云不動法身不動故一云不為二邊之所動故鈔法身者不生不滅無去無來妙覺地無所增無明地無所減湛然常住如如不動故二邊者有無也有不能使之著相無不能使之落空不斷不常二不動故問東屬春生於卦為震震者動也云何佛號不動答以是即動即靜應萬變而常寂故云不動華嚴以東方為不動智正此意也疏須彌相者佛相無盡如須彌故鈔須彌此云妙高眾寶所成曰妙迥出羣山曰高佛之相好百福所成無不具足是之謂妙人天二乘及諸菩薩相好皆莫能及是之謂高疏大須彌者佛德高廣如大須彌故一云佛名大於須彌如維摩中說鈔須彌高廣超於七金以對七金名之為大佛德高廣無以為比如大須彌也佛名者維摩經云名稱高遠踰於須彌則謂大過於須彌也疏須彌光者佛光廣照猶如須彌暎蔽眾生故鈔光有二義一者須彌寶成寶能發光如佛淨極光通故二者須彌體大光明亦大如佛光明無量故疏妙音者法音圓妙說法稱機故鈔圓妙者如維摩經云佛以一音演說法眾生隨類各得解又云於眾言音微妙第一疏如是等者多難悉舉且舉五佛以等攝之恒河亦云殑伽河沙者喻多也鈔恒河在西域無熱池側香山頂上有無熱惱池流出四河恒河在南廣四十里沙逐水流至為微細佛近彼河說法故凡言多常取為喻明東方多佛如恒河中所有沙數也若據法華一塵一劫之喻則恒河者猶為至少今舉恒沙意實無盡故大本云無量無數不可思議無有等等無邊世界諸佛如來皆共讚歎阿彌陀佛所有功德則恒沙未足以盡之也疏以上佛名靈芝云相傳不釋亦有釋者或取因或取果或性或相或悲智行願等亦無礙故鈔不釋者以佛具萬德不可以一德稱故亦有釋者以佛德融通無盡亦可以一攝萬偏舉一德即備眾德故故舉因則該果海舉果則徹因源無有智而不悲悲而不智無有行非願起願不行成如堯仁舜孝禹儉湯寬亦互具故疏稱理則自性智慧不可盡是東方恒沙佛義鈔東方義見前解有形之物可盡智慧不可盡外求智慧可盡自性智慧不可盡曰恒沙者亦少分喻耳所以道盡思共度量不能測佛智二現相表真各於其國出廣長舌相徧覆三千大千世界疏其國者本所住國各於其國者見佛佛皆然也左右為廣前後為長三千大千詳如俱舍中說覆大千者極言舌相之廣長也以多劫口業清淨故若詳其繇如華嚴中說言此以明佛語為必可信令斷疑也鈔俱舍論頌云四大洲日月須彌盧欲天梵世各一千名為小千界此小千千倍說名為中千此千倍大千皆同一成壞今釋謂四大部洲二輪日月一須彌山從下地獄至六欲天從欲天至梵天齊此色天名一世界一一數之積而至千名曰小千又以小千為一一一數之積而至千名曰中千又以中千為一一一數之積而至千名曰大千以三次言千曰三千大千其實一大千也一大千世界即經中一佛土也彼阿閦佛乃至恒沙諸佛各各主此大千世界今謂諸佛各於本界出廣長舌覆其界內無不徧也口業清淨者謂不為妄言綺語惡口兩舌常為真實語正直語柔軟語和合語而言多劫者經云凡夫舌過鼻尖表三世不妄語佛乃無量劫來曾無妄語久積功德感斯勝相也詳其繇者華嚴離世間品云菩薩有十種舌所謂開示演說無盡眾生行舌開示演說無盡法門舌讚歎諸佛無盡功德舌乃至降伏一切諸魔外道除滅生死煩惱令至涅槃舌是為十菩薩成就此法得如來徧覆國土無上舌則不止一因故言詳也必可信者凡夫舌相不過三寸古謂掉三寸舌則毀譽抑揚循其私意容未可信佛具如是廣長之舌寧有妄乎其所讚歎更疑不信無有是處疏又行位菩薩尚有廣長舌相更過於此今猶略說鈔菩薩舌相者華嚴十行位菩薩成就十無盡藏其說法時以廣長舌出妙音聲充滿十方一切世界言十方一切則不止一大千而已菩薩且然何況如來今且各就本國故云略說其實佛讚淨土徧十方一切世界也疏慈恩云佛之舌相證小則覆面門以至髮際今覆大千證大事也又云菩薩得覆面舌相故其言無二悉真實故則覆面之舌已無妄語況覆大千乎鈔舌相小大者以佛得色身三昧六根自在證小證大各隨其意言大事者法華云佛為一大事因緣故出現於世謂令眾生皆入佛乘故今讚淨土現此舌相則知淨土法門是為大事同法華也苟非大事則所謂割鷄焉用牛刀也又菩薩覆面者舉劣況勝勸信之至也疏又十方者且就橫說若豎說者通乎三際無不讚歎鈔以方例世則前乎迦葉乃至過去無量諸佛後乎彌勒乃至未來無量諸佛必其廣長舌相亦徧覆三際也諸佛相同則心同智同願同既六方讚歎此經知三世諸佛亦必讚歎此經如六方也所謂無間說者是也疏稱理則自性周法界是廣長舌義鈔古謂溪聲即是廣長舌然則廣長舌相不獨諸佛有之眾生有之即萬象皆有之是故情與無情融成一舌舌即法界法界即舌說徧覆時已成雙橛三發言勸信說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經疏誠實明必可信以是廣長舌端出誠實語謂此稱讚不可思議功德一切諸佛所護念經汝當諦信莫懷疑也信義詳後鈔必可信者以誠則真懇無偽實則審諦不虗所謂師子吼無畏說千聖復起不能易萬世守之則為楷者也稱讚不可思議功德連下十六字此經原名也唐譯止言稱讚淨土佛攝受經欲文省便以不可思議功德攝淨土中故此不可思議上文讚佛今乃讚經其義一也故不重釋護念者念佛之人佛力保護令其安隱無諸障難故佛心憶念令其精進無有退墮故觀經云念佛眾生攝取不捨又經云念佛之人阿彌陀佛常住其頂又十種利益云念佛之人阿彌陀佛常放光明攝受此人此本師護念而十方諸佛同此護念當知念佛佛念感應自然不可誣也疏又八地始蒙佛護故知往生地位非淺鈔八地佛護者華嚴謂八地菩薩常為如來之所護念今此頓超勝地故曰非淺疏諸佛告語眾生古有二說一謂轉引一謂同時今兼用之鈔轉引者慈恩謂六方諸佛告本國中之語釋迦轉引以證己言靈芝謂是釋迦說此經時六方諸佛同時讚歎今兼用者以此廣大最要法門諸佛平時必所常讚而正當釋迦說此經時十方諸佛齊讚亦復何礙彌顯此經乃普眼法門徧乎法界一說一切說也疏稱理則自性不變是誠實義自性不離是護念義鈔純真絕妄萬劫如然言誠實者孰過於是即今一視一聽一言一動莫不與俱亘古亘今常護常念行住坐臥不離這箇何得誠言不信護我偏違可謂自誑自欺自逃自逝二南方三初列名顯廣二現相表真三發言勸信初列名顯廣舍利弗南方世界有日月燈佛名聞光佛大𦦨肩佛須彌燈佛無量精進佛如是等恒河沙數諸佛疏日月燈者大智無盡故鈔大智無盡者日照晝月照夜燈照日月之所不及普徧繼續更無窮盡佛之大智橫亘十方豎通三際方猶是也又日光破暗有般若義名一切智月以清涼照夜有解脫義名道種智燈繼日月通乎晝夜不住二邊是中道第一義諦有法身義名一切種智疏名聞光者名稱普聞如光遠照鈔實大聲宏故有名稱普徧聞於十方無量世界如日光照無所不被疏大𦦨肩者肩表二智𦦨喻照耀鈔二智者權智照事實智照理事理炳然雙照不昧如兩肩發𦦨故又此二智荷擔一切佛法有肩義故疏須彌燈者須彌為燈照四天下佛光廣照亦如是故鈔須彌為燈者如云須彌為筆須彌為椎等極言燈量之廣大也須彌在中光照四部佛以中道大智照諸眾生如須彌燈也然維摩經言須彌燈王佛身長八萬四千由旬而究其國土乃東方過三十六恒河沙世界今在南方以佛同名者眾故疏無量精進者精進解見序分但彼言常此言無量鈔無量二義一者時無量即是常義二者事無量自利利他智行無邊故疏稱理則自性光明不可盡是南方恒沙佛義鈔南方為離離為火火內暗而外明是寂而常照也真知不昧靈𦦨何窮華嚴光明覺品言如來光明過一世界十世界乃至不可說世界皆是自己心光覺照一切不從外得故曰我見燈明佛本光瑞如此二現相表真各於其國出廣長舌相徧覆三千大千世界三發言勸信說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經三西方三初列名顯廣二現相表真三發言勸信初列名顯廣舍利弗西方世界有無量壽佛無量相佛無量幢佛大光佛大明佛寶相佛淨光佛如是等恒河沙數諸佛疏無量壽因與本佛同名古有二說亦俱有理鈔二說者靈芝謂諸佛同名甚多決非法藏所成之佛以是本佛不應自讚故慈恩謂設若自讚理亦無妨以導引眾生令生勝意故今雙取二說謂據大本過無邊佛剎同名釋迦牟尼者不可勝數又觀音師觀音如來等則無量壽之名何止一佛百千萬億不可窮盡若據佛分邊事焉得以凡常例之將無自讚毀他犯菩薩十重戒耶我為法王於法自在縱橫予奪權實雙彰苟有利於眾生亦何施而不可天上天下唯吾獨尊可得云自讚否前之一說恐人不知諸佛數如微塵拘執一偏故後之一說恐人泥於不應自讚昧佛神用故二說兼成理固無礙疏無量相者相好無盡故鈔相好者或三十二相或八萬四千相或微塵相德福無量相亦無量也昔志公現十一面觀音相僧繇不能舉筆況佛相乎疏無量幢者功德高顯喻之如幢極其高顯名無量也又無量者廣多義鈔幢者旛屬又云旗屬刊定記幢有七義約之成五一高顯義喻佛位極尊故二建立義喻佛悲智建立眾生及菩提故三歸向義喻佛為眾生所宗仰故四摧殄義降伏一切諸魔軍故五滅怖義如帝釋告諸天眾汝與脩羅戰時設有恐怖當念我七寶幢其怖即滅喻佛得無所畏眾生念佛即離恐怖故今唯取高顯一義攝餘義也廣多者其幢多而無量如經言幢旛寶葢徧滿虗空佛豎無量妙義指示眾生亦復如是疏大光者光輝廣被故鈔光指化他之用諸天人亦有身光不假日月二乘小果因地菩薩皆有光明比佛為小佛光暎蔽一切故云大也疏大明者謂佛以大智破諸惑盡故鈔破諸惑盡者一切智破見思惑盡道種智破塵沙惑盡一切種智破無明惑盡杲日當空無所不照云大明也雖前似覺他此似自覺各舉一德義實互具如上總說中辯疏寶相者相好殊特如寶尊貴故鈔相好如寶者佛有無量相姑舉一二目相如經言八萬四千清淨寶目毫相如經言瑠璃筒胷相如經言紫磨金肉髻相如經言甄叔迦皆所謂寶相也疏淨光者佛德清淨發光明故又其光清淨名淨光故鈔清淨發光者有染之智不發妙光佛德至淨出大光明譬如鏡體清淨能鑑形故其光清淨者譬如野燒亦有光明比之日月不名淨故疏稱理則自性清淨不可盡是西方恒沙佛義鈔西方義見前解良以真如自體湛若虗空絕點純清曾何涯際纖塵乍起佛滅多時心垢頓除古佛隨現二現相表真各於其國出廣長舌相徧覆三千大千世界三發言勸信說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經四北方三初列名顯廣二現相表真三發言勸信初列名顯廣舍利弗北方世界有𦦨肩佛最勝音佛難沮佛日生佛網明佛如是等恒河沙數諸佛疏𦦨肩者解見前文鈔前有大字義無優劣疏最勝音者佛音極好一切音聲無能及故鈔佛有八音一極好音二柔軟音乃至八不竭音今據極好以釋最勝亦可八音兼備故名最勝則一切天人聲聞菩薩所不能及也疏難沮者佛德堅密不可壞故鈔沮者水名佛證法身已得金剛不壞之體更無餘惑煩惱橫流莫能衝蕩故曰難沮昔人謂吳其沼乎難沮者猶言不可沼也又沮阻通用止遏也疏日生者佛光出現如日初升也兼二利說鈔二利者一者自利眾生本覺覆在無明如大夜中日光不現破惑顯智始覺朗照如日東生故二者利他華嚴二十三經云譬如日天子不以生盲不見故隱而不現不以乾闥婆城阿脩羅手閻浮提樹崇巖邃谷塵霧煙雲等物覆障故隱而不現不以時節改變故隱而不現喻佛始成正覺說法利生慧光普照如日東生故疏網明者智如寶網徧照眾生故鈔網者即梵網千珠千珠交暎光明洞徹如佛智徧覆眾生無所不照故又種種法門互相融徹覺羣迷故疏稱理則自性含攝不可盡是北方恒沙佛義鈔北方為冬冬主藏萬物之所成終而所成始也今則百千法門同歸方寸無邊德用總在心源覓之則無相無形出之則無窮無盡本來具足不假他求是故眾生心即名如來藏二現相表真各於其國出廣長舌相徧覆三千大千世界三發言勸信說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經五下方三初列名顯廣二現相表真三發言勸信初列名顯廣舍利弗下方世界有師子佛名聞佛名光佛達摩佛法幢佛持法佛如是等恒河沙數諸佛疏師子者如師子伏羣獸故鈔師子二義一者師子眾獸中王遊行無畏如佛凡聖獨尊出入三界自在無礙故二者師子一吼百獸畏懼如佛說法天魔外道皆信服故又無五種怖具四無畏皆師子義疏名聞者釋義同前鈔前名聞光今無光字名聞者德光者喻雖無其喻不異其德疏名光者名如日光無所不被亦可並稱以名顯光熾故鈔如光義同上名顯者如阿彌陀佛名稱普聞十方三世無不瞻念故光熾者如阿彌陀佛光明普照十方三世無所障礙故疏達摩者此云法亦兼二利鈔法者軌持義以法軌持己德成己法身以法軌持他身令諸眾生皆證法身故疏法幢者法如幢故鈔法如幢者佛法高顯人天仰之為宗邪外望之而伏詳如前文無量幢義疏持法者二義一者執中名持二者執守名持鈔執中者不墮有邊不墮無邊善持中道妙法故執守者持此妙法流通三世使不斷絕故疏稱理則自性測之彌深不可盡是下方恒沙佛義鈔文殊取鉢遙垂右手過下方四十二恒河沙世界今謂更過下方不可說恒河沙世界求於自性譬如持竿探海欲窮其底終不可得二現相表真各於其國出廣長舌相徧覆三千大千世界三發言勸信說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經六上方三初列名顯廣二現相表真三發言勸信初列名顯廣舍利弗上方世界有梵音佛宿王佛香上佛香光佛大𦦨肩佛雜色寶華嚴身佛娑羅樹王佛寶華德佛見一切義佛如須彌山佛如是等恒河沙數諸佛疏梵音者佛音清淨無雜染故鈔無雜染者餘乘說法是為雜染而不清淨今佛唯以一乘法化導諸羣生所謂純一不雜具足清白梵行之相故名梵音疏宿王者一云月為宿王一云即宿中王如北辰故二義皆得鈔月為宿王所謂萬點星光不如孤月月非星類喻佛為大覺覺非迷類勝一切故即宿中王者語云譬如北辰居其所而眾星拱之言北辰宿類而出乎其類喻佛即眾生出乎眾生以生所歸依故皆得者一以星月對顯稱王一就星中獨勝稱王今言佛在異類異類中王佛在同類同類中王故皆得也疏香上者佛聖中聖如香中香最上無比故鈔香中香者如栴檀香云此香六銖價值三千大千世界又云此香一焚四十里外無不聞者是香之最上者也佛證五分法身之香其香普熏無量世界一切人天脩羅外道二乘之香無能及者故曰香上疏香光者其香發光如斷智二德故鈔斷德者香能辟惡有滅穢義諸惡淨盡名之為香智德者光能破暗有智慧義靈明廣照名之為光又常香止被鼻根香中發光兼被眼根喻聲聞止能滅惡有體無用佛滅諸惡能具諸善具足斷智如香光也疏大𦦨肩者釋義同前鈔𦦨肩之名屢出正繇佛同名號無量無邊故疏雜色寶華嚴身者萬行因華莊嚴法身故鈔萬行莊嚴者雖證法身若無萬行名素法身佛稱一切種智故須四等六度種種行門無不備集積功累德助顯法身如萬種寶華莊嚴色身也以法身本具恒沙性德故疏娑羅樹王者娑羅此云堅固亦云最勝德不變易三界獨尊如樹王故鈔堅固者此樹歲寒不彫斧斤不損有堅固義如佛證法身惑不能搖境不能動故最勝者此樹高大一切林木無能及者如佛超三界眾聖中尊故具斯二德名樹王也疏寶華德者佛德如寶華故鈔前云嚴身嚴有因義今但言華以華喻德佛之萬德貴重華美如寶華也一云常樂我淨佛之四德常如寶華無彫落故樂如寶華悅人意故我如寶華無待外故淨如寶華體瑩潔故富有萬德貴重華美可例知矣疏見一切義者諸法之義無不知故鈔一切者世出世間諸法無量則義無量有知近義不知遠義者有知偏義不知圓義者有知總義不知別義者有知實義不知權義者佛無不見如悉達太子名一切義成即此意也疏如須彌山者須彌為眾山之王佛德超絕如須彌故鈔前言須彌相故指相好今無相字專就德言合萬德而交羅如須彌以寶成稱妙中天下而獨立如須彌以最上稱高須彌王於眾山如來王於三界其義一也疏稱理則自性仰之彌高不可盡是上方恒沙佛義鈔顏淵歎道曰仰之彌高今借用之言靈心卓越體絕攀緣仰之彌勤高之益甚昔淨名過上方四十二恒河沙世界而取香飯今謂更過上方不可說恒河沙世界求於自性譬如接竹點天欲至其巔終不可得二現相表真各於其國出廣長舌相徧覆三千大千世界三發言勸信說誠實言汝等眾生當信是稱讚不可思議功德一切諸佛所護念經疏以上六方佛讚亦是阿彌陀佛本願力故鈔本願者大本法藏願云我作佛時名聞十方無央數世界諸佛各於大眾之中稱我功德及與國土等故今成佛如其所願疏有執楞嚴謂觀音耳根此方教體勢至念佛不與圓通云何今日普教念佛以此為疑者正繇不達六方佛讚故鈔疑者謂念佛法門既不逗此方之機又不入圓通之選既居此方何必念佛今觀六方諸佛皆讚此經則知耳根者偏逗此方之機念佛則普逗十方世界之機也大本云十方眾生稱我名號必生我國是也耳根者偏逗人類之機念佛則普逗六道眾生之機也大本云地獄鬼畜生亦生我剎中是也然則耳根不攝念佛念佛能攝耳根是故耳根者此方釋迦如來所讚念佛者十方恒沙如來所讚今從多讚故也且今普天之下緇素男女自然念佛如前文所明逗機之廣又何疑哉試設一喻如此國中有百千邑於中士子分習五經或有一邑士多習詩或有一邑士多習禮所稱多習據本邑故如其參會諸經通較合國則習之最多莫尚於易今此耳根如詩禮故今此念佛如周易故疏問既六方諸佛共讚西方云何六祖不隨佛讚反似斥無其故安在答此有四意一為門不同故二似毀實讚故三不為初機故四記錄有訛故鈔六祖壇經云東方人造惡念佛求生西方西方人造惡念佛求生何國又云愚人願東願西後人執此遂疑六祖說無西方故為此辯初為門不同者復有二義一者且據理事二門六祖所說是以理奪事門若以事奪理門則佛事門中不捨一法安得撥無淨土二者晉宋而下競以禪觀相高直指單傳之意幾於晦塞於時達摩始唱諸祖繼興惟欲大明此道而此道無佛無眾生今西方者正開示眾生趣向佛故此道舉心即錯動念即乖今西方者正教人起心念佛故此道心境俱寂今西方者正以佛國為境發心求生故是雖理無二致而門庭施設不同隨時逐機法自應爾假使纔弘直指復讚西方則直指之意終無繇明矣故六祖與淨土諸師易地則皆然也二似毀實讚者六祖東西之說祇是勸人要須實心為善空願無益何曾說無西方喻如孔子生於東魯今有人言齊人造惡慕孔子求居魯魯人造惡慕孔子求居何國蓋謂為善是真學仲尼何曾說無東魯六祖此言正經中必以多善根得生彼國之謂也惡得云毀三不為初機者六祖自云吾戒定慧接最上乘人今初心下凡以秋毫世智藐視西方妄談般若非徒無益而又害之故壇經者慎勿示之初機苟投非器便落狂魔誠可歎惜四記錄有訛者壇經又言西方去此十萬八千里是錯以五天竺等為極樂也五天震旦同為娑婆穢土何須分別願東願西而極樂自去此娑婆十萬億土蓋壇經皆學人記錄寧保無訛不然則借此之西域以喻彼之西方耳古謂盡信書不如無書者此也況西方千佛所讚今乃疑千佛之言信一祖之語佛尚不足信況於祖乎明智者當為世人決疑起信在在處處弘讚流通即是代諸佛出廣長舌即是報佛深恩如其違背聖言故為魔說其為罪也何可言盡今以喻明於此有人日出萬言以謗萬佛積滿千歲是人罪業無量無邊而復有人出一惡言撥無淨土阻人念佛是人罪業過於前人百千萬倍乃至無算何以故微塵諸佛讚歎西方惟欲人人成佛汝獨生謗即是徧謗微塵如來陷害眾生常沈苦海不得成佛故罪如是其慎辭哉疏稱理則自性徧照是六方佛讚義鈔靈光獨耀迥絕中邊真照無私何分彼此故得一多無礙主伴交成無礙則千差雖隔而非殊交成則萬法不期而自會然則六方不離於咫尺諸佛悉現於毫端今者此經當在何處二釋經應讚二初徵名二釋義初徵名舍利弗於汝意云何何故名為一切諸佛所護念經疏名必有義彰闡其義方克奉行無所疑故鈔題十六字但徵下之八字者以不可思議釋迦所讚其義已明他方佛讚增此八字故徵其義云何佛護云何佛念以前教當信是經今謂義明然後信固也二釋義三初聞持二利益三勉信初聞持舍利弗若有善男子善女人聞是經受持者及聞諸佛名者疏聞是經者牒上依正信願持名往生等聞受持即前三慧三資糧故鈔聞即聞慧受即思慧持即修慧聞即信義受即願義持即行義詳見前釋疏聞諸佛名牒上六方諸佛名也聞經受持聞佛名者亦應受持故鈔問此經聞阿彌陀佛名號為往生因何兼諸佛答彌陀功德為恒沙諸佛之所共讚則聞諸佛名知諸佛讚信受此經倍復親切故雙舉也華嚴第六迴向云復於佛所得聞佛名轉更值遇無數諸佛即聞此經又聞諸佛名之意也疏大本云多有菩薩欲聞此經而不得聞又經云寧於地獄得聞佛名則知聞此經聞諸佛名大非易事鈔菩薩欲聞而不得則二乘凡夫可知矣大本偈云若不往昔修福慧於此正法不能聞已曾欽奉諸如來故有因緣聞此義地獄聞佛者華嚴偈云寧受地獄苦得聞諸佛名不願生天中而不聞佛名故知此經及與佛名不易聞也今得聞之可弗信受疏稱理則自性自軌是聞此經義自性自覺是聞諸佛名義鈔自軌自持則尊者不說我乃無聞是真般若自覺自照則無名無字無體無相是名如來斯則世間難信之妙法不聞而歷歷分明恒沙諸佛之洪名絕聽而轟轟在耳可謂所未聞經信之不疑承事諸佛無空過者二利益是諸善男子善女人皆為一切諸佛之所護念皆得不退轉於阿耨多羅三藐三菩提疏諸佛護念故得不退菩提不退義見前釋鈔上徵云何護念今出其繇謂持經及佛名者諸佛護之念之令不退也又唐譯必為十方十殑伽沙諸佛之所攝受則非惟不止六方亦不止一恒沙而已疏阿者此云無耨多羅此云上三藐此云正等三菩提此云正覺言無上正等正覺也鈔究竟極果對下而言名之無上正觀真諦對邪而言名之曰正等觀俗諦對偏而言名之曰等亦名曰徧覺者靈明自心正覺者兼上正等二義言此覺者是無上正等之正覺也良以蠢動含靈皆有佛性則菩提者佛與眾生本來無二無明所覆遂成迷妄是則邪覺不名為正聲聞辟支止破見思雖得菩提其道未中是則偏覺不名為等一切菩薩已盡塵沙未盡無明雖得正等菩提佛地猶遠不名無上惟佛一人妄盡覺滿如望夜月更無有覺過於此者名無上正等覺也今但持佛名蒙佛護念於如是覺即不退轉言直至道場終不再墮三有中止化城決定成佛也大本法藏願云聞我名已於阿耨多羅三藐三菩提有退轉者不取正覺又云繇於此法不聽聞故有一億菩薩退轉於阿耨多羅三藐三菩提疏前云阿䟦致正此不退菩提義也而生前生後意稍差別鈔阿䟦致云不退者正言於無上菩提不退轉耳然前云生彼國者皆得不退此言聞經聞佛皆得不退則不待往生彼國而未生以前即已成就菩提善根不可破壞況復生彼而有退轉復有二義一者見生不退如上所明二者縱其少壽多障不克往生而乘此自執持力佛護念力必於來生菩提善根亦不喪失畢竟得生彼佛國土如昔人謂今生既下此等般若種子縱未明了纔出頭來管取於般若中現成受用正此謂也疏稱理則自性常覺是不退菩提義鈔靈靈獨照了了常知不減不增無得無失菩提即我我即菩提尚無有進云何有退三勉信三初因聞信受二隨願得生三總結信願初因聞信是故舍利弗汝等皆當信受我語及諸佛所說疏皆當信受是為第三重勸有判此處即屬流通今仍屬正宗以承上文正勉信受令往生故前文二皆勸願今復勸信鈔第三勸者上言聞是說者止是持名得生未委退與不退今言不但得生必於無上菩提永不退轉如是則願當益切故云三勸未屬流通者以信願往生是一經要領下文重重勸信勸願判屬正宗於義為當汝等者正指身子以及現前大眾兼未來一切諸眾生等良以一佛親宣即當諦信諸佛同讚更復何疑信行願三不可一缺故前文勸願今復勸信復勸者前六方中已勸當信是經今復明言當信我語良以不願繇於不信不信則起行無繇故佛於此經重重勸信如大本言不信佛語者乃惡道中來餘殃未盡愚癡不信未當解脫又法藏願云至心信樂欲生我剎十念必生惟除五逆誹謗正法謗正法者不信之謂也又文殊般若經如前所引末亦云惟除不信又華嚴謂信為道元功德母而復累言不置豈徒然哉清涼大師云高齊大行和尚宗崇念佛以四字教詔謂信憶二字不離於心稱敬二字不離於口往生淨土要須有信千信即千生萬信即萬生信佛名字諸佛即救諸佛即護心常憶佛口常稱佛身常敬佛始名深信任意早晚終無再住閻浮之法此策發信心最為切要也疏信者不疑之謂受者信已而領納不忘之謂信而不受猶弗信也鈔信而不受譬如有人餽以異寶雖知是寶深信無疑然拒之不納信亦何益故曰猶弗信也疏又信即心淨如唯識說鈔成唯識論云信者謂於實德深忍樂欲心淨為性何言心淨以心勝故如水清珠能清濁水又諸染法各自有相唯有不信自相渾濁復能渾濁餘心心所如極穢物自穢穢他信正翻彼故淨為相今修淨土主乎心淨信為急務明亦甚矣疏稱理則自性本來是佛是信受義鈔華嚴十信全以果佛為自信心良繇佛即是心故眾生心中念念常有佛成正覺作如是信祇園妙旨千佛玄談一時受畢二隨願得生舍利弗若有人已發願今發願當發願欲生阿彌陀佛國者是諸人等皆得不退轉於阿耨多羅三藐三菩提於彼國土若已生若今生若當生疏上言信受今言信已生願也已願今願當願過現未三時也舉三時者明有願者無一不生也鈔已願已生則今佛說經之前已有人求生彼國而得生故今願今生則佛正住世時也當願當生則聞經已後至於今日後之後也先言不退菩提後云往生者明發願者見世之中已順覺路況既得往生乎無一不生者見往生者甚多無量也問生者既多無量今何偶一見之答十方世界眾如微塵其往生者何限子見娑婆不見塵剎故又問生者既多無量彼土何以容之答滄溟納百川而不溢明鏡含萬象而有餘況淨土乎即心是土即土是心以心歸心何弗容也疏稱理則自性非去來今是已生今生當生義鈔萬年一念何古非今一念萬年何今不古則念念遊行樂國時時禮覲慈尊誰非往生者過去心不可得現在心不可得未來心不可得既無其心誰是往生者無生而生是名已生今生當生三總結信願是故舍利弗諸善男子善女人若有信者應當發願生彼國土疏上言有願必生則因果歷然祇恐不信與信而不願耳故總結信願言不信則已若有信者應當願往是為第四重勸鈔第四勸者從初而再皆明發願求生至於三中復明願從信起如上三重止是勸說應當發願未顯發願功德今言過未現在但有願者無一不生方知願力如是廣大焉可不信焉可不願故云四勸故云總結智者云火車相現尚得往生戒定熏修功不唐捐矣信之至也永明云劫石可磨我願無易矣願之至也疏稱理則自性如智冥契是信願雙成義鈔純然真實而不虗者自性如也是之謂信熾然出生而無盡者自性智也是之謂願如冥乎智智契乎如智外無如如外無智文殊信首具足一心普賢願王不離當念四互彰難事令切感發三初已讚諸佛二諸佛讚已三總結難事初已讚諸佛舍利弗如我今者稱讚諸佛不可思議功德疏唐譯但云如我今者稱揚讚歎無量壽佛此言稱讚諸佛古崖云以彌陀諸佛同一法身故鈔同一法身者如華嚴頌云十方諸如來同共一法身一身一智慧力無畏亦然則彌陀即諸佛諸佛即彌陀故不曰彌陀而曰諸佛蓋該彌陀在諸佛中下言諸佛亦彌陀與諸佛同讚釋迦也疏唐譯以彌陀該諸佛今經以諸佛該彌陀若二說兼具於文更順而義亦足鈔具二說者應云如我今者稱讚阿彌陀佛及與諸佛不可思議功德則經文既順而同一法身之義亦在其中文義雙美當知什師本有此意文省便故奘師後譯特為單舉者欲人於二經善會其意而不泥其文也又諸佛彌陀相即是亦不可思議二諸佛讚已二初得道難二說法難初得道難彼諸佛等亦稱讚我不可思議功德而作是言釋迦牟尼佛能為甚難希有之事能於娑婆國土五濁惡世劫濁見濁煩惱濁眾生濁命濁中得阿耨多羅三藐三菩提疏佛佛互讚表此淨土法門決應信受故鈔佛佛互讚者以此念佛求生淨土縱一佛獨讚已當信受不疑而今不但釋迦讚於祇園諸佛讚於六方又此佛彼佛遞互讚歎豈非超生脫死最要法門是以再四叮嚀多方誨誘恩踰慈母仁過旻天粉骨碎身難足為報疏彼諸佛等即彌陀與六方諸佛也釋迦此云能仁牟尼此云寂默鈔能仁寂默自有二義一者對待說則能者善權方便曲就機宜仁者至德洪恩普霑萬類是大悲利物也寂則澄然不動頓息萬緣默則漠爾忘言永離戲論是大智冥理也二者圓融說以悲即智故終日度生無生可度動一靜也以智即悲故不起一念常度眾生靜一動也故知偏舉二字乃至一言佛之全德攝無不盡疏甚難希有總下二難具此二難故言功德不思議也鈔言二難者於五濁得菩提是為一難又於五濁說此淨土法門是為二難并此二種是為最上難行之事惟佛行之希有罕見之事唯佛有之又難行能行猶未希有甚難行者而能行之此誠駕古軼今超賢越聖天上天下卓然獨擅而無與等埒者也故云希有疏娑婆此云堪忍一云忍界即釋迦世尊所主大千世界也五濁者以五事交擾渾濁真性故名惡世無五濁者名善世也鈔堪忍者以此中眾生堪能忍受三毒煩惱輪迴生死不厭離故忍界者如來於中獨證自誓三昧故又劫初梵王名忍故五濁交擾者性本淵澄繇劫等五起諸塵滓如楞嚴云譬之清水投以沙土土失留礙水亡清潔汩然渾濁故世者遷流不已之謂則此世之前此世之後當有無五濁之善世今云惡世據釋迦見世言也疏劫者梵語具云劫波此云時分劫濁者無別體以有四濁得名眾濁交湊即其相也鈔劫濁者一大劫中成住壞空二十小劫轆轤增減人壽增至八萬歲時增之極也乃百年減一減至二萬即入劫濁無別體者繇下四濁當此劫中因以得名此之劫分眾濁交湊昏亂駮雜故云濁也反顯極樂國中阿彌陀佛見在說法清淨之時非劫濁故今日我等何為安處劫濁之世而不求生彼國乎下四倣此故智者云他方淨土無三毒等則名五清正此意也疏見濁者五利使為體開之則六十二等諸見熾盛即其相也鈔五利使者一身見謂執我我所而起我身之見二邊見謂執斷執常失乎中道而起邊傍之見三戒取謂非因計因修諸苦行而起取著我能持戒之見四見取執麤為勝擔麻棄金而起自負所見之見五邪見謂撥無因果墮豁達空而起邪外不正之見此五者能令眾生趨入生死故名為使而幾微迅疾為害非細對五鈍言故名利使開之則六十二者以斷常二見為本而色等五陰各具四句三世迭之則成六十加本斷常成六十二此之諸見猶如羅網猶如稠林纏縛屈曲不可出離渾亂真性故云濁也反顯極樂國中人具正見非見濁故疏煩惱濁者五鈍使為體廣之乃至為十為百八為八萬四千及恒河沙等三災感召即其相也鈔五鈍使者一貪謂遇順情境起於愛著不能捨離故二瞋謂遇違情境起於恚恨不能容忍故三癡謂於非違非順境起於愚暗不能覺察故四慢謂於一切眾生起驕傲心上陵下忽不能恭遜故五疑謂於諸善法起猜貳心欲進欲退不能決定故此五者亦能使人趨入生死故名曰使較前稍為重滯故名鈍使廣之者謂合五利為十煩惱又分之為九十八加十纏成百八煩惱又細推之則八萬四千乃至恒沙多多無量勞煩我心不得安隱熱惱我心不得清涼又喧煩之法逼亂心神使真明不朗故名煩惱三災感召者貪感饑饉瞋感刀兵癡感疾疫乃至水火風之大難皆以類從故名濁也反顯極樂國中人悉智慧非煩惱濁故疏眾生濁者一云阿含三義為體又云攬五陰見慢果報為體惡名穢稱即其相也鈔三義者阿含經云一者劫初光音下生二者攬眾陰而生三者處處受生故云眾生五陰即色受等見者橫計主宰為見我慢者俱生主宰為慢我果報者前所作因今受果報亦上受生義也惡名穢稱者生佛相對眾生之名下劣鄙陋輪迴六道備受諸苦故云濁也反顯極樂國中諸上善人同會一處非眾生濁故疏命濁者以色心連持為體催年減壽即其相也鈔連持者依業所引第八識種外色內心互相連屬即息煖識三相持不散是為命根一不連持命根即斷故以為體催年減壽者當此減劫不滿百年而復泡沫風燈剎那不住尤為短促故云濁也反顯極樂國中人民壽命同佛無量非命濁故疏此之五濁且據果言若楞嚴所云或配三細六麤或配五陰義亦不異鈔配三細等者以劫濁配業相謂無明初起性遂渾濁故次以見濁配轉相現相次以煩惱濁配智相續執取計名字相次以眾生濁配造業相次以命濁配業繫苦相配五陰者以劫濁配色陰謂空見不分妄見空而兩無其實性為渾濁故次以見濁配受陰次以煩惱濁配想陰次以眾生濁配行陰次以命濁配識陰言不異者前一說心無初相則超劫濁乃至無業繫苦則超命濁是斷無明等名五濁得菩提也後一說色陰破則超劫濁乃至識陰破則超命濁是破五陰等名五濁得菩提也為說少殊而義則大同也疏觀經云濁惡不善五苦所逼今不言五苦者文省也鈔五苦者疏云五道之苦或五痛五燒五惡等詳具大本茲不繁錄以濁必有苦舉濁該苦故曰文省疏此五濁處能自立者亦已鮮矣得成正覺寧不難乎是為第一重難事明自利功德不可思議鈔自立者五濁惡世人生其中外則時勢之所逼惱內則惑障之所縈纏況乎身屬四生命存呼吸是以欲潔偏汙求升反墜能於此中分別善惡持戒修福自立於人天之位者鮮矣能於此中深懼無常修四諦十二因緣自立於聲聞緣覺之位者抑又鮮矣乃於此中永斷無明高超三界而得於無上正等菩提是則同居火宅獨馭寶車共溺愛河卓登彼岸豈非忍人所不能忍行人所不能行此之謂難此之謂自利功德不可思議也疏稱理則自性始覺冥乎本覺是我讚諸佛義本覺冥乎始覺是諸佛讚我義自性寂而常照照而常寂是釋迦牟尼義自性染而不染不染而染是五濁菩提義鈔因該果海果徹因源則始本不二用不離體體不離用則寂照同時不染而染難可了知是菩提沈埋五濁染而不染難可了知是五濁獨露菩提故知此佛彼佛同歸寂照之自心煩惱菩提不出悟迷之一念本師即我我即菩提及得菩提實無所得二法說難為諸眾生說是一切世間難信之法疏前是人中難事今是難事中之難事也良繇淨土法門一切世間之所難信佛於惡世得道復於惡世說此法以度眾生又難中難也是為第二重難事明利他功德不可思議鈔言難信者略舉有十今居穢土習久心安乍聞彼國清淨莊嚴疑無此事難信一也縱信彼國又疑十方佛剎皆可往生何必定生極樂難信二也縱信當生又疑娑婆之去極樂十萬億剎云何極遠而得往彼難信三也縱信不遠又疑博地凡夫罪障深重云何遽得往生彼國難信四也縱信得生又疑生此淨土必有奇妙法門多種功行云何但持名號遂得往生難信五也縱信持名又疑持此名號必須多歷年劫乃克成就云何一日七日便得生彼難信六也縱信七日得生又疑七趣受生不離胎卵濕化云何彼國悉是蓮華化生難信七也縱信蓮生又疑初心入道多涉退緣云何一生彼國便得不退難信八也縱信不退又疑此是接引鈍機眾生上智利根不必生彼難信九也縱信利根亦生又疑他經或說有佛或說無佛或有淨土或無淨土狐疑不決難信十也故難信而曰一切世間是不但惡道難信而人天猶或疑之不但愚迷難信而賢智猶或疑之不特初機難信而久修猶或疑之不特凡夫難信而二乘猶或疑之故曰一切世間難信之法今於此世演說此法是猶入躶形之國宣示威儀對生盲之人指陳黑白此之謂難此之謂利他功德不可思議也疏又法華金剛皆云難信與此同意鈔法華云欲令眾生皆得聞知一切世間難信之法又云此經難聞信受亦難金剛般若云聞說此經心即狂亂狐疑不信而以不驚不怖不畏為希有不驚等即能信也今經難信同於二經奚可輕也疏問既云難信則說為強䀨何以說為答終以佛說有信者故鈔因說有信者此之妙法若如來曾不聞宣則萬古永同長夜終無有人念佛求生故歎其難信者見不信者之自棄能信者之有緣令一切眾生悲傷絕分而欣幸得聞故今之信淨土者皆因佛說而發起也雖今不信一歷耳根永為道種故疏稱理則自性不可湊泊是難信法義鈔當知自性不可以有心求不可以無心得不可以語言造不可以寂默通離四句絕百非空裏栽華波心踏月無汝措手足處是故靈山上德終成敗北之愆漢地金剛始有滅南之想能信是法豈不難哉三總結難事舍利弗當知我於五濁惡世行此難事得阿耨多羅三藐三菩提為一切世間說此難信之法是為甚難疏述諸佛語重為申明見此二難古佛不虗為讚辭今佛非濫膺美譽實語實行兩相符合萬代眾生當諦信而勿疑感恩而無已者也可謂反覆叮嚀婆心大切矣鈔得道之難其難有二一謂善世得道未足為難今於惡世二謂惡世得道而得小果猶未為難今得無上菩提是以難也說法之難其難亦二一謂善世說法未足為難今於惡世二謂惡世說法而說其易信者猶未為難今說難信之法是以難也略為四喻第一喻者譬如有人身入大海復乘破舟復遇逆風復衝巨浪復值羅剎魚王毒龍危在頃刻而能於中安隱得渡是之謂難不但自渡併渡諸人置之彼岸是難中難大海破舟逆風巨浪及羅剎等此喻五濁自渡喻得道渡人喻說法也第二喻者譬如有人身罹重病復處風露復乏飲食復遭跌蹼復值庸醫誤進藥餌危在頃刻而能於中調理痊安是之謂難不但自療併餘病者皆使平復是難中難第三喻者譬如有人身在囹圄復膺楚撻復繫枷杻復染疾疫復被監押將臨誅戮危在頃刻而能於中忽然解脫是之謂難不但自脫併諸罪人悉得免離是難中難第四喻者譬如有人身墮井中復遇毒蛇復困荊棘復淹寒水復值惡人拋擲土石危在頃刻而能於中騰躍而出是之謂難不但自出併餘同墮俱時上升是難中難五濁等喻義說同上此之四喻略喻釋迦二種難事明淺易曉使知如來不憚劬勞備歷艱苦為我等故行難中難一至於此聞斯難者皆應喜悲交集感極呼號聲震三千大千世界勇猛精進思報佛恩欲報佛恩不越二事一者自利二者利人自利者於此惡世力行此道因得往生亦云為難利人者於此惡世復勸諸人共行此道同得往生是則亦云難中難也疏又法華極讚說經之難亦同此意鈔法華極讚者謂盡說餘經手擲須彌足動大千皆未為難能於惡世說法華經是則為難今經難說亦復如是疏復有二義前難反顯極樂得道為易後難反顯極樂說法為易鈔得道易者婆沙論謂念佛往生乘佛願力為易行道五濁惡世艱於修進為難行道故說法易者彼國諸上善人慧深障淺志意調柔風樹鳥音悉資解悟非比此土剛強難伏故舉難顯易正示極樂決宜求也疏稱理則自性心境雙融是行此二難義鈔心逐境生心體本寂則無所得者名得菩提境隨心現境體自空則無法可說是名說法心外無境境外無心自覺覺他覺行圓滿三流通分二初重舉聽眾二明悉奉行初重舉聽眾佛說此經已舍利弗及諸比丘一切世間天人阿脩羅等疏法必流通以佛說法為普度眾生故復列眾者經初明眾聽法經終明眾受法也獨舉身子者以當機故不言菩薩者攝比丘中故阿脩羅者此云非天等者等八部六道也鈔流通者光明疏云流者下澍通者不壅又圭峯云都無人傳則不流流者不住傳之遇障則不通通者不塞普度者流通十方以及三世非僅為一處一時之眾生也當機者以難信之法唯智能信故始終首舉舍利弗也攝比丘中者菩薩雖不常隨如來然與諸比丘同為賢聖等侶故又菩薩真俗雙融隨類應機亦可世間中攝故一切世間所該者眾而獨舉天人阿脩羅者以明修此法門善道眾生比之餘道為居多故非天者脩羅富樂同天無天行故詳有四種茲不繁舉前列眾中無其名者攝於天人及大眾故問脩羅至為凶頑何能執持聖號答鬼畜尚解歸依脩羅豈不信受不聞世主妙嚴品諸脩羅等各得解脫門乎今處人倫邈然無信者良可怪也疏稱理則自性究竟圓滿是佛說經已義自性周徧含容是一切世間義鈔究竟則首尾圓照無欠無餘周徧則凡聖該羅千足萬足如是經者未呼身子已畢全文又何待妙首白槌雙林撫尺然後名為說法竟也是故升堂入室大眾無增鼓寂鐘沈人天不減二明悉奉行聞佛所說歡喜信受作禮而去疏歡喜者慶所聞故信受者領所聞故作禮者重所聞故去者聞已則退而修持也亦前三資糧及三慧也鈔慶所聞者多劫飄零正以未聞此法今知持名往生可謂沈疴枕席忽遇神方久客他鄉乍聞家信欣幸不勝故云慶也領所聞者信之不疑受之弗失如奉王勅如遵父命故云領也重所聞者中心感激五體翹勤如蒙至極之恩拜謝無已故云重也修持者古人進而聞道於師退而修道於己非如今人入耳出口也三資糧者如上聞而信即信資信而受即願資受而去即行資也三慧者聞即聞慧歡喜信受者即思慧去而修持者即修慧也疏又此歡喜亦具清淨三義如觀疏中說鈔三義者觀經疏謂一能說人清淨二所說法清淨三依法得果清淨具此三義故歡喜今持名往生乃佛所說佛是一切智人非四人等也則人清淨遇如是人寧不歡喜持名往生即證三昧是圓頓教非權法也則法清淨聞如是法寧不歡喜持名往生即不退轉直至成佛非小果也則果清淨證如是果寧不歡喜疏又此歡喜亦通深淺各隨所得鈔深淺者如華嚴初地名歡喜地文中具二十歡喜一當得十句如所謂念諸佛故生歡喜念諸法故生歡喜等今聞此經者自慶我亦當來得如阿彌陀佛我亦當來得阿彌陀佛如是妙法也二現得十句所謂轉離一切世間境界故生歡喜親近一切佛故生歡喜等今聞此經者現得轉離娑婆五濁境界現得往生淨土親近彌陀及諸佛也此歡喜屬地位中而初行亦名歡喜初住文中亦云獲無邊歡喜等故云深淺若淺之又淺之則隨其分量亦得法喜之樂而已疏又結歸信受者從始至終信為根本故鈔始終者首標如是乃信順之辭今復末言信受則知因信生願因願起行從初發心次得往生究竟成佛皆資信力故云始終信為根本疏大本結經備陳眾生獲益龍天降祥今不言者文省也鈔大本云佛說此經已無量眾生發無上正覺心萬二千那由他人得法眼淨二十二億諸天人民得阿那含果八十萬比丘漏盡意解四十億菩薩得不退轉三千大千世界六種震動大光普照十方國土百千音樂自然而作無量妙華芬芬而降乃至阿迦膩吒天皆作種種微妙供養又云二十五億眾生得不退忍四萬億那由他眾生於無上菩提未曾發意今始初發種諸善根願生極樂世界皆當往生各於異方次第成佛同名妙音八萬億那由他眾生得授記法忍疏又大本囑累持經功德今持此經亦當如是鈔大本佛告彌勒今此法門付囑於汝於大眾中為他開示當令書寫執持於此經中生導師想又云無量億諸菩薩皆悉求此微妙法門勿違佛教而棄捨之當令汝等淪沒長夜備眾危苦是故我今為大囑累今經不言皆文省故疏又大本及法滅經皆言法滅之曰獨留此經故知此經總持末法如華嚴論中說鈔大本云當來之世經道滅盡我以慈悲特留此經百歲眾生得遇無不得度若有眾生於此經典書寫供養受持讀誦為人演說臨命終時佛與聖眾現其人前經須臾間即生彼剎法滅經云爾時首楞嚴經先滅以次諸經悉皆滅盡獨留無量壽經度諸眾生華嚴論云正法滅時以總持持餘尊法為教理流轉之因今謂諸經悉滅此經獨存念佛一門廣度羣品則諸經已滅而不滅即是以一存餘流轉無盡正總持之謂也一切眾生應當尊重恭敬信受奉行經所在處如佛見在問獨留此經此經蓋指大本答前不云乎文有繁簡義無勝劣詳言之則大本略言之則今經耳非有二也疏稱理則自性無惱是歡喜信受義自性無住是作禮而去義鈔煩惱本寂歡喜亦空則苦土誰非樂土來實無來去亦何去則往生畢竟無生以此無生生彼國土非生彼土實生乎自心也然後無問自說世尊免付空談獨任當機身子不孤重託是真歡喜是真信受是名真法作禮如來若其外極樂九蓮之土別說唯心捨彌陀萬德之名另求自性可謂當渡而問津對燈而覓火者矣三結釋呪意拔一切業障根本得生淨土陀羅尼疏釋呪意者以呪附經經得呪而彌顯以經先呪呪得經而愈靈交相為用應結釋也此呪詳見不思議神力傳持此呪者滅罪往生故以拔業障生淨土為名陀羅尼者此云總持也鈔業障者凡障有三一煩惱障二業障三報障今言業障則中攝前後煩惱者業之因報者業之果也業必有因業必招果故攝二障除障貴除其本如根絕不生芽芽不生則枝葉華果悉不生故今此呪持之則煩惱不起是拔業障根本也如傳言日夜各持三七徧滅五逆謗法等罪是也得生淨土者輪迴娑婆皆繇業障業障既空穢土種滅隨願往生故得生阿彌陀佛極樂國土總持者總統攝持更無遺失即呪之別名也傳名不思議神力者即經名不思議功德也持呪持名即得往生故同名不思議宋元嘉天竺三藏求那䟦陀羅譯疏宋者南北朝國名元嘉者年號天竺者西域國名求那䟦陀羅此云功德賢鈔宋言南北者時方南北分王宋王江南謂劉宋也元嘉者文帝元嘉末年也天竺一云身毒有五天竺皆西域也䟦陀博通三藏尤專大乘號摩訶衍神異非一備載傳記恐繁不敘一本陀下無羅字或疑是求那䟦摩以二師同時故未審何所譯也呪曰南無阿彌多婆夜一哆他伽多夜二哆地夜他三阿彌利都婆毗四阿彌利哆五悉耽婆毗六阿彌唎哆七毗迦蘭帝八阿彌唎哆九毗迦蘭多十伽彌膩十一伽伽那十二枳多迦利十三娑婆訶十四若有善男子善女人能誦此呪者阿彌陀佛常住其頂日夜擁護無令怨家而得其便現世常得安隱臨命終時任運往生疏諸本句讀稍異今依古本神呪不翻不必強釋鈔諸本不同者如南無阿彌多婆夜一本作南無阿彌多婆夜多以次句多字連屬上句故云稍異今不必苦究是非但依一本至心誦持自成利益又有謂南無阿彌多婆夜此云皈命無量壽多他伽多夜即多他阿伽度此云如來哆地夜他新譯云他的也撻舊云怛絰他絰音迭即地夜二合也此云即說呪曰自後方是密語然神呪從古不翻略有五意一如王密旨勿妄宣傳但宜欽奉故二或一語廣含多義如僊陀婆故三或此方所無如閻浮提故四或順古文如阿耨菩提故五或尊重非唐言可對如般若故一云亦可強翻既謂之強曷若己之疏經呪相聯正顯密圓通義鈔詳陳彼國依正莊嚴信行願門如經所明是之謂顯遵佛祕勅但持此呪即得往生是之謂密顯者顯此密也密者密此顯也兼持則雙美畢具單舉亦交攝不遺故曰圓通疏雖云交攝而專持名號猶勝持呪亦勝餘呪亦勝一切諸餘功德鈔偏讚持名也一勝本呪者以呪云誦三十萬徧則見阿彌陀佛而持名則一日一心即佛現前故又呪云晝夜六時各誦三七徧能滅五逆等罪而持名則至心念佛一聲即滅八十億劫生死重罪故二勝餘呪者專持名號即大神呪大明呪無上呪無等等呪以十念便得往生一生便得不退威靈不測斯名大神餘可例知故問準提功德至廣至大如何但持佛名而能勝彼答準提因地菩薩彌陀果位如來持準提既有神功念彌陀寧無妙應是故經云持六十二億恒河沙菩薩名號不如一稱觀世音菩薩其福正等又云持無量無數觀世音菩薩名號不如一稱地藏菩薩其福正等況如來乎三亦勝諸餘功德者六度萬行法門無量而專持名號則種種功德攝無不盡以不出一心故如前文中廣說願淨業弟子專其信不二其心如經云設有一法過於涅槃亦所不顧禪宗知識有教人但持話頭一切不作故知原業餘門者尚當改修念佛何況原念佛人乃變其所守而復他尚心懷二路志不歸一云何三昧而得成就直至無常空無所獲罔思己過反起謗言嗚呼謬哉疏稱理則自性空是拔業障義自性有是陀羅尼義自性不有不空是生淨土義鈔覓心了不可得一切業障誰為根本即心無所不具一切功德何弗總持當總持而不立纖塵有是即空之有無根本而出生萬法空是即有之空即有則不空即空則不有不空不有惟是一心不越一心是名淨土
